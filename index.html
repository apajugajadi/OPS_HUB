<style>
:root{
  /* Palette — "control room": deep slate, signal amber, machine teal */
  --bg:#0d1117; --bg2:#141b24; --panel:#1a232e; --panel2:#212d3a;
  --line:#2a3848; --line2:#374759;
  --ink:#e8eef5; --ink2:#9fb1c4; --ink3:#647890;
  --amber:#ffb020; --amber2:#ff8a3d;
  --teal:#3ad6c4; --teal2:#1fa896;
  --red:#ff5b6e; --green:#3ddc84; --blue:#5b9dff; --purple:#a989ff;
  --grad:linear-gradient(135deg,#ffb020,#ff8a3d);
  --mono:'Spline Sans Mono',monospace; --disp:'Archivo',sans-serif; --body:'Inter',sans-serif;
  --r:14px; --r2:10px;
}
/* Mode terang -- override variabel warna yang sama, seluruh CSS lain (yang memakai var(--bg) dst)
   otomatis ikut menyesuaikan tanpa perlu ditulis ulang. */
:root[data-theme="light"]{
  --bg:#f4f6f9; --bg2:#eaedf2; --panel:#ffffff; --panel2:#f0f2f6;
  --line:#dde2e9; --line2:#c7cedb;
  --ink:#1a2230; --ink2:#4a5568; --ink3:#8891a3;
  --amber:#d97706; --amber2:#c2660a;
  --teal:#0e7c72; --teal2:#0a5f58;
  --red:#dc2626; --green:#16a34a; --blue:#2563eb; --purple:#7c3aed;
  --grad:linear-gradient(135deg,#d97706,#c2660a);
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{background:var(--bg);color:var(--ink);font-family:var(--body);-webkit-font-smoothing:antialiased;font-size:14px}
body{min-height:100vh}
::-webkit-scrollbar{width:9px;height:9px}
::-webkit-scrollbar-track{background:var(--bg)}
::-webkit-scrollbar-thumb{background:var(--line2);border-radius:5px}
::selection{background:var(--amber);color:#000}

/* ===== TOP BAR ===== */
.topbar{position:sticky;top:0;z-index:50;background:rgba(13,17,23,.86);backdrop-filter:blur(14px);border-bottom:1px solid var(--line)}
.topbar-inner{margin:0 auto;padding:13px 32px;display:flex;align-items:center;gap:18px}
.brand{display:flex;align-items:center;gap:11px;flex-shrink:0}
.logo{width:34px;height:34px;border-radius:9px;background:#fff;display:grid;place-items:center;padding:4px;box-shadow:0 1px 3px rgba(0,0,0,.3)}

/* ===== LOGIN SCREEN ===== */
.login-screen{position:fixed;inset:0;z-index:1000;background:var(--bg);display:flex;align-items:center;justify-content:center}
.login-screen.hidden{display:none}
.login-box{width:100%;max-width:340px;padding:32px 28px;background:var(--panel);border:1px solid var(--line);border-radius:16px;text-align:center}
.login-logo{width:64px;height:64px;margin:0 auto 16px;background:#fff;border-radius:14px;display:grid;place-items:center;padding:8px;box-shadow:0 2px 8px rgba(0,0,0,.3)}
.login-logo img{width:100%;height:100%;object-fit:contain}
.login-box h1{font-family:var(--disp);font-weight:800;font-size:16px;margin-bottom:2px}
.login-sub{color:var(--ink3);font-family:var(--mono);font-size:10.5px;text-transform:uppercase;letter-spacing:.5px;margin-bottom:22px}
.login-field{text-align:left;margin-bottom:12px}
.login-field label{display:block;font-size:11px;color:var(--ink2);margin-bottom:5px;font-family:var(--mono)}
.login-field input{width:100%;background:var(--bg2);border:1px solid var(--line2);border-radius:8px;padding:10px 12px;color:var(--ink);font-size:13px}
.login-field input:focus{outline:none;border-color:var(--amber)}
.login-btn{width:100%;background:var(--grad);color:#0d1117;border:none;font-family:var(--disp);font-weight:800;font-size:13px;padding:11px;border-radius:9px;cursor:pointer;margin-top:6px}
.login-error{color:var(--red);font-size:11.5px;margin-top:10px;min-height:16px}
.login-hint{color:var(--ink3);font-size:10.5px;margin-top:18px;line-height:1.5}
.logo img{width:100%;height:100%;object-fit:contain}
.brand-txt b{font-family:var(--disp);font-weight:800;font-size:14px;letter-spacing:-.3px;display:block;line-height:1.05}
.brand-txt span{font-size:10.5px;color:var(--ink3);font-family:var(--mono);letter-spacing:.5px;text-transform:uppercase}
.topbar-spacer{flex:1}

/* Pencarian global */
.global-search{position:relative;margin-left:14px;width:240px;flex-shrink:0}
.gs-ic{position:absolute;left:10px;top:50%;transform:translateY(-50%);font-size:12px;color:var(--ink3);pointer-events:none}
.global-search input{width:100%;background:var(--bg2);border:1px solid var(--line2);border-radius:8px;padding:7px 10px 7px 30px;color:var(--ink);font-size:12px}
.global-search input:focus{outline:none;border-color:var(--amber)}
.gs-results{position:absolute;top:calc(100% + 4px);left:0;right:0;background:var(--panel);border:1px solid var(--line2);border-radius:10px;box-shadow:0 8px 24px rgba(0,0,0,.4);max-height:280px;overflow-y:auto;z-index:200;display:none}
.gs-results.show{display:block}
.gs-item{padding:9px 12px;font-size:12px;cursor:pointer;border-bottom:1px solid var(--line)}
.gs-item:last-child{border-bottom:none}
.gs-item:hover{background:var(--panel2)}
.gs-item .gs-type{font-family:var(--mono);font-size:8.5px;color:var(--ink3);text-transform:uppercase;margin-right:6px}
.gs-empty{padding:12px;font-size:11.5px;color:var(--ink3);text-align:center}

/* User chip + dropdown */
.user-chip{position:relative;background:var(--panel2);border:1px solid var(--line2);border-radius:8px;padding:6px 12px;cursor:pointer;font-size:11.5px;color:var(--ink2);flex-shrink:0}
.theme-toggle-btn{background:var(--panel2);border:1px solid var(--line2);border-radius:8px;width:32px;height:32px;cursor:pointer;font-size:14px;flex-shrink:0;display:grid;place-items:center}
.theme-toggle-btn:hover{background:var(--line2)}
.user-menu{position:absolute;top:calc(100% + 4px);right:0;background:var(--panel);border:1px solid var(--line2);border-radius:10px;box-shadow:0 8px 24px rgba(0,0,0,.4);min-width:140px;display:none;z-index:200}
.user-menu.show{display:block}
.user-menu button{width:100%;text-align:left;background:none;border:none;color:var(--ink2);padding:10px 14px;font-size:12px;cursor:pointer}
.user-menu button:hover{background:var(--panel2);color:var(--ink)}
.global-filters{display:flex;gap:9px;align-items:center}
.seg{display:flex;background:var(--panel);border:1px solid var(--line);border-radius:9px;padding:3px;gap:2px}
.seg button{background:none;border:none;color:var(--ink2);font-family:var(--mono);font-size:11.5px;font-weight:500;padding:5px 11px;border-radius:6px;cursor:pointer;transition:.15s}
.seg button:hover{color:var(--ink)}
.seg button.on{background:var(--grad);color:#0d1117;font-weight:600}
.sel{background:var(--panel);border:1px solid var(--line);color:var(--ink);font-family:var(--mono);font-size:11.5px;padding:7px 11px;border-radius:8px;cursor:pointer}
.sync-dot{display:flex;align-items:center;gap:6px;font-family:var(--mono);font-size:10.5px;color:var(--ink3)}
.sync-dot i{width:7px;height:7px;border-radius:50%;background:var(--green);box-shadow:0 0 8px var(--green)}

/* ===== TABS ===== */
.tabnav{position:sticky;top:61px;z-index:40;background:rgba(13,17,23,.86);backdrop-filter:blur(14px);border-bottom:1px solid var(--line)}
.tabnav-scrollwrap{margin:0 auto;padding:0 32px;position:relative;display:flex;align-items:center}
.tabnav-inner{display:flex;gap:2px;overflow-x:auto;scroll-behavior:smooth;scrollbar-width:none;flex:1}
.tabnav-inner::-webkit-scrollbar{display:none}
.tab{background:none;border:none;border-bottom:2px solid transparent;color:var(--ink3);font-family:var(--disp);font-weight:600;font-size:13px;padding:13px 16px;cursor:pointer;white-space:nowrap;transition:.15s;display:flex;align-items:center;gap:7px;flex-shrink:0}
.tab:hover{color:var(--ink2)}
.tab.on{color:var(--amber);border-bottom-color:var(--amber)}
.tab .ic{font-size:15px}
.tab .soon{font-family:var(--mono);font-size:8.5px;background:var(--line);color:var(--ink3);padding:2px 5px;border-radius:4px;text-transform:uppercase;letter-spacing:.5px}

.tabnav-fade{position:absolute;top:0;bottom:0;width:34px;pointer-events:none;z-index:2;opacity:0;transition:opacity .2s}
.tabnav-fade.left{left:32px;background:linear-gradient(90deg,rgba(13,17,23,.95),transparent)}
.tabnav-fade.right{right:32px;background:linear-gradient(270deg,rgba(13,17,23,.95),transparent)}
.tabnav-fade.show{opacity:1}
.tabnav-scrollbtn{width:24px;height:24px;border-radius:50%;background:var(--panel2);border:1px solid var(--line2);color:var(--ink2);
  display:grid;place-items:center;cursor:pointer;font-size:12px;flex-shrink:0;opacity:0;pointer-events:none;transition:opacity .2s;position:relative;z-index:3}
.tabnav-scrollbtn.show{opacity:1;pointer-events:auto}
.tabnav-scrollbtn:hover{background:var(--line2);color:var(--ink)}
.tabnav-scrollbtn.left{margin-right:4px}
.tabnav-scrollbtn.right{margin-left:4px}

/* ===== LAYOUT ===== */
.wrap{margin:0 auto;padding:24px 32px 80px}
.module{display:none}
.module.on{display:block;animation:fade .4s}
@keyframes fade{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}

.sec-label{font-family:var(--mono);font-size:10.5px;text-transform:uppercase;letter-spacing:1.5px;color:var(--ink3);margin:30px 0 14px;display:flex;align-items:center;gap:10px}
.sec-label::after{content:"";flex:1;height:1px;background:var(--line)}
.sec-label:first-child{margin-top:4px}

/* ===== HERO STRIP ===== */
.hero{display:grid;grid-template-columns:1.4fr 1fr 1fr 1fr;gap:13px;margin-bottom:6px}
.hcard{background:var(--panel);border:1px solid var(--line);border-radius:var(--r);padding:18px 19px;position:relative;overflow:hidden}
.hcard.feat{background:linear-gradient(135deg,#1a232e,#1e2a36);border-color:var(--line2)}
.hcard.feat::before{content:"";position:absolute;top:0;left:0;right:0;height:3px;background:var(--grad)}
.hcard .k{font-family:var(--mono);font-size:10.5px;text-transform:uppercase;letter-spacing:.8px;color:var(--ink3);margin-bottom:10px}
.hcard .v{font-family:var(--disp);font-weight:800;font-size:34px;line-height:1;letter-spacing:-1.5px;color:var(--ink)}
.hcard.feat .v{font-size:40px;background:var(--grad);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent}
.hcard .v small{font-size:15px;font-weight:600;color:var(--ink3);-webkit-text-fill-color:var(--ink3)}
.hcard .sub{font-size:11.5px;color:var(--ink2);margin-top:8px;display:flex;align-items:center;gap:6px}
.hcard .chip{font-family:var(--mono);font-size:10px;padding:2px 7px;border-radius:5px;font-weight:600}
.chip.up{background:rgba(255,91,110,.14);color:var(--red)}
.chip.dn{background:rgba(61,220,132,.14);color:var(--green)}
.chip.neu{background:var(--line);color:var(--ink2)}

/* ===== PANELS ===== */
.grid{display:grid;gap:13px}
.g2{grid-template-columns:1fr 1fr}
.g3{grid-template-columns:1fr 1fr 1fr}
.g23{grid-template-columns:1.7fr 1fr}
.g32{grid-template-columns:1fr 1.4fr}
.panel{background:var(--panel);border:1px solid var(--line);border-radius:var(--r);padding:18px}
.panel-h{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
.panel-h h3{font-family:var(--disp);font-weight:700;font-size:15px;letter-spacing:-.2px}
.panel-h .hint{font-family:var(--mono);font-size:10px;color:var(--ink3)}
.panel canvas{max-height:280px}

/* ===== FUNGSI CARDS (responsibility) ===== */
.fungsi-row{display:grid;grid-template-columns:repeat(4,1fr);gap:11px}
.fcard{background:var(--panel2);border:1px solid var(--line);border-radius:var(--r2);padding:15px;position:relative;cursor:pointer;transition:.18s}
.fcard:hover{border-color:var(--line2);transform:translateY(-2px)}
.fcard .bar{position:absolute;top:0;left:0;width:4px;height:100%;border-radius:4px 0 0 4px}
.fcard .fn{font-family:var(--disp);font-weight:700;font-size:13px;margin-bottom:3px;padding-left:6px}
.fcard .fpic{font-family:var(--mono);font-size:10px;color:var(--ink3);padding-left:6px;margin-bottom:11px}
.fcard .fv{font-family:var(--disp);font-weight:800;font-size:25px;letter-spacing:-1px;padding-left:6px}
.fcard .fv small{font-size:12px;color:var(--ink3);font-weight:600}
.fcard .fpct{font-family:var(--mono);font-size:10.5px;color:var(--ink2);padding-left:6px;margin-top:4px}

/* ===== TABLE ===== */
table{width:100%;border-collapse:collapse;font-size:12.5px}
th{text-align:left;font-family:var(--mono);font-size:10px;text-transform:uppercase;letter-spacing:.6px;color:var(--ink3);padding:9px 11px;border-bottom:1px solid var(--line2);font-weight:500}
td{padding:10px 11px;border-bottom:1px solid var(--line);color:var(--ink2)}
tr:hover td{background:var(--panel2)}
td.num,th.num{text-align:right;font-family:var(--mono)}
.tag{display:inline-block;font-family:var(--mono);font-size:9.5px;padding:2px 7px;border-radius:5px;font-weight:600}
.tag.j{background:rgba(91,157,255,.15);color:var(--blue)}
.tag.c{background:rgba(58,214,196,.15);color:var(--teal)}
.tag.g{background:rgba(169,137,255,.15);color:var(--purple)}
.barcell{position:relative;height:6px;background:var(--line);border-radius:3px;overflow:hidden;min-width:60px}
.barcell i{position:absolute;left:0;top:0;height:100%;background:var(--grad);border-radius:3px}

/* ===== AI PANEL ===== */
.ai-panel{background:linear-gradient(135deg,#16202b,#1a1f2e);border:1px solid var(--line2);border-radius:var(--r);padding:20px;position:relative;overflow:hidden}
.ai-panel::before{content:"";position:absolute;top:-50%;right:-10%;width:300px;height:300px;background:radial-gradient(circle,rgba(58,214,196,.08),transparent 70%);pointer-events:none}
.ai-head{display:flex;align-items:center;gap:11px;margin-bottom:6px}
.ai-badge{font-family:var(--mono);font-size:9.5px;font-weight:600;text-transform:uppercase;letter-spacing:1px;background:rgba(58,214,196,.15);color:var(--teal);padding:4px 9px;border-radius:6px;display:flex;align-items:center;gap:5px}
.ai-head h3{font-family:var(--disp);font-weight:800;font-size:17px;letter-spacing:-.3px}
.ai-desc{font-size:12.5px;color:var(--ink2);margin-bottom:16px;max-width:600px;line-height:1.5}
.btn{font-family:var(--disp);font-weight:600;font-size:13px;border:none;border-radius:9px;padding:10px 18px;cursor:pointer;transition:.15s;display:inline-flex;align-items:center;gap:8px}
.btn-primary{background:var(--grad);color:#0d1117}
.btn-primary:hover{filter:brightness(1.08);transform:translateY(-1px)}
.btn-teal{background:linear-gradient(135deg,var(--teal),var(--teal2));color:#06201c}
.btn-teal:hover{filter:brightness(1.08);transform:translateY(-1px)}
.btn-ghost{background:var(--panel2);color:var(--ink);border:1px solid var(--line2)}
.btn-ghost:hover{border-color:var(--ink3)}
.btn:disabled{opacity:.5;cursor:not-allowed;transform:none!important}

.ai-out{margin-top:18px;display:none}
.ai-out.show{display:block;animation:fade .4s}
.cluster{background:var(--panel);border:1px solid var(--line);border-radius:var(--r2);padding:14px 16px;margin-bottom:10px}
.cluster-h{display:flex;align-items:center;justify-content:space-between;margin-bottom:9px;flex-wrap:wrap;gap:8px}
.cluster-name{font-family:var(--disp);font-weight:700;font-size:14px;color:var(--amber)}
.cluster-meta{font-family:var(--mono);font-size:10.5px;color:var(--ink3)}
.cluster-variants{display:flex;flex-wrap:wrap;gap:6px}
.variant{font-family:var(--mono);font-size:11px;background:var(--panel2);border:1px solid var(--line);color:var(--ink2);padding:4px 9px;border-radius:6px}
.cluster-rec{font-size:12px;color:var(--ink2);margin-top:9px;padding-top:9px;border-top:1px solid var(--line);line-height:1.5}
.cluster-rec b{color:var(--teal)}

.spinner{width:16px;height:16px;border:2px solid rgba(13,17,23,.3);border-top-color:#0d1117;border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.thinking{font-family:var(--mono);font-size:12px;color:var(--teal);display:flex;align-items:center;gap:9px;padding:14px 0}
.thinking .spinner{border-color:rgba(58,214,196,.25);border-top-color:var(--teal)}

/* ===== SIMULATOR ===== */
.sim-grid{display:grid;grid-template-columns:1fr 1fr;gap:20px;align-items:start}
.sim-control{display:flex;flex-direction:column;gap:16px}
.sim-row label{font-family:var(--mono);font-size:11px;color:var(--ink2);display:flex;justify-content:space-between;margin-bottom:7px}
.sim-row label b{color:var(--amber);font-size:12px}
input[type=range]{width:100%;height:5px;border-radius:3px;background:var(--line2);outline:none;-webkit-appearance:none;cursor:pointer}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:17px;height:17px;border-radius:50%;background:var(--amber);cursor:pointer;box-shadow:0 0 0 4px rgba(255,176,32,.18)}
.sim-result{background:var(--panel2);border:1px solid var(--line2);border-radius:var(--r2);padding:18px;text-align:center}
.sim-result .rl{font-family:var(--mono);font-size:10.5px;text-transform:uppercase;letter-spacing:.8px;color:var(--ink3);margin-bottom:9px}
.sim-result .rv{font-family:var(--disp);font-weight:800;font-size:46px;letter-spacing:-2px;background:var(--grad);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;line-height:1}
.sim-result .rd{font-family:var(--mono);font-size:11.5px;color:var(--ink2);margin-top:10px}
.sim-result .rd b{color:var(--green)}

/* ===== PLACEHOLDER (coming soon modules) ===== */
.placeholder{text-align:center;padding:90px 20px}
.placeholder .pic{font-size:46px;margin-bottom:18px;opacity:.5}
.placeholder h2{font-family:var(--disp);font-weight:800;font-size:24px;letter-spacing:-.5px;margin-bottom:10px}
.placeholder p{color:var(--ink2);max-width:440px;margin:0 auto 8px;line-height:1.6;font-size:13.5px}
.placeholder .plan{display:inline-flex;flex-direction:column;gap:8px;margin-top:24px;text-align:left;background:var(--panel);border:1px solid var(--line);border-radius:var(--r);padding:20px 24px}
.placeholder .plan div{font-size:12.5px;color:var(--ink2);display:flex;align-items:center;gap:10px;font-family:var(--mono)}
.placeholder .plan .dot{width:6px;height:6px;border-radius:50%;background:var(--teal)}

.foot{text-align:center;padding:30px;color:var(--ink3);font-family:var(--mono);font-size:10.5px;border-top:1px solid var(--line);margin-top:40px}

@media(max-width:1000px){
  .hero{grid-template-columns:1fr 1fr}
  .g2,.g23,.g32{grid-template-columns:1fr}
  .g3{grid-template-columns:1fr}
  .fungsi-row{grid-template-columns:1fr 1fr}
  .sim-grid{grid-template-columns:1fr}
  .global-filters{display:none}
  .global-search{width:160px}
  .subtable-wrap,.md-table{overflow-x:auto}
}
@media(max-width:560px){
  .hero{grid-template-columns:1fr}
  .fungsi-row{grid-template-columns:1fr}
  .topbar-inner{padding:11px 15px;flex-wrap:wrap}
  .wrap{padding:18px 14px 60px}
  .global-search{order:5;width:100%;margin-left:0;margin-top:8px}
  .user-chip .uc-name{display:none}
  .user-chip{padding:6px 8px}
  .admin-subnav{flex-direction:column}
  .subtable th,.subtable td,.md-table th,.md-table td{white-space:nowrap}
  .subtable-wrap,.md-table{overflow-x:auto;-webkit-overflow-scrolling:touch}
  .rekon-table-wrap{overflow-x:auto}
  .rekon-topbar,.rekon-statusbar{flex-wrap:wrap}
}
/* period controls */
.period-bar{display:flex;align-items:center;gap:14px;flex-wrap:wrap;margin-bottom:4px;padding:13px 16px;background:var(--panel);border:1px solid var(--line);border-radius:var(--r)}
.period-mode{position:relative;display:flex;background:var(--bg2);border:1px solid var(--line);border-radius:8px;padding:3px;gap:2px}
.pm-pill{position:absolute;top:3px;left:3px;height:calc(100% - 6px);width:calc(50% - 3px);background:var(--grad);border-radius:6px;transition:transform .22s cubic-bezier(.3,.9,.4,1);z-index:1}
.period-mode.mode-range .pm-pill{transform:translateX(100%)}
.pm{position:relative;z-index:2;background:none;border:none;color:var(--ink2);font-family:var(--mono);font-size:11px;font-weight:500;padding:6px 13px;border-radius:6px;cursor:pointer;transition:color .18s;flex:1}
.pm:hover{color:var(--ink)}
.pm.on{color:#0d1117;font-weight:600}
.period-chips{display:flex;align-items:center;gap:5px;flex-wrap:wrap}
.pchip{background:var(--panel2);border:1px solid var(--line);color:var(--ink2);font-family:var(--mono);font-size:11.5px;padding:6px 13px;border-radius:7px;cursor:pointer;transition:.15s}
.pchip:hover{border-color:var(--line2);color:var(--ink)}
.pchip.on{background:var(--grad);color:#0d1117;font-weight:600;border-color:transparent}
.pchip.sm{padding:5px 10px;font-size:11px}
.rng-lbl{font-family:var(--mono);font-size:10px;color:var(--ink3);text-transform:uppercase;letter-spacing:.5px;margin:0 2px}
.click-hint{font-family:var(--mono);font-size:9.5px;color:var(--teal);text-transform:none;letter-spacing:0;margin-left:auto;font-weight:500}
.sec-label{position:relative}
.sec-label .click-hint::before{content:"👆 ";}

/* drill-down */
.drill{background:linear-gradient(135deg,#16202b,#19232f);border:1px solid var(--teal2);border-radius:var(--r);margin:13px 0 4px;overflow:hidden;animation:drillIn .35s}
@keyframes drillIn{from{opacity:0;transform:translateY(-8px)}to{opacity:1;transform:none}}
.drill-h{display:flex;align-items:center;justify-content:space-between;padding:14px 18px;border-bottom:1px solid var(--line2);background:rgba(58,214,196,.05)}
.drill-t{font-family:var(--disp);font-weight:700;font-size:15px;color:var(--teal);display:block}
.drill-sub{font-family:var(--mono);font-size:11px;color:var(--ink3);margin-top:2px;display:block}
.drill-x{background:var(--panel2);border:1px solid var(--line2);color:var(--ink2);font-family:var(--mono);font-size:11px;padding:6px 12px;border-radius:7px;cursor:pointer;transition:.15s}
.drill-x:hover{border-color:var(--red);color:var(--red)}
.drill-scroll{max-height:420px;overflow-y:auto}
.drill-scroll table{font-size:12px}
.drill-scroll th{position:sticky;top:0;background:#16202b;z-index:1}
.drill-scroll td.mono{font-family:var(--mono);font-size:11px;color:var(--ink3)}
.drill-more{padding:11px 18px;font-family:var(--mono);font-size:10.5px;color:var(--ink3);text-align:center;border-top:1px solid var(--line)}
/* tolerance + view bar */
.tol-bar{display:flex;align-items:center;gap:22px;flex-wrap:wrap;padding:13px 16px;background:linear-gradient(135deg,#16202b,#1a232e);border:1px solid var(--line2);border-radius:var(--r);margin-bottom:13px}
.tol-group{display:flex;align-items:center;gap:11px}
.tol-lbl{font-family:var(--mono);font-size:11px;color:var(--ink2);text-transform:uppercase;letter-spacing:.5px}
.tol-hint{color:var(--ink3);text-transform:none;letter-spacing:0}
.seg.sm{padding:2px}
.seg.sm button{padding:5px 14px;font-size:11px}
.tol-input{display:flex;align-items:center;gap:10px}
.tol-input input[type=range]{width:120px}
.tol-val{font-family:var(--mono);font-size:13px;font-weight:600;color:var(--amber);min-width:42px}
.tol-note{font-family:var(--mono);font-size:10px;color:var(--ink3);margin-left:auto}
.rekon-filter-toggle{display:flex;align-items:center;gap:6px;font-size:11.5px;color:var(--ink2);cursor:pointer}
.rekon-filter-toggle input{accent-color:var(--blue)}

/* hero KPI */
.hero-kpi .hcard.rawnet{grid-column:span 1}
.hcard.rawnet .rawnet-cols{display:flex;align-items:center;justify-content:space-between;gap:8px;margin-top:6px}
.rn-col{display:flex;flex-direction:column;align-items:flex-start}
.rn-lbl{font-family:var(--mono);font-size:9px;color:var(--ink3);letter-spacing:1px}
.rn-val{font-family:var(--disp);font-weight:800;font-size:26px;letter-spacing:-1px;line-height:1}
.rn-val.raw{color:var(--ink3)}
.rn-val.net{color:var(--amber)}
.rn-u{font-family:var(--mono);font-size:9px;color:var(--ink3)}
.rn-arrow{font-family:var(--mono);font-size:11px;color:var(--red);text-align:center;line-height:1.3}
.rn-arrow span{font-size:9px;color:var(--ink3)}

/* target input */
.tgt-input{width:52px;background:var(--bg2);border:1px solid var(--line2);color:var(--amber);font-family:var(--mono);font-size:11.5px;padding:3px 5px;border-radius:5px;text-align:right}
.tgt-input:focus{outline:none;border-color:var(--amber)}

/* tolerance badge in drill */
.tol-badge{font-family:var(--mono);font-size:8.5px;background:rgba(255,176,32,.15);color:var(--amber);padding:1px 5px;border-radius:4px;font-weight:600;margin-left:4px}
.rekon-flag-badge{font-family:var(--mono);font-size:8.5px;background:rgba(91,157,255,.15);color:var(--blue);padding:1px 5px;border-radius:4px;font-weight:600;margin-left:4px;cursor:help;white-space:nowrap}
/* breadcrumb */
.breadcrumb{display:flex;align-items:center;gap:8px;flex-wrap:wrap;padding:11px 15px;background:linear-gradient(135deg,#1a2230,#1d2735);border:1px solid var(--amber);border-radius:var(--r);margin-bottom:13px}
.bc-lbl{font-family:var(--mono);font-size:11px;color:var(--amber);font-weight:600;text-transform:uppercase;letter-spacing:.5px}
.bc-chip{display:inline-flex;align-items:center;gap:7px;font-family:var(--mono);font-size:11px;background:var(--panel2);border:1px solid var(--line2);color:var(--ink);padding:5px 10px;border-radius:7px;cursor:pointer;transition:.15s}
.bc-chip:hover{border-color:var(--red)}
.bc-chip i{font-style:normal;font-size:10px;color:var(--ink3)}
.bc-chip:hover i{color:var(--red)}
.bc-chip.pu{border-left:3px solid #5b9dff}
.bc-chip.fn{border-left:3px solid #ffb020}
.bc-chip.me{border-left:3px solid #5b9dff}
.bc-chip.ka{border-left:3px solid #3ad6c4}
.bc-reset{margin-left:auto;background:none;border:none;color:var(--ink3);font-family:var(--mono);font-size:10.5px;cursor:pointer;text-decoration:underline;padding:4px}
.bc-reset:hover{color:var(--red)}

/* fungsi card 3-indikator */
.fcard{transition:.18s;overflow:hidden}
.fcard.xf-on{border-color:var(--amber);box-shadow:0 0 0 1px var(--amber)}
.fc-top{display:flex;justify-content:space-between;align-items:flex-start;padding-left:8px;gap:8px}
.fc-badge{font-family:var(--mono);font-size:8px;padding:3px 7px;border-radius:5px;font-weight:600;white-space:nowrap;flex-shrink:0}
.fc-badge.ok{background:rgba(61,220,132,.15);color:var(--green)}
.fc-badge.over{background:rgba(255,91,110,.15);color:var(--red)}
.fcard .fv{padding-left:8px;margin-top:8px;font-size:25px}
.fc-bar{height:5px;background:#2a3848;border-radius:3px;margin:9px 8px 9px;overflow:visible;position:relative}
.fc-bar-fill{height:100%;border-radius:3px;transition:width .3s}
.fc-bar-tgt{position:absolute;left:100%;top:-2px;width:2px;height:9px;background:var(--ink);transform:translateX(-1px)}
.fc-chips{display:flex;gap:5px;flex-wrap:wrap;padding-left:8px}
.fc-chip{font-family:var(--mono);font-size:9px;background:#212d3a;padding:3px 7px;border-radius:5px}
.fc-chip.g{color:var(--green)}
.fc-chip.r{color:var(--red)}
.fc-chip.o{color:var(--amber2)}
.fc-chip.n{color:var(--ink2)}
.fc-foot{font-family:var(--mono);font-size:8.5px;color:var(--ink3);padding-left:8px;margin-top:7px}
.fcard .fn{font-size:14px}
/* event detail table */
.event-scroll{max-height:460px;overflow-y:auto;border-radius:8px}
.event-scroll table{font-size:12px}
.event-scroll th{position:sticky;top:0;background:#1a232e;z-index:1}
.event-scroll td.mono{font-family:var(--mono);font-size:11px;color:var(--ink3)}
.event-foot{font-family:var(--mono);font-size:10.5px;color:var(--ink3);text-align:center;padding:11px 0 2px;margin-top:8px;border-top:1px solid var(--line);display:flex;align-items:center;justify-content:space-between;gap:10px;flex-wrap:wrap}
.event-pager{display:flex;gap:6px}
/* reset target button */
.reset-tgt-btn{background:rgba(255,176,32,.12);border:1px solid var(--amber);color:var(--amber);font-family:var(--mono);font-size:10.5px;font-weight:600;padding:5px 12px;border-radius:7px;cursor:pointer;transition:.15s}
.reset-tgt-btn:hover{background:var(--amber);color:#0d1117}
/* tol manage button */
.tol-manage-btn{background:var(--panel2);border:1px solid var(--line2);color:var(--ink);font-family:var(--disp);font-weight:600;font-size:12px;padding:7px 13px;border-radius:8px;cursor:pointer;transition:.15s;display:inline-flex;align-items:center;gap:8px}
.tol-manage-btn:hover{border-color:var(--amber)}
.tol-count{font-family:var(--mono);font-size:9.5px;background:var(--amber);color:#0d1117;padding:2px 7px;border-radius:5px;font-weight:600}
.tol-summary{font-family:var(--mono);font-size:10px;color:var(--ink3);margin-left:8px}

/* modal */
.modal-overlay{position:fixed;inset:0;background:rgba(5,8,12,.7);backdrop-filter:blur(4px);z-index:200;display:grid;place-items:center;animation:fade .2s;padding:20px}
.modal-box{background:var(--panel);border:1px solid var(--line2);border-radius:16px;width:100%;max-width:540px;max-height:88vh;overflow:hidden;display:flex;flex-direction:column;box-shadow:0 24px 60px rgba(0,0,0,.5)}
.modal-head{display:flex;align-items:center;justify-content:space-between;padding:18px 22px;border-bottom:1px solid var(--line)}
.modal-head h3{font-family:var(--disp);font-weight:800;font-size:18px}
.modal-x{background:var(--panel2);border:1px solid var(--line2);color:var(--ink2);width:30px;height:30px;border-radius:8px;cursor:pointer;font-size:13px}
.modal-x:hover{border-color:var(--red);color:var(--red)}
.modal-body{padding:18px 22px;overflow-y:auto}
.modal-sub{font-family:var(--mono);font-size:11px;text-transform:uppercase;letter-spacing:.8px;color:var(--ink2);margin-bottom:11px;display:flex;align-items:center;gap:9px}
.modal-hint{text-transform:none;letter-spacing:0;color:var(--ink3);font-size:10px;font-weight:400}
.modal-divider{height:1px;background:var(--line);margin:20px 0}
.modal-foot{display:flex;align-items:center;gap:10px;padding:15px 22px;border-top:1px solid var(--line);background:var(--bg2)}
.tol-rules{display:flex;flex-direction:column;gap:8px}
.tol-rule{display:flex;align-items:center;gap:10px;background:var(--panel2);border:1px solid var(--line);border-radius:9px;padding:9px 12px}
.tol-rule-lvl{font-family:var(--mono);font-size:9px;padding:3px 8px;border-radius:5px;font-weight:600;text-transform:uppercase}
.tol-rule-target{flex:1;font-size:13px;color:var(--ink)}
.tol-rule-x{font-family:var(--mono);color:var(--ink3)}
.tol-rule-factor{width:54px;background:var(--bg2);border:1px solid var(--line2);color:var(--amber);font-family:var(--mono);font-size:12px;padding:4px 7px;border-radius:6px;text-align:center}
.tol-rule-del{background:none;border:none;cursor:pointer;font-size:13px;opacity:.6}
.tol-rule-del:hover{opacity:1}
.tol-empty{font-family:var(--mono);font-size:11px;color:var(--ink3);padding:14px;text-align:center;background:var(--panel2);border-radius:9px}
.tol-add{display:flex;flex-direction:column;gap:10px}
.tol-add-row{display:flex;align-items:center;gap:11px}
.tol-add-row label{font-family:var(--mono);font-size:11px;color:var(--ink2);width:64px}
.tol-add-row select,.tol-add-row input{background:var(--bg2);border:1px solid var(--line2);color:var(--ink);font-family:var(--mono);font-size:12px;padding:7px 10px;border-radius:7px;flex:1}
.tol-add-hint{font-family:var(--mono);font-size:9.5px;color:var(--ink3);flex:0}
.tol-msg{margin-top:13px;padding:9px 12px;border-radius:8px;font-size:12px;font-family:var(--mono)}
.tol-msg.ok{background:rgba(61,220,132,.12);color:var(--green)}
.tol-msg.err{background:rgba(255,91,110,.12);color:var(--red)}

/* sub cards */
#subCardsRow{margin-bottom:6px}
.subcards-wrap{background:var(--bg2);border:1px solid var(--line);border-radius:var(--r);padding:15px;margin-top:4px;animation:drillIn .3s}

/* Tabel sub-fungsi (menggantikan tampilan kartu untuk Production & Quality Assurance) */
.subtable-wrap{background:var(--bg2);border:1px solid var(--line);border-radius:var(--r);padding:15px;margin-top:4px;animation:drillIn .3s;overflow-x:auto}
.subtable{width:100%;border-collapse:collapse;font-size:12.5px}
.subtable thead th{text-align:left;padding:8px 10px;color:var(--ink3);font-family:var(--mono);font-size:10px;text-transform:uppercase;letter-spacing:.4px;border-bottom:1px solid var(--line2);white-space:nowrap}
.subtable thead th.r{text-align:right}
.subtable tbody td{padding:9px 10px;border-bottom:1px solid var(--line);white-space:nowrap}
.subtable tbody td.r{text-align:right;font-variant-numeric:tabular-nums}
.subtable tbody tr{cursor:pointer;transition:background .12s}
.subtable tbody tr:hover td{background:rgba(255,255,255,.03)}
.subtable tbody tr.xf-on td{background:rgba(255,176,32,.08)}
.subtable tbody tr.xf-on td:first-child{border-left:3px solid var(--amber)}
.subtable tbody tr.pe-row td{color:var(--ink2)}
.subtable tbody tr.subtable-sep td{padding:6px 10px;color:var(--ink3);font-family:var(--mono);font-size:9.5px;text-transform:uppercase;letter-spacing:.4px;background:transparent;border-bottom:none;cursor:default}
.subtable tbody tr.subtable-sep:hover td{background:transparent}
.pe-tag{font-family:var(--mono);font-size:8.5px;color:var(--ink3);background:var(--panel2);padding:2px 6px;border-radius:4px;margin-left:6px}
.subcards-lbl{font-family:var(--mono);font-size:11px;text-transform:uppercase;letter-spacing:.8px;margin-bottom:12px;font-weight:600}
.subcards{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:11px}
.subcard{background:var(--panel);border:1px solid var(--line2);border-radius:10px;padding:13px;cursor:pointer;transition:.15s}
.subcard:hover{border-color:var(--ink3);transform:translateY(-2px)}
.subcard.xf-on{border-color:var(--amber);box-shadow:0 0 0 1px var(--amber)}
.subcard-h{display:flex;align-items:center;justify-content:space-between;gap:8px;margin-bottom:8px}
.subcard-name{font-family:var(--disp);font-weight:700;font-size:13px;color:var(--ink)}
.subcard-tol{font-family:var(--mono);font-size:9px;color:var(--amber);background:rgba(255,176,32,.12);padding:2px 6px;border-radius:4px}
.subcard-v{font-family:var(--disp);font-weight:800;font-size:22px;color:var(--amber);letter-spacing:-1px;line-height:1}
.subcard-v small{font-size:11px;color:var(--ink3);font-weight:600}
.subcard-foot{font-family:var(--mono);font-size:9.5px;color:var(--ink3);margin-top:7px}
.subcard-pu{display:flex;gap:6px;flex-wrap:wrap;margin-top:9px;padding-top:9px;border-top:1px solid var(--line)}
.subpu{font-family:var(--mono);font-size:9.5px;color:var(--ink2);background:var(--panel2);padding:3px 7px;border-radius:5px}
.subpu b{color:var(--blue)}
/* fungsi card expand button */
.fcard-click{cursor:pointer}
.fc-expand{width:100%;margin-top:10px;background:var(--panel2);border:1px solid var(--line);color:var(--ink2);font-family:var(--mono);font-size:10px;padding:6px;border-radius:7px;cursor:pointer;transition:.15s}
.fc-expand:hover{border-color:var(--amber);color:var(--amber)}
.fcard.sub-open{border-color:var(--line2)}
.bc-chip.su{border-left:3px solid #a989ff}
.tol-badge{font-family:var(--mono);font-size:8px;background:rgba(255,176,32,.15);color:var(--amber);padding:1px 5px;border-radius:4px;font-weight:600;margin-left:4px;white-space:nowrap}
/* report button */
.report-btn{background:var(--grad);border:none;color:#0d1117;font-family:var(--disp);font-weight:700;font-size:12px;padding:7px 14px;border-radius:8px;cursor:pointer;transition:.15s}
.report-btn:hover{filter:brightness(1.08);transform:translateY(-1px)}
.share-btn{background:var(--panel2);border:1px solid var(--line2);border-radius:8px;width:32px;height:32px;cursor:pointer;font-size:13px;flex-shrink:0;display:grid;place-items:center}
.share-btn:hover{background:var(--line2)}

/* dual badge */
.fc-dual{display:flex;flex-direction:column;gap:3px;align-items:flex-end}
.fc-dual .fc-badge{font-size:7.5px}

/* sub-card status + PU cards */
.subcard-status{margin:6px 0}
.sc-badge{font-family:var(--mono);font-size:9px;padding:3px 8px;border-radius:5px;font-weight:600}
.sc-badge.ok{background:rgba(61,220,132,.15);color:var(--green)}
.sc-badge.over{background:rgba(255,91,110,.15);color:var(--red)}
.sc-hint{font-family:var(--mono);font-size:9px;color:var(--ink3);text-transform:none;letter-spacing:0;font-weight:400}
.pu-card{border-left:3px solid #5b9dff}
.pe-card{border-left:3px solid var(--amber);background:linear-gradient(135deg,#1a232e,#1d2733)}
.pe-tag{font-family:var(--mono);font-size:8px;background:rgba(255,176,32,.15);color:var(--amber);padding:2px 6px;border-radius:4px;font-weight:600}
.pe-divider{display:flex;align-items:center;gap:12px;margin:14px 0 10px;font-family:var(--mono);font-size:9px;text-transform:uppercase;letter-spacing:1px;color:var(--ink3)}
.pe-divider::before,.pe-divider::after{content:"";flex:1;height:1px;background:var(--line2)}
.pe-wrap{max-width:340px}

/* master data */
.md-warn{background:rgba(255,176,32,.1);border:1px solid var(--amber);border-radius:10px;padding:11px 15px;font-size:12px;color:var(--amber);margin-bottom:16px}
.md-tabs{display:flex;gap:4px;margin-bottom:16px;border-bottom:1px solid var(--line);flex-wrap:wrap}

/* Admin Panel */
.admin-subnav{display:flex;gap:6px;margin-bottom:16px;flex-wrap:wrap}
.admin-subtab{background:var(--panel2);border:1px solid var(--line2);color:var(--ink2);font-family:var(--disp);font-weight:600;font-size:11.5px;padding:8px 13px;border-radius:8px;cursor:pointer}
.admin-subtab.on{background:var(--grad);color:#0d1117;border-color:transparent}
.admin-loading{padding:30px;text-align:center;color:var(--ink3);font-family:var(--mono);font-size:12px}
.role-badge{font-family:var(--mono);font-size:9px;padding:2px 7px;border-radius:99px;text-transform:uppercase;font-weight:700}
.role-badge.admin{background:rgba(255,176,32,.15);color:var(--amber)}
.role-badge.user{background:rgba(91,157,255,.15);color:var(--blue)}
.md-tab{background:none;border:none;border-bottom:2px solid transparent;color:var(--ink3);font-family:var(--disp);font-weight:600;font-size:13px;padding:10px 16px;cursor:pointer;transition:.15s}
.md-tab:hover{color:var(--ink2)}
.md-tab.on{color:var(--amber);border-bottom-color:var(--amber)}
.md-desc{font-size:12px;color:var(--ink2);margin-bottom:16px;line-height:1.5}
.md-table{width:100%;border-collapse:collapse;font-size:12.5px}
.md-table th{text-align:left;font-family:var(--mono);font-size:10px;text-transform:uppercase;letter-spacing:.5px;color:var(--ink3);padding:9px 11px;border-bottom:1px solid var(--line2)}
.md-table td{padding:9px 11px;border-bottom:1px solid var(--line);color:var(--ink2)}
.dt-ellipsis{white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:1px;cursor:default}
.md-fungsi-row td{background:var(--panel2)}
.md-sub-row td{font-size:12px}
.md-lvl{font-family:var(--mono);font-size:8.5px;padding:2px 7px;border-radius:4px;font-weight:600;text-transform:uppercase}
.md-lvl.f{background:rgba(255,176,32,.15);color:var(--amber)}
.md-lvl.s{background:rgba(91,157,255,.15);color:var(--blue)}
.md-lvl.k{background:rgba(58,214,196,.15);color:var(--teal)}
.md-pic-input{width:100%;background:var(--bg2);border:1px solid var(--line2);color:var(--ink);font-family:var(--body);font-size:12px;padding:6px 9px;border-radius:6px}
.md-pic-input:focus{outline:none;border-color:var(--amber)}
.md-pic-input::placeholder{color:var(--ink3);font-style:italic}
.md-from{font-family:var(--mono);font-size:10px}
.md-own{color:var(--green)}
.md-inherit{color:var(--ink3)}
.md-arrow{color:var(--ink3)}
.md-cut{color:var(--ink3);font-size:10px}

/* report modal */
.rep-scope{background:var(--panel2);border:1px solid var(--line2);border-radius:9px;padding:12px 14px;margin-bottom:14px}
.rep-scope-lbl{font-family:var(--mono);font-size:9.5px;text-transform:uppercase;letter-spacing:.5px;color:var(--ink3)}
.rep-scope-val{font-family:var(--disp);font-weight:700;font-size:15px;color:var(--amber);margin-top:5px}
.rep-opts{display:flex;flex-direction:column;gap:10px}
.rep-opt{display:flex;align-items:center;gap:14px;background:var(--panel2);border:1px solid var(--line2);border-radius:11px;padding:15px;cursor:pointer;transition:.15s;text-align:left;width:100%}
.rep-opt:hover{border-color:var(--amber);transform:translateY(-1px)}
.rep-ic{font-size:26px}
.rep-opt b{font-family:var(--disp);font-size:15px;color:var(--ink);display:block;margin-bottom:3px}
.rep-opt span{font-size:11px;color:var(--ink3);line-height:1.4}
/* downtime sub-tabs */
.dt-subtabs{display:flex;gap:8px;margin-bottom:18px}
.dt-subtab{background:var(--panel);border:1px solid var(--line);color:var(--ink2);font-family:var(--disp);font-weight:700;font-size:14px;padding:11px 20px;border-radius:11px;cursor:pointer;transition:.15s}
.dt-subtab:hover{border-color:var(--line2);color:var(--ink)}
.dt-subtab.on{background:var(--grad);color:#0d1117;border-color:transparent}
/* analitik tabs */
.an-tabs{display:flex;gap:4px;margin:4px 0 16px;border-bottom:1px solid var(--line)}
.an-tab{background:none;border:none;border-bottom:2px solid transparent;color:var(--ink3);font-family:var(--disp);font-weight:600;font-size:13px;padding:10px 16px;cursor:pointer;transition:.15s}
.an-tab:hover{color:var(--ink2)}
.an-tab.on{color:var(--amber);border-bottom-color:var(--amber)}
.an-intro{background:var(--panel2);border-left:3px solid var(--amber);border-radius:0 8px 8px 0;padding:12px 16px;font-size:12.5px;color:var(--ink2);line-height:1.6;margin-bottom:16px}
/* chronic scatter */
.scatter{position:relative;height:280px;background:var(--bg2);border:1px solid var(--line);border-radius:10px;margin-bottom:10px}
.sc-dot{position:absolute;border-radius:50%;transform:translate(-50%,50%);opacity:.8;cursor:pointer;transition:.15s}
.sc-dot:hover{opacity:1;transform:translate(-50%,50%) scale(1.3)}
.sc-yaxis{position:absolute;left:6px;top:50%;transform:rotate(-90deg) translateX(50%);transform-origin:left;font-family:var(--mono);font-size:9px;color:var(--ink3);white-space:nowrap}
.sc-xaxis{position:absolute;bottom:6px;left:50%;transform:translateX(-50%);font-family:var(--mono);font-size:9px;color:var(--ink3)}
.scatter-legend{display:flex;gap:16px;flex-wrap:wrap;font-family:var(--mono);font-size:10px;color:var(--ink2)}
.scatter-legend span{display:flex;align-items:center;gap:6px}
.scatter-legend i{width:9px;height:9px;border-radius:50%}
.chr-tag{font-family:var(--mono);font-size:9px;padding:2px 7px;border-radius:4px;font-weight:600}
.chr-tag.chronic{background:rgba(255,91,110,.15);color:var(--red)}
.chr-tag.sporadic{background:rgba(255,176,32,.15);color:var(--amber)}
.chr-tag.mixed{background:var(--line);color:var(--ink3)}
/* MoM */
.mom-good{color:var(--green)}
.mom-bad{color:var(--red)}
.mom-base{font-family:var(--mono);font-size:10px;color:var(--ink3)}
.mom-extreme{background:rgba(255,176,32,.06)}
.mom-flag{font-family:var(--mono);font-size:9px;color:var(--amber);background:rgba(255,176,32,.15);padding:1px 6px;border-radius:4px}
.heat-table{width:100%;border-collapse:collapse;font-size:11.5px}
.heat-table th{font-family:var(--mono);font-size:10px;color:var(--ink3);padding:8px 10px;text-align:right;border-bottom:1px solid var(--line2)}
.heat-table th:first-child{text-align:left}
.heat-table td{padding:8px 10px;border-bottom:1px solid var(--line)}
.heat-table td:first-child{color:var(--ink)}
.heat-cell{text-align:right;font-family:var(--mono);color:var(--ink)}
/* action tracking */
.act-stats{display:flex;gap:12px;margin-bottom:16px}
.act-stat{flex:1;background:var(--panel);border:1px solid var(--line);border-radius:11px;padding:15px;text-align:center;position:relative;overflow:hidden}
.act-stat::before{content:"";position:absolute;top:0;left:0;right:0;height:3px}
.act-stat.open::before{background:var(--red)}
.act-stat.progress::before{background:var(--amber)}
.act-stat.closed::before{background:var(--green)}
.act-n{display:block;font-family:var(--disp);font-weight:800;font-size:30px;letter-spacing:-1px}
.act-l{font-family:var(--mono);font-size:10px;text-transform:uppercase;letter-spacing:.6px;color:var(--ink3)}
.act-list{display:flex;flex-direction:column;gap:10px}
.act-item{background:var(--panel2);border:1px solid var(--line);border-left:3px solid var(--ink3);border-radius:10px;padding:13px 15px}
.act-item.open{border-left-color:var(--red)}
.act-item.progress{border-left-color:var(--amber)}
.act-item.closed{border-left-color:var(--green);opacity:.75}
.act-head{display:flex;justify-content:space-between;align-items:center;gap:10px;margin-bottom:11px;flex-wrap:wrap}
.act-title{font-size:13px;color:var(--ink2)}
.act-title b{color:var(--ink)}
.act-meta{font-family:var(--mono);font-size:10.5px;color:var(--ink3)}
.act-controls{display:flex;gap:10px;margin-bottom:9px;flex-wrap:wrap}
.act-status-seg{display:flex;background:var(--bg2);border:1px solid var(--line2);border-radius:7px;padding:2px}
.act-status-seg button{background:none;border:none;color:var(--ink3);font-family:var(--mono);font-size:10.5px;padding:5px 12px;border-radius:5px;cursor:pointer}
.act-status-seg button.on{background:var(--grad);color:#0d1117;font-weight:600}
.act-pic{flex:1;min-width:140px;background:var(--bg2);border:1px solid var(--line2);color:var(--ink);font-size:12px;padding:6px 10px;border-radius:6px}
.act-note{width:100%;background:var(--bg2);border:1px solid var(--line2);color:var(--ink);font-size:12px;padding:7px 10px;border-radius:6px}
.act-pic:focus,.act-note:focus{outline:none;border-color:var(--amber)}
/* breakdown vs waiting */
.bw-hero{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:12px}
.bw-card{background:var(--panel);border:1px solid var(--line);border-top:3px solid var(--ink3);border-radius:11px;padding:15px}
.bw-name{font-family:var(--disp);font-weight:700;font-size:13px;color:var(--ink);margin-bottom:8px}
.bw-val{font-family:var(--disp);font-weight:800;font-size:32px;letter-spacing:-1px;line-height:1}
.bw-val small{font-size:14px;color:var(--ink3)}
.bw-sub{font-family:var(--mono);font-size:10px;color:var(--ink3);margin-top:6px}
.bw-metric{font-family:var(--mono);font-size:10px;color:var(--amber);margin-top:7px;padding-top:7px;border-top:1px solid var(--line)}
.bw-bar{display:flex;height:36px;border-radius:8px;overflow:hidden;margin-bottom:12px}
.bw-seg{transition:.2s}
.bw-legend{display:flex;gap:14px;flex-wrap:wrap;font-family:var(--mono);font-size:10.5px;color:var(--ink2);margin-bottom:12px}
.bw-legend i{width:9px;height:9px;border-radius:2px;display:inline-block;margin-right:5px}
.bw-insight{background:var(--panel2);border-radius:8px;padding:11px 14px;font-size:12px;color:var(--ink2);line-height:1.5}
.bw-note{font-family:var(--mono);font-size:10px;color:var(--ink3);margin-top:12px;line-height:1.5}
/* cost */
.hcard .v{word-break:break-word}
/* time pattern */
.pat-bars{display:flex;flex-direction:column;gap:11px}
.pat-row{display:flex;align-items:center;gap:11px}
.pat-lbl{font-family:var(--mono);font-size:11px;color:var(--ink2);width:100px;flex-shrink:0}
.pat-bar{flex:1;height:22px;background:var(--bg2);border-radius:6px;overflow:hidden}
.pat-fill{height:100%;background:var(--amber);border-radius:6px;transition:width .3s}
.pat-val{font-family:var(--mono);font-size:10.5px;color:var(--ink3);width:120px;text-align:right;flex-shrink:0}
/* big6 */
.big6-list{display:flex;flex-direction:column;gap:14px}
.big6-item{}
.big6-head{display:flex;justify-content:space-between;margin-bottom:6px}
.big6-name{font-family:var(--disp);font-weight:600;font-size:14px;color:var(--ink)}
.big6-pct{font-family:var(--mono);font-size:13px;font-weight:600;color:var(--amber)}
.big6-bar{height:10px;background:var(--bg2);border-radius:5px;overflow:hidden}
.big6-fill{height:100%;border-radius:5px;transition:width .3s}
.big6-foot{font-family:var(--mono);font-size:10px;color:var(--ink3);margin-top:5px}
/* auto-insight box */
.auto-insight{background:linear-gradient(135deg,#1a2230,#1d2735);border:1px solid var(--line2);border-left:3px solid var(--amber);border-radius:var(--r);padding:14px 18px;margin-bottom:14px}
.ai-ttl{font-family:var(--disp);font-weight:700;font-size:13px;color:var(--amber);margin-bottom:11px;text-transform:uppercase;letter-spacing:.5px}
.ai-items{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:9px}
.ai-item{display:flex;align-items:center;gap:10px;font-size:12.5px;color:var(--ink2);background:var(--panel2);border-radius:8px;padding:9px 12px;line-height:1.4}
.ai-item.bad{border-left:2px solid var(--red)}
.ai-item.good{border-left:2px solid var(--green)}
.ai-item.warn{border-left:2px solid var(--amber)}
.ai-item b{color:var(--ink)}
.ai-ic{font-size:15px;flex-shrink:0}
/* ytd pacing strip */
.ytd-strip{display:flex;align-items:center;gap:18px;background:var(--panel2);border:1px solid var(--line);border-radius:var(--r);padding:12px 18px;margin-bottom:14px}
.ytd-lbl{display:flex;flex-direction:column;flex-shrink:0}
.ytd-k{font-family:var(--mono);font-size:11px;font-weight:600;color:var(--amber);letter-spacing:.5px}
.ytd-sub{font-family:var(--mono);font-size:9px;color:var(--ink3)}
.ytd-bar-wrap{flex:1}
.ytd-bar{position:relative;height:8px;background:var(--bg2);border-radius:4px;overflow:visible;margin-bottom:8px}
.ytd-fill{height:100%;border-radius:4px;transition:width .3s}
.ytd-fill.ok{background:var(--green)}
.ytd-fill.over{background:var(--red)}
.ytd-target{position:absolute;top:-3px;width:2px;height:14px;background:var(--ink);transform:translateX(-1px)}
.ytd-vals{display:flex;gap:18px;font-family:var(--mono);font-size:10.5px;color:var(--ink3);flex-wrap:wrap}
.ytd-vals b{color:var(--ink)}
.ytd-vals b.ok,.ytd-ok{color:var(--green)}
.ytd-vals b.over,.ytd-over{color:var(--red)}
/* SPC + forecast */
.spc-legend{display:flex;gap:16px;flex-wrap:wrap;font-family:var(--mono);font-size:10px;color:var(--ink2);margin-top:10px}
.spc-legend i{width:9px;height:3px;display:inline-block;margin-right:5px;vertical-align:middle}
.spc-alert{background:rgba(255,91,110,.1);border:1px solid var(--red);border-radius:8px;padding:10px 14px;font-size:12px;color:var(--red);margin-top:12px}
.spc-ok{background:rgba(61,220,132,.1);border:1px solid var(--green);border-radius:8px;padding:10px 14px;font-size:12px;color:var(--green);margin-top:12px}
.fc-proj{background:var(--panel2);border-radius:8px;padding:11px 14px;font-size:12.5px;color:var(--ink2);margin-top:12px}
.fc-proj b{color:var(--amber);font-size:14px}
/* OEE module */
.oee-filterbar{display:flex;gap:24px;flex-wrap:wrap;background:var(--panel2);border:1px solid var(--line);border-radius:var(--r);padding:13px 18px;margin-bottom:14px}
.oee-fg{display:flex;align-items:center;gap:11px}
.oee-fl{font-family:var(--mono);font-size:11px;text-transform:uppercase;letter-spacing:.5px;color:var(--ink2)}
.oee-gauges{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:14px;margin-bottom:8px}
.oee-gauge{background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:18px;text-align:center;position:relative}
.og-svg{width:120px;height:120px;transform:rotate(-90deg);margin:0 auto;display:block}
.og-track{fill:none;stroke:var(--bg2);stroke-width:8}
.og-fill{fill:none;stroke-width:8;stroke-linecap:round;transition:stroke-dashoffset .6s}
.og-center{position:absolute;top:48px;left:0;right:0;text-align:center}
.og-val{font-family:var(--disp);font-weight:800;font-size:26px;letter-spacing:-1px}
.og-val small{font-size:13px}
.og-label{font-family:var(--disp);font-weight:700;font-size:14px;color:var(--ink);margin-top:10px}
.og-sub{font-family:var(--mono);font-size:10px;margin-top:4px}
.og-sub.ok{color:var(--green)}.og-sub.over{color:var(--red)}
.oee-note{background:var(--panel2);border-left:3px solid var(--amber);border-radius:0 8px 8px 0;padding:12px 16px;font-size:12px;color:var(--ink2);line-height:1.6;margin-top:14px}
.tag.puj{background:rgba(91,157,255,.15);color:#5b9dff}
.tag.pug{background:rgba(169,137,255,.15);color:#a989ff}
.tag.puc{background:rgba(58,214,196,.15);color:#3ad6c4}
/* bridge */
.bridge-metric{display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid var(--line);margin-bottom:12px}
.bm-k{font-family:var(--mono);font-size:11px;text-transform:uppercase;color:var(--ink3)}
.bm-v{font-family:var(--disp);font-weight:800;font-size:28px;letter-spacing:-1px}
.bridge-formula{background:var(--bg2);border-radius:8px;padding:11px 14px;font-size:13px;color:var(--ink2);margin-bottom:12px;line-height:1.6}
.bf-num{font-family:var(--mono);font-size:11px;color:var(--ink3)}
.bridge-list{margin:0;padding-left:18px;font-size:12px;color:var(--ink2);line-height:1.8}
.bridge-list b{color:var(--ink)}
.bridge-align{display:flex;flex-direction:column;gap:12px}
.ba-row{display:flex;gap:12px;align-items:flex-start;font-size:12.5px;color:var(--ink2);line-height:1.55}
.ba-icon{flex-shrink:0;width:22px;height:22px;border-radius:50%;background:var(--panel2);display:grid;place-items:center;font-size:12px;color:var(--green);font-weight:700}
.ba-row b{color:var(--ink)}
.bridge-concl{margin-top:16px;background:var(--panel2);border-radius:8px;padding:13px 16px;font-size:12.5px;color:var(--ink);line-height:1.6;border-left:3px solid var(--teal)}
/* performance bar */
.perf-bar{width:90px;height:8px;background:var(--bg2);border-radius:4px;overflow:hidden}
.perf-fill{height:100%;background:linear-gradient(90deg,var(--amber),var(--red));border-radius:4px}
/* quality tipe cards */
.q-tipe{display:flex;gap:10px}
.q-tipe-card{flex:1;background:var(--panel2);border:1px solid var(--line);border-radius:10px;padding:13px;text-align:center}
.qt-nm{font-family:var(--disp);font-weight:600;font-size:13px;color:var(--ink)}
.qt-ng{font-family:var(--disp);font-weight:800;font-size:24px;letter-spacing:-1px;color:var(--amber);margin:5px 0}
.qt-ng small{font-size:11px;color:var(--ink3)}
.qt-sub{font-family:var(--mono);font-size:10px;color:var(--ink3)}
/* material table */
.mat-table td{vertical-align:middle}
.mat-kimap{font-family:var(--mono);font-size:10.5px;color:var(--teal);white-space:nowrap}
.mat-nm{font-size:12px;color:var(--ink);max-width:340px}
.mat-uk{font-family:var(--mono);font-size:10.5px;color:var(--ink3);white-space:nowrap}
/* kapasitas editable */
.kap-input{width:90px;background:var(--bg2);border:1px solid var(--line2);color:var(--ink);font-family:var(--mono);font-size:12px;padding:5px 8px;border-radius:6px;text-align:right}
.kap-input:focus{outline:none;border-color:var(--amber)}
.kap-edited .kap-input{border-color:var(--amber);background:rgba(255,176,32,.08)}
.kap-orig{display:block;font-family:var(--mono);font-size:9px;color:var(--amber);margin-top:3px}
.kap-dot{color:var(--amber);font-size:10px}
/* matikan spinner number input (toggle up/down yg ngeganggu) */
.kap-input::-webkit-outer-spin-button,.kap-input::-webkit-inner-spin-button{-webkit-appearance:none;margin:0}
.kap-input{-moz-appearance:textfield;appearance:textfield;width:96px}
input[type=number]::-webkit-outer-spin-button,input[type=number]::-webkit-inner-spin-button{-webkit-appearance:none;margin:0}
input[type=number]{-moz-appearance:textfield}

/* sync notif banner */
.sync-banner{position:fixed;bottom:20px;right:20px;z-index:200;background:var(--panel);border:1px solid var(--amber);border-radius:14px;padding:14px 18px;box-shadow:0 8px 32px rgba(0,0,0,.5);max-width:340px;animation:slideUp .3s ease}

/* Notifikasi terpusat -- toast stack di pojok kanan bawah, dipakai semua operasi backend */
.notify-stack{position:fixed;bottom:20px;right:20px;z-index:300;display:flex;flex-direction:column;gap:8px;max-width:360px}
.notify-toast{display:flex;align-items:flex-start;gap:9px;background:var(--panel);border-radius:10px;padding:11px 14px;box-shadow:0 8px 24px rgba(0,0,0,.45);animation:slideUp .25s ease;font-size:12.5px;line-height:1.5}
.notify-toast.notify-out{animation:slideDown .2s ease forwards}
.notify-pending{border:1px solid var(--amber)}
.notify-success{border:1px solid var(--green)}
.notify-error{border:1px solid var(--red)}
.notify-ic{flex-shrink:0;font-size:14px;line-height:1.4}
.notify-pending .notify-ic{color:var(--amber)}
.notify-success .notify-ic{color:var(--green)}
.notify-error .notify-ic{color:var(--red)}
.notify-body{flex:1;min-width:0}
.notify-txt{color:var(--ink)}
.notify-hint{margin-top:5px;padding-top:6px;border-top:1px dashed var(--line2);color:var(--ink2);font-size:11.5px;line-height:1.5}
.notify-close{background:none;border:none;color:var(--ink3);cursor:pointer;font-size:11px;flex-shrink:0;padding:0 0 0 6px}
.notify-close:hover{color:var(--ink)}
@keyframes slideDown{from{opacity:1;transform:translateY(0)}to{opacity:0;transform:translateY(8px)}}
@keyframes slideUp{from{transform:translateY(20px);opacity:0}to{transform:translateY(0);opacity:1}}
.sync-banner-h{display:flex;align-items:center;gap:9px;margin-bottom:9px}
.sync-banner-ic{width:24px;height:24px;border-radius:50%;background:rgba(255,176,32,.15);display:grid;place-items:center;font-size:13px}
.sync-banner-t{font-family:var(--disp);font-weight:700;font-size:13px;color:var(--ink)}
.sync-banner-list{font-size:11.5px;color:var(--ink2);line-height:1.7;margin-bottom:12px}
.sync-banner-list .sb-item{display:flex;justify-content:space-between;gap:10px}
.sync-banner-list b{color:var(--amber);font-family:var(--mono)}
.sync-banner-btns{display:flex;gap:8px}
.sync-save-btn{flex:1;background:var(--grad);border:none;color:#0d1117;font-family:var(--disp);font-weight:700;font-size:12px;padding:9px;border-radius:8px;cursor:pointer;transition:.15s}
.sync-save-btn:hover{filter:brightness(1.08)}
.sync-dismiss-btn{background:var(--panel2);border:1px solid var(--line2);color:var(--ink3);font-size:12px;padding:9px 12px;border-radius:8px;cursor:pointer}
.sync-pulse{position:relative}
.sync-pulse::after{content:"";position:absolute;top:-3px;right:-3px;width:8px;height:8px;border-radius:50%;background:var(--amber);box-shadow:0 0 0 0 rgba(255,176,32,.6);animation:pulse 2s infinite}
@keyframes pulse{0%{box-shadow:0 0 0 0 rgba(255,176,32,.6)}70%{box-shadow:0 0 0 8px rgba(255,176,32,0)}100%{box-shadow:0 0 0 0 rgba(255,176,32,0)}}
/* include/exclude toggle */
.inc-toggle{width:30px;height:30px;border-radius:7px;border:1px solid var(--line2);cursor:pointer;font-size:14px;font-weight:700;transition:.15s}
.inc-toggle.on{background:rgba(61,220,132,.15);color:var(--green);border-color:var(--green)}
.inc-toggle.off{background:rgba(255,91,110,.12);color:var(--red);border-color:var(--red)}
.inc-toggle:hover{transform:scale(1.1)}
.mesin-exc td{opacity:.5}
.mesin-exc td:first-child{opacity:1}
.mesin-new{font-family:var(--mono);font-size:8.5px;background:rgba(91,157,255,.18);color:var(--blue);padding:2px 6px;border-radius:4px;font-weight:600}
.mesin-add-row{display:flex;gap:10px;align-items:center;flex-wrap:wrap}
.mesin-del{background:rgba(255,91,110,.1);border:1px solid var(--line2);color:var(--red);font-size:10.5px;padding:5px 10px;border-radius:6px;cursor:pointer}
.mesin-del:hover{border-color:var(--red)}
/* upload button + modal */
.upload-btn{background:var(--panel2);border:1px solid var(--amber);color:var(--amber);font-family:var(--disp);font-weight:700;font-size:12px;padding:7px 14px;border-radius:8px;cursor:pointer;transition:.15s;margin-right:8px}
.upload-btn:hover{background:rgba(255,176,32,.12);transform:translateY(-1px)}
.up-grid{display:grid;grid-template-columns:1fr 1fr 90px;gap:10px;margin-bottom:16px}
.up-field label{display:block;font-family:var(--mono);font-size:10px;text-transform:uppercase;letter-spacing:.5px;color:var(--ink3);margin-bottom:5px}
.up-drop{border:2px dashed var(--line2);border-radius:12px;transition:.15s;margin-bottom:14px}
.up-drop.drag{border-color:var(--amber);background:rgba(255,176,32,.06)}
.up-drop-inner{padding:30px 20px;text-align:center;cursor:pointer}
.up-ic{font-size:36px;margin-bottom:10px}
.up-txt{font-size:13px;color:var(--ink2);line-height:1.6}
.up-txt span{font-size:11px;color:var(--ink3)}
.up-loading,.up-err{padding:16px;text-align:center;font-size:13px}
.up-err{color:var(--red)}
.up-summary{background:var(--panel2);border:1px solid var(--line2);border-radius:10px;padding:16px}
.up-sum-h{font-size:13px;color:var(--ink);margin-bottom:12px}
.up-sum-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}
.up-sum-card{background:var(--bg2);border-radius:8px;padding:11px;text-align:center}
.usc-n{display:block;font-family:var(--disp);font-weight:800;font-size:22px;color:var(--amber)}
.usc-l{display:block;font-size:10px;color:var(--ink2);margin-top:3px}
.usc-s{display:block;font-family:var(--mono);font-size:8px;color:var(--ink3);margin-top:2px}

/* ==================== MODUL REKONSILIASI (Fase 3) ==================== */
/* 9. CSS — TAMBAHKAN ke <style> yang sudah ada di production_dashboard.html.
   Menggunakan CSS variables yang sama (--bg, --panel, --amber, dst) supaya
   konsisten dengan tema dashboard yang sudah ada. */

.rekon-topbar{display:flex;gap:8px;margin-bottom:14px}
.rekon-sel{background:var(--panel2);border:1px solid var(--line2);color:var(--ink);font-family:var(--mono);font-size:11.5px;padding:7px 11px;border-radius:8px}

.rekon-statusbar{background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:14px 16px;margin-bottom:12px;display:flex;align-items:center;gap:16px;flex-wrap:wrap}
.rekon-step{display:flex;align-items:center;gap:7px}
.rekon-step .circ{width:24px;height:24px;border-radius:50%;display:grid;place-items:center;font-family:var(--disp);font-weight:800;font-size:11px;flex-shrink:0}
.rekon-step.done .circ{background:var(--green);color:#0d1117}
.rekon-step.active .circ{background:var(--amber);color:#0d1117}
.rekon-step.pending .circ{background:var(--panel2);color:var(--ink3);border:1px solid var(--line2)}
.rekon-step .lbl{font-size:11.5px}
.rekon-step.done .lbl{color:var(--ink2)}
.rekon-step.active .lbl{color:var(--amber);font-weight:700}
.rekon-step.pending .lbl{color:var(--ink3)}
.rekon-sep{width:20px;height:1px;background:var(--line2)}
.rekon-final-btn{margin-left:auto;background:linear-gradient(135deg,#ffb020,#ff8a3d);color:#0d1117;border:none;font-family:var(--disp);font-weight:700;font-size:11.5px;padding:8px 14px;border-radius:8px;cursor:pointer}
.rekon-final-btn.rekon-btn-warn{background:rgba(255,91,110,.15);color:var(--red);border:1px solid rgba(255,91,110,.4)}
.rekon-warn-box{background:rgba(255,176,32,.08);border:1px solid rgba(255,176,32,.25);border-radius:10px;padding:10px 14px;margin-bottom:12px;font-size:11.5px;color:var(--ink2)}

.rekon-card{background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:16px;margin-bottom:12px}
.rekon-card h2{font-family:var(--disp);font-weight:700;font-size:14.5px;margin-bottom:4px}
.rekon-hint{font-size:11.5px;color:var(--ink2);line-height:1.6;margin-bottom:10px}

.rekon-stat-row{display:flex;gap:9px}
.rekon-stat{flex:1;background:var(--panel2);border:1px solid var(--line);border-radius:10px;padding:11px;text-align:center}
.rekon-stat .n{font-family:var(--disp);font-weight:800;font-size:20px}
.rekon-stat .l{font-size:8.5px;color:var(--ink3);font-family:var(--mono);text-transform:uppercase;letter-spacing:.4px;margin-top:2px}

.rekon-subnav{display:flex;gap:5px;margin-bottom:14px;border-bottom:1px solid var(--line)}
.rekon-subnav button{background:transparent;border:none;color:var(--ink3);font-family:var(--disp);font-weight:700;font-size:12px;padding:9px 14px;cursor:pointer;border-bottom:2px solid transparent}
.rekon-subnav button.on{color:var(--amber);border-bottom-color:var(--amber)}
.rekon-subnav button .n{font-family:var(--mono);font-weight:400;font-size:10px;color:var(--ink3);margin-left:4px}

.rekon-filterbar{display:flex;gap:7px;margin-bottom:11px;flex-wrap:wrap;align-items:center}
.rekon-txt{background:var(--bg2);border:1px solid var(--line);color:var(--ink);font-family:var(--mono);font-size:11px;padding:7px 10px;border-radius:8px;flex:1;min-width:180px}
.rekon-chip{background:var(--panel2);border:1px solid var(--line2);border-radius:99px;padding:4px 10px;font-size:10.5px;color:var(--ink2);cursor:pointer;display:flex;align-items:center;gap:5px}
.rekon-chip.on{background:rgba(255,176,32,.15);border-color:var(--amber);color:var(--amber)}
.rekon-chip .dot{width:6px;height:6px;border-radius:50%;background:var(--red)}

.rekon-table-wrap{max-height:520px;overflow-y:auto;border:1px solid var(--line);border-radius:10px}
.rekon-table{width:100%;border-collapse:collapse;font-size:11.5px}
.rekon-table thead{position:sticky;top:0;background:var(--bg2);z-index:5}
.rekon-table th{text-align:left;padding:8px 9px;color:var(--ink3);font-family:var(--mono);font-size:9px;text-transform:uppercase;letter-spacing:.3px;border-bottom:1px solid var(--line);white-space:nowrap}
.rekon-table td{padding:7px 9px;border-bottom:1px solid var(--line);white-space:nowrap}
.rekon-table tr:hover td{background:rgba(255,255,255,.02)}
.rekon-table tr.flagged td{background:rgba(255,176,32,.06)}
.rekon-table tr.flagged{border-left:2px solid var(--amber)}
.rekon-table .desc-cell{white-space:normal;max-width:260px;min-width:180px}
.rekon-table .flag-ic{color:var(--amber);margin-right:4px}

.rekon-table .editable{background:var(--panel2);border:1px solid var(--line2);border-radius:6px;padding:3px 7px;font-family:var(--mono);font-size:10.5px;color:var(--ink);cursor:pointer;display:inline-flex;align-items:center;gap:4px}
.rekon-table .editable:hover{border-color:var(--teal)}
.rekon-table .editable.changed{border-color:var(--amber);background:rgba(255,176,32,.1);color:var(--amber)}
.rekon-table .was-value{font-size:9px;color:var(--ink3);text-decoration:line-through;margin-right:3px}
.rekon-table .mini-btn{background:transparent;border:1px solid var(--line2);color:var(--ink3);font-size:9.5px;padding:3px 6px;border-radius:5px;cursor:pointer}

.edit-popover{background:var(--panel2);border:1px solid var(--teal);border-radius:8px;padding:5px;box-shadow:0 8px 24px rgba(0,0,0,.4);max-height:220px;overflow-y:auto}
.edit-popover .opt{padding:6px 10px;font-size:11px;border-radius:5px;cursor:pointer;color:var(--ink2);white-space:nowrap}
.edit-popover .opt:hover{background:var(--bg2);color:var(--ink)}
.edit-popover .opt.suggested{color:var(--amber)}
.edit-popover .opt.suggested::after{content:" ★";font-size:9px;color:var(--amber)}

.rekon-pagebar{display:flex;justify-content:space-between;align-items:center;margin-top:10px;font-size:11px;color:var(--ink2)}

.rekon-draftbar{position:sticky;bottom:12px;background:var(--panel);border:1px solid var(--amber);border-radius:14px;padding:13px 16px;margin-top:12px;box-shadow:0 -8px 24px rgba(0,0,0,.35)}
.rekon-draftbar-head{display:flex;align-items:center;gap:9px;margin-bottom:9px;flex-wrap:wrap}
.rekon-draftbar-head b{font-family:var(--disp);font-size:12.5px}
.rekon-draft-count{background:var(--amber);color:#0d1117;font-family:var(--mono);font-weight:800;font-size:10.5px;padding:2px 8px;border-radius:99px}
.rekon-draft-actions{display:flex;gap:7px}

.rekon-btn{background:var(--panel2);border:1px solid var(--line2);color:var(--ink);font-size:11px;padding:7px 12px;border-radius:8px;cursor:pointer;font-family:inherit;font-weight:600}
.rekon-btn.commit{background:linear-gradient(135deg,#ffb020,#ff8a3d);color:#0d1117;border:none;font-weight:800}
.rekon-btn.discard{background:rgba(255,91,110,.1);border-color:rgba(255,91,110,.3);color:var(--red)}
.rekon-btn.ok{background:rgba(61,220,132,.14);border-color:rgba(61,220,132,.4);color:var(--green);padding:6px 10px;font-size:10.5px}
.rekon-btn.fix{background:rgba(255,91,110,.14);border-color:rgba(255,91,110,.4);color:var(--red);padding:6px 10px;font-size:10.5px}
.rekon-btn.review{background:rgba(91,157,255,.14);border-color:rgba(91,157,255,.4);color:var(--blue);padding:6px 10px;font-size:10.5px}
.rekon-btn:disabled{opacity:.4;cursor:not-allowed}

.rekon-explain{background:rgba(58,214,196,.08);border:1px solid rgba(58,214,196,.25);border-radius:10px;padding:11px 14px;margin-bottom:12px;font-size:11.5px;line-height:1.6;color:var(--ink2)}
.rekon-explain b{color:var(--teal)}

.rekon-group-card{background:var(--panel2);border:1px solid var(--line2);border-radius:10px;padding:11px 14px;margin-bottom:8px;display:flex;align-items:flex-start;gap:11px;flex-wrap:wrap}
.rekon-count-badge{font-family:var(--disp);font-weight:800;font-size:15px;color:var(--amber);background:rgba(255,176,32,.12);border:1px solid rgba(255,176,32,.3);border-radius:8px;padding:2px 8px;flex-shrink:0}
.rekon-group-desc{font-size:12px;flex:1;min-width:200px}
.rekon-group-desc .from{color:var(--red);font-weight:600}
.rekon-group-desc .to{color:var(--green);font-weight:600}
.rekon-group-desc .tag-sebab{font-family:var(--mono);background:var(--bg2);padding:1px 6px;border-radius:4px}
.rekon-group-desc .trigger{font-size:10px;color:var(--ink3);margin-top:2px}
.rekon-group-desc .trigger code{background:var(--bg2);padding:1px 6px;border-radius:4px;color:var(--teal);font-family:var(--mono)}
.rekon-examples{margin-top:6px;font-size:10.5px;color:var(--ink2)}
.rekon-examples .example-row{padding:2px 0}
.rekon-action-row{display:flex;gap:5px;flex-shrink:0}

.rekon-matrix-table{width:100%;border-collapse:collapse;font-size:11.5px}
.rekon-matrix-table th{text-align:left;padding:8px 9px;color:var(--ink3);font-family:var(--mono);font-size:9.5px;text-transform:uppercase;border-bottom:1px solid var(--line)}
.rekon-matrix-table td{padding:8px 9px;border-bottom:1px solid var(--line)}
.bar-wrap{display:flex;align-items:center;gap:7px;min-width:180px}
.bar-track{flex:1;height:15px;border-radius:4px;overflow:hidden;display:flex;background:var(--bg2)}
.bar-op{background:var(--blue);height:100%}
.bar-tr{background:var(--purple);height:100%}
.status-pill{font-family:var(--mono);font-size:9px;padding:2px 7px;border-radius:99px;font-weight:700;text-transform:uppercase}
.status-pill.clean{background:rgba(61,220,132,.14);color:var(--green)}
.status-pill.mixed{background:rgba(255,176,32,.14);color:var(--amber)}

.rekon-loading{padding:40px;text-align:center;color:var(--ink3);font-family:var(--mono);font-size:12px}

</style>
</head>

/* Resolve tolerance factor for an event row, with priority:
   kat > sub > fungsi (most specific wins; never double). Returns {factor, rule} or {factor:1,rule:null}. */
function tolFor(r){
  const katName=DB.kat[r[3]], subName=DB.sub[r[11]], fnName=DB.fungsi[r[4]];
  // priority order
  for(const lvl of ['kat','sub','fungsi']){
    const name = lvl==='kat'?katName : lvl==='sub'?subName : fnName;
    const rule = STATE.tolRules.find(x=>x.level===lvl && x.target===name);
    if(rule) return {factor:rule.factor, rule, level:lvl};
  }
  return {factor:1, rule:null, level:null};
}
function netVal(r){ return r[5]*tolFor(r).factor; }
function rawVal(r){ return r[5]; }
/* Hitung cost Rupiah 1 baris downtime, 2 metode sekaligus:
   byJam = jam net downtime × Rp/jam produksi PU itu; byKL = Loss KL × Rp/KL PU itu. */
function costOfRow_(r){
  const cp=STATE.costParam[PU_NAME[r[0]]]||{costPerJam:0,costPerKL:0};
  return {byJam: netVal(r)*(cp.costPerJam||0), byKL: r[6]*(cp.costPerKL||0)};
}

  quality:{label:'Quality / NG',icon:'✓',ready:false,render:()=>placeholder('✓','Quality / Reject','Reject rate, NG kemasan, SN-NG & hold QC.',['Sheet: QUALITY_DATA','NG rate per line','Pareto jenis defect','Link ke downtime QC hold'])},
  capacity:{label:'Capacity vs Demand',icon:'▦',ready:false,render:()=>placeholder('▦','Capacity vs Demand','Utilisasi aktual vs kapasitas terpasang & proyeksi RJPP.',['Sheet: CAPACITY_DATA','Utilisasi per PU','Bottleneck forecast','Gap kapasitas tahunan'])},

/* ---- helpers ---- */
const fmt={
  n:(x,d=0)=>Number(x||0).toLocaleString('id-ID',{minimumFractionDigits:d,maximumFractionDigits:d}),
  rp:(x)=>{x=Number(x||0);if(x>=1e9)return 'Rp '+(x/1e9).toFixed(2)+' M';if(x>=1e6)return 'Rp '+(x/1e6).toFixed(1)+' jt';return 'Rp '+fmt.n(x);},
};
const PU_IDX={PUJ:0,PUC:1,PUG:2}, PU_NAME=['PUJ','PUC','PUG'], PU_TAG=['j','c','g'];
let charts=[]; const clearCharts=()=>{charts.forEach(c=>{try{c.destroy()}catch(e){}});charts=[];};

/* ---- FILTER raw rows by current STATE (period + PU + cross-filter AND) ---- */
function inPeriod(m){ return m>=STATE.mFrom && m<=STATE.mTo; }
function inPU(puIdx){ return STATE.pu==='ALL' || PU_IDX[STATE.pu]===puIdx; }

function xfMatchDT(r){
  const x=STATE.xf;
  if(x.fungsi!=null && r[4]!==x.fungsi) return false;
  if(x.mesin!=null && r[2]!==x.mesin) return false;
  if(x.kat!=null && r[3]!==x.kat) return false;
  if(x.sub!=null && r[11]!==x.sub) return false;
  return true;
}
function xfMatchOP(r){
  const x=STATE.xf;
  if(x.mesin!=null && r[2]!==x.mesin) return false;
  return true; // op rows tak punya fungsi/kategori; hanya mesin yang relevan
}
function filteredDT(){ return DB.dt.filter(r=>inPU(r[0])&&inPeriod(r[1])&&xfMatchDT(r)&&(!STATE.onlyRekonFlag||r[18]>=0)); }
function filteredOP(){ return DB.op.filter(r=>inPU(r[0])&&inPeriod(r[1])&&xfMatchOP(r)); }

/* toggle a cross-filter dimension by VALUE NAME; click same = off */
function toggleXF(dim, idx){
  if(STATE.xf[dim]===idx) STATE.xf[dim]=null; else STATE.xf[dim]=idx;
  STATE.drill=null; renderModule();
}
function togglePU(pu){
  STATE.pu = (STATE.pu===pu)?'ALL':pu;
  document.querySelectorAll('#puSeg button').forEach(b=>b.classList.toggle('on',b.dataset.pu===STATE.pu));
  STATE.drill=null; renderModule();
}
function clearXF(dim){ if(dim){STATE.xf[dim]=null;} else {STATE.xf={fungsi:null,mesin:null,kat:null,sub:null};STATE.pu='ALL';document.querySelectorAll('#puSeg button').forEach(b=>b.classList.toggle('on',b.dataset.pu==='ALL'));} STATE.drill=null; renderModule(); }
function hasXF(){ return STATE.xf.fungsi!=null||STATE.xf.mesin!=null||STATE.xf.kat!=null||STATE.xf.sub!=null||STATE.pu!=='ALL'; }

/* ---- AGGREGATE (live) ---- */
function aggregate(){
  const dt=filteredDT(), op=filteredOP();
  let totDtRaw=0,totDtNet=0,totLkl=0,totLrp=0;
  const byFungsi={},byMesinDt={},byKat={},byPu={0:0,1:0,2:0},byPuNet={0:0,1:0,2:0},byMonth={};
  for(const r of dt){
    const[pu,m,mi,ki,fi]=r;
    const raw=rawVal(r), net=netVal(r);
    totDtRaw+=raw; totDtNet+=net; totLkl+=r[6]; totLrp+=r[7];
    const fn=DB.fungsi[fi]||'-'; if(!byFungsi[fn])byFungsi[fn]={raw:0,net:0}; byFungsi[fn].raw+=raw; byFungsi[fn].net+=net;
    const me=DB.mesin[mi]||'-'; if(!byMesinDt[me])byMesinDt[me]={raw:0,net:0}; byMesinDt[me].raw+=raw; byMesinDt[me].net+=net;
    const ka=DB.kat[ki]||'-'; if(!byKat[ka])byKat[ka]={raw:0,net:0,n:0}; byKat[ka].raw+=raw; byKat[ka].net+=net; byKat[ka].n++;
    byPu[pu]+=raw; byPuNet[pu]+=net;
    if(!byMonth[m])byMonth[m]={raw:0,net:0,op:0}; byMonth[m].raw+=raw; byMonth[m].net+=net;
  }
  let totOp=0; const opByPu={0:0,1:0,2:0};
  for(const r of op){ const[pu,m,mi,o]=r; totOp+=o; opByPu[pu]+=o; if(!byMonth[m])byMonth[m]={raw:0,net:0,op:0}; byMonth[m].op+=o; }
  const dtrRaw=totOp>0?totDtRaw/totOp*100:0;
  const dtrNet=totOp>0?totDtNet/totOp*100:0;
  return {dt,op,totDtRaw,totDtNet,totOp,totLkl,totLrp,byFungsi,byMesinDt,byKat,byPu,byPuNet,opByPu,byMonth,dtrRaw,dtrNet};
}

/* Aggregate a dimension while IGNORING that dimension's own cross-filter
   (so its buttons still show all options to toggle). Other dims + PU + period still apply. */
function aggDim(dim){
  const x=STATE.xf;
  const rows=DB.dt.filter(r=>{
    if(!inPU(r[0])||!inPeriod(r[1])) return false;
    if(dim!=='fungsi' && x.fungsi!=null && r[4]!==x.fungsi) return false;
    if(dim!=='mesin'  && x.mesin!=null  && r[2]!==x.mesin)  return false;
    if(dim!=='kat'    && x.kat!=null     && r[3]!==x.kat)    return false;
    return true;
  });
  const out={};
  for(const r of rows){
    let key;
    if(dim==='fungsi')key=r[4]; else if(dim==='mesin')key=r[2]; else if(dim==='kat')key=r[3]; else key=r[0];
    if(!out[key])out[key]={raw:0,net:0,n:0};
    out[key].raw+=rawVal(r); out[key].net+=netVal(r); out[key].n++;
  }
  return out;
}
/* PU aggregation ignoring PU filter (for doughnut toggle) but applying xf dims + period */
function aggPU(){
  const x=STATE.xf;
  const out={0:{raw:0,net:0},1:{raw:0,net:0},2:{raw:0,net:0}};
  for(const r of DB.dt){
    if(!inPeriod(r[1])) continue;
    if(x.fungsi!=null&&r[4]!==x.fungsi)continue;
    if(x.mesin!=null&&r[2]!==x.mesin)continue;
    if(x.kat!=null&&r[3]!==x.kat)continue;
    out[r[0]].raw+=rawVal(r); out[r[0]].net+=netVal(r);
  }
  return out;
}

/* ============================================================ TABS */
function buildTabs(){
  const nav=document.getElementById('tabnav');
  nav.innerHTML=Object.entries(MODULES).map(([k,m])=>
    `<button class="tab ${k===STATE.module?'on':''}" data-mod="${k}"><span class="ic">${m.icon}</span>${m.label}${m.ready?'':'<span class="soon">soon</span>'}</button>`).join('');
  nav.querySelectorAll('.tab').forEach(t=>t.onclick=()=>{
    STATE.module=t.dataset.mod; STATE.drill=null;
    nav.querySelectorAll('.tab').forEach(x=>x.classList.toggle('on',x===t));
    renderModule();
    // scroll tab yang baru dipilih ke tengah area yang terlihat, kalau ada di luar view
    t.scrollIntoView({behavior:'smooth', block:'nearest', inline:'nearest'});
  });
  nav.addEventListener('scroll', updateTabFade);
  window.addEventListener('resize', updateTabFade);
  updateTabFade();
}
function scrollTabs(dir){
  const nav=document.getElementById('tabnav');
  if(nav) nav.scrollBy({left: dir*180, behavior:'smooth'});
}
function updateTabFade(){
  const nav=document.getElementById('tabnav');
  if(!nav) return;
  const maxScroll = nav.scrollWidth - nav.clientWidth;
  const atStart = nav.scrollLeft <= 4;
  const atEnd = nav.scrollLeft >= maxScroll - 4;
  const fadeL=document.getElementById('tabFadeLeft'), fadeR=document.getElementById('tabFadeRight');
  const btnL=document.getElementById('tabScrollLeft'), btnR=document.getElementById('tabScrollRight');
  if(fadeL) fadeL.classList.toggle('show', !atStart && maxScroll>4);
  if(fadeR) fadeR.classList.toggle('show', !atEnd && maxScroll>4);
  if(btnL) btnL.classList.toggle('show', !atStart && maxScroll>4);
  if(btnR) btnR.classList.toggle('show', !atEnd && maxScroll>4);
}
function renderModule(){
  clearCharts();
  document.getElementById('content').innerHTML='<div class="module on" id="mod"></div>';

function placeholder(icon,title,desc,plan){

function renderPeriodControls(){

      <div class="pm-pill" id="pmPill"></div>
      <button id="pmSingle" class="pm ${PERIOD_MODE==='single'?'on':''}" onclick="setPeriodMode('single')">Per Bulan</button>
      <button id="pmRange" class="pm ${PERIOD_MODE==='range'?'on':''}" onclick="setPeriodMode('range')">Rentang</button>
    </div>
    <div id="periodChips" class="period-chips"></div>
  </div>`;
}
let PERIOD_MODE='range';
function setPeriodMode(mode){
  PERIOD_MODE=mode;
  document.getElementById('pmSingle').classList.toggle('on',mode==='single');
  document.getElementById('pmRange').classList.toggle('on',mode==='range');
  const wrap=document.getElementById('periodModeWrap'); if(wrap) wrap.classList.toggle('mode-range',mode==='range');
  if(mode==='single'){ STATE.mFrom=STATE.mTo; } // collapse to single
  drawPeriodChips(); STATE.drill=null; renderModule();
}
function drawPeriodChips(){
  const months=DB.months||[1,2,3,4,5];
  const el=document.getElementById('periodChips'); if(!el)return;
  if(PERIOD_MODE==='single'){
    el.innerHTML=`<button class="pchip ${STATE.mFrom===0?'on':''}" onclick="pickSingle(0)">Semua</button>`+
      months.map(m=>`<button class="pchip ${STATE.mFrom===m&&STATE.mTo===m?'on':''}" onclick="pickSingle(${m})">${MN[m]}</button>`).join('');
  }else{
    el.innerHTML=`<span class="rng-lbl">Dari</span>`+
      months.map(m=>`<button class="pchip sm ${STATE.mFrom===m?'on':''}" onclick="pickRange('from',${m})">${MN[m]}</button>`).join('')+
      `<span class="rng-lbl">s/d</span>`+
      months.map(m=>`<button class="pchip sm ${STATE.mTo===m?'on':''}" onclick="pickRange('to',${m})">${MN[m]}</button>`).join('');
  }
}
function pickSingle(m){
  if(m===0){const months=DB.months;STATE.mFrom=Math.min(...months);STATE.mTo=Math.max(...months);}
  else{STATE.mFrom=m;STATE.mTo=m;}
  STATE.drill=null; drawPeriodChips(); renderModule();
}
function pickRange(which,m){
  if(which==='from'){STATE.mFrom=m; if(STATE.mTo<m)STATE.mTo=m;}
  else{STATE.mTo=m; if(STATE.mFrom>m)STATE.mFrom=m;}
  STATE.drill=null; drawPeriodChips(); renderModule();
}
function periodLabel(){
  if(STATE.mFrom===STATE.mTo)return MN[STATE.mFrom]+' 2026';
  return MN[STATE.mFrom]+'–'+MN[STATE.mTo]+' 2026';

function renderDowntime(el){
