/* ============================================================ TREN & GROUPING (align dengan OpTime) */
/* Cari PIC buat 1 baris downtime, prioritas kat > sub > fungsi (sama seperti tolFor). */
function picForRow_(r){
  const katName=DB.kat[r[3]], subName=DB.sub[r[11]], fnName=DB.fungsi[r[4]];
  for(const lvl of ['kat','sub','fungsi']){
    const name = lvl==='kat'?katName : lvl==='sub'?subName : fnName;
    const pic=(STATE.pic[lvl]||{})[name];
    if(pic) return pic;
  }
  return '';
}
const TREN_DIMS={fungsi:'Fungsi',kat:'Kategori',sebab:'Sebab',pic:'PIC',produk:'Produk',mesin:'Line/Mesin'};
function trenGroupKey_(r,dim){
  if(dim==='fungsi') return DB.fungsi[r[4]]||'(kosong)';
  if(dim==='kat') return DB.kat[r[3]]||'(kosong)';
  if(dim==='sebab') return DB.sebabList[r[16]]||'(kosong)';
  if(dim==='mesin') return DB.mesin[r[2]]||'(kosong)';
  if(dim==='produk') return (DB.produk&&r[19]!=null)?(DB.produk[r[19]]||'(kosong)'):'(kosong)';
  if(dim==='pic') return picForRow_(r)||'(belum ada PIC)';
  return '(kosong)';
}
/* Bangun data bulanan LINTAS SEMUA BULAN yang ada (bukan cuma periode yang lagi difilter,
   supaya trend-nya kelihatan utuh), tapi tetap hormati filter PU. Sekalian hitung OpTime
   total per bulan (dan per mesin per bulan) supaya downtime bisa "dialign" ke OpTime —
   jadi turunnya jam downtime nggak salah dibaca sebagai perbaikan kalau ternyata OpTime-nya
   juga turun (produksi lagi sepi). */
function trenMonthlyData_(dim){
  const rows = DB.dt.filter(r=>inPU(r[0]));
  const opRows = DB.op.filter(r=>inPU(r[0]));
  const months = [...new Set([...rows.map(r=>r[1]), ...opRows.map(r=>r[1])].filter(m=>m>0))].sort((a,b)=>a-b);
  const opByMonth={}, opByMesinMonth={};
  opRows.forEach(r=>{ opByMonth[r[1]]=(opByMonth[r[1]]||0)+r[3]; const k=DB.mesin[r[2]]+'|'+r[1]; opByMesinMonth[k]=(opByMesinMonth[k]||0)+r[3]; });
  const byGroupMonth={}, byMonth={};
  rows.forEach(r=>{
    const g=trenGroupKey_(r,dim), m=r[1], raw=rawVal(r), net=netVal(r);
    if(!byGroupMonth[g]) byGroupMonth[g]={};
    if(!byGroupMonth[g][m]) byGroupMonth[g][m]={raw:0,net:0,n:0};
    byGroupMonth[g][m].raw+=raw; byGroupMonth[g][m].net+=net; byGroupMonth[g][m].n++;
    if(!byMonth[m]) byMonth[m]={raw:0,net:0};
    byMonth[m].raw+=raw; byMonth[m].net+=net;
  });
  return {months, byGroupMonth, byMonth, opByMonth, opByMesinMonth};
}
function setTrenDim(d){ STATE.trenDim=d; renderModule(); }

function renderTrenGrouping(el){
  const dim=STATE.trenDim||'kat';
  const D=trenMonthlyData_(dim);
  const months=D.months;
  if(!months.length){
    el.innerHTML=`${renderPeriodControls()}<div class="placeholder"><div class="pic">📈</div><h2>Belum ada data</h2></div>`; return;
  }
  const lastM=months[months.length-1], prevM=months.length>1?months[months.length-2]:null;

  // urutan grup: total net terbesar dulu
  const groups=Object.keys(D.byGroupMonth).sort((a,b)=>{
    const ta=Object.values(D.byGroupMonth[a]).reduce((s,v)=>s+v.net,0);
    const tb=Object.values(D.byGroupMonth[b]).reduce((s,v)=>s+v.net,0);
    return tb-ta;
  });
  const top6=groups.slice(0,6), rest=groups.slice(6);

  // rasio keseluruhan per bulan (net/optime %) — konteks buat lihat "beneran turun atau optime-nya juga turun"
  const ratioOf=m=> (D.opByMonth[m]>0 ? D.byMonth[m].net/D.opByMonth[m]*100 : 0);
  const ratioLast=ratioOf(lastM), ratioPrev=prevM!=null?ratioOf(prevM):null;

  // tabel ranking per grup dgn delta bulan terakhir vs sebelumnya
  const rowsTable=groups.map(g=>{
    const cur=(D.byGroupMonth[g][lastM]||{net:0,raw:0,n:0});
    const prev=prevM!=null?(D.byGroupMonth[g][prevM]||{net:0,raw:0,n:0}):null;
    const delta = prev!=null ? cur.net-prev.net : null;
    // rasio pembanding: kalau dim=mesin, pakai optime mesin itu sendiri (akurat); selain itu pakai rasio total (konteks)
    let curRatio=null, prevRatio=null;
    if(dim==='mesin'){
      const opCur=D.opByMesinMonth[g+'|'+lastM]||0, opPrev=prevM!=null?(D.opByMesinMonth[g+'|'+prevM]||0):0;
      curRatio = opCur>0? cur.net/opCur*100 : null;
      prevRatio = (prevM!=null && opPrev>0) ? prev.net/opPrev*100 : null;
    }else{
      curRatio=ratioLast; prevRatio=ratioPrev;
    }
    const ratioDelta = (curRatio!=null && prevRatio!=null) ? curRatio-prevRatio : null;
    let badge='';
    if(delta!=null && Math.abs(delta)>0.05){
      if(delta<0){
        badge = (ratioDelta!=null && ratioDelta<=0.05)
          ? `<span class="chip dn">✅ Perbaikan nyata</span>`
          : `<span class="chip up">⚠ Jam turun, tapi rasio ${dim==='mesin'?'mesin ini':'keseluruhan'} tidak ikut turun — kemungkinan cuma karena OpTime turun juga</span>`;
      }else{
        badge = `<span class="chip up">🔺 Naik ${fmt.n(delta,2)} jam</span>`;
      }
    }
    return {g, cur, prev, delta, curRatio, ratioDelta, badge};
  });

  Chart.defaults.color='#9fb1c4';Chart.defaults.font.family="'Spline Sans Mono',monospace";Chart.defaults.font.size=11;Chart.defaults.borderColor='#2a3848';
  const palette=['#5b9dff','#3ad6c4','#a989ff','#ffb020','#ff8a3d','#85b7eb','#5a4a2a'];
  const datasets=top6.map((g,i)=>({type:'bar',label:g.length>18?g.slice(0,18)+'…':g,stack:'dt',
    data:months.map(m=>+((D.byGroupMonth[g][m]||{net:0}).net).toFixed(2)), backgroundColor:palette[i%palette.length]}));
  if(rest.length) datasets.push({type:'bar',label:'Lainnya',stack:'dt',
    data:months.map(m=>+rest.reduce((s,g)=>s+((D.byGroupMonth[g][m]||{net:0}).net),0).toFixed(2)), backgroundColor:'#33414f'});
  datasets.push({type:'line',label:'DT Ratio Net % (vs OpTime)',yAxisID:'y1',borderColor:'#ff5c5c',backgroundColor:'#ff5c5c',
    tension:.3,pointRadius:3,data:months.map(m=>+ratioOf(m).toFixed(1))});

  el.innerHTML=`
    ${renderPeriodControls()}
    ${renderBreadcrumb()}
    <div class="sec-label">Tren Bulanan & Grouping · di-align ke OpTime supaya "turun" gak salah dibaca sebagai perbaikan</div>
    <div class="panel" style="margin-bottom:14px;display:flex;gap:10px;flex-wrap:wrap;align-items:center">
      <span style="font-size:12px;color:var(--ink2)">Kelompokkan by:</span>
      ${Object.entries(TREN_DIMS).map(([k,label])=>`<button class="pchip ${dim===k?'on':''}" onclick="setTrenDim('${k}')">${label}</button>`).join('')}
    </div>
    <div class="panel" style="margin-bottom:14px">
      <div class="panel-h"><h3>Downtime Net per Bulan (stacked, top 6 ${TREN_DIMS[dim]}) vs DT Ratio</h3>
        <span class="hint">batang = jam net · garis merah = rasio thd OpTime — kalau batang turun tapi garis merah nggak ikut turun, itu tanda OpTime-nya juga lagi turun, bukan perbaikan murni</span></div>
      <div style="height:320px"><canvas id="trenGroupChart"></canvas></div>
    </div>
    <div class="panel" style="overflow-x:auto">
      <table class="md-table">
        <thead><tr><th>${TREN_DIMS[dim]}</th><th class="num">Net Bulan Ini</th><th class="num">Net Bulan Lalu</th><th class="num">Δ Jam</th><th>Catatan</th></tr></thead>
        <tbody>
          ${rowsTable.map(x=>`<tr>
            <td>${x.g}</td>
            <td class="num">${fmt.n(x.cur.net,2)}</td>
            <td class="num" style="color:var(--ink3)">${x.prev?fmt.n(x.prev.net,2):'-'}</td>
            <td class="num" style="color:${x.delta==null?'var(--ink3)':x.delta<0?'var(--teal,#3ad6c4)':'var(--amber)'}">${x.delta==null?'-':(x.delta>0?'+':'')+fmt.n(x.delta,2)}</td>
            <td style="font-size:11px">${x.badge||'-'}</td>
          </tr>`).join('')}
        </tbody>
      </table>
      <div style="padding:10px 4px;font-size:11px;color:var(--ink3)">
        ${dim==='mesin' ? 'Rasio dihitung per mesin (akurat, OpTime mesin itu sendiri).' : `Rasio konteks pakai DT Ratio total (semua mesin, PU ${STATE.pu==='ALL'?'semua':STATE.pu}) karena OpTime tidak dipecah per ${TREN_DIMS[dim].toLowerCase()} — dipakai buat sanity-check, bukan rasio eksak per baris.`}
      </div>
    </div>`;
  charts.push(new Chart(document.getElementById('trenGroupChart'),{
    data:{labels:months.map(m=>MN[m]), datasets},
    options:{responsive:true,maintainAspectRatio:false,
      plugins:{legend:{labels:{boxWidth:10,font:{size:10}}}},
      scales:{
        y:{stacked:true,beginAtZero:true,grid:{color:'#1f2a36'},title:{display:true,text:'jam'}},
        y1:{position:'right',min:0,grid:{display:false},ticks:{callback:v=>v+'%'},title:{display:true,text:'DT Ratio %'}},
        x:{stacked:true,grid:{display:false}}
      }}}));
}

/* Auto-insight: highlight 3-4 hal penting otomatis */
function renderAutoInsight(A){
  const insights=[];
  // 1. MoM: kategori naik tertajam vs bulan sebelumnya (dalam periode)
  const months=Object.keys(A.byMonth).map(Number).sort((a,b)=>a-b);
  if(months.length>=2){
    const last=months[months.length-1], prev=months[months.length-2];
    const opL=A.byMonth[last].op||1, opP=A.byMonth[prev].op||1;
    const dtrL=A.byMonth[last].net/opL*100, dtrP=A.byMonth[prev].net/opP*100;
    const d=dtrL-dtrP;
    if(Math.abs(d)>0.3) insights.push({type:d>0?'bad':'good',icon:d>0?'▲':'▼',
      txt:`DT Ratio ${MN[last]} ${d>0?'naik':'turun'} <b>${Math.abs(d).toFixed(1)} poin</b> vs ${MN[prev]} (${dtrL.toFixed(1)}%)`});
  }
  // 2. Waiting dominance
  const byCls={}; for(const r of A.dt){const c=DB.cls[r[14]];byCls[c]=(byCls[c]||0)+netVal(r);}
  const totC=Object.values(byCls).reduce((s,x)=>s+x,0)||1;
  if(byCls['Waiting']&&byCls['Waiting']/totC>0.4) insights.push({type:'warn',icon:'⏳',
    txt:`<b>Waiting ${(byCls['Waiting']/totC*100).toFixed(0)}%</b> dari downtime — akar di koordinasi/supply, bukan mesin`});
  // 3. fungsi paling jauh di atas target
  let worstF=null,worstGap=-99;
  Object.entries(A.byFungsi).forEach(([fn,v])=>{
    const tgt=STATE.targets[fn]; if(tgt==null)return;
    const dtr=v.net/A.totOp*100, gap=dtr-tgt*100;
    if(gap>worstGap){worstGap=gap;worstF=fn;}
  });
  if(worstF&&worstGap>0.5) insights.push({type:'bad',icon:'🎯',
    txt:`<b>${worstF}</b> paling jauh di atas target (+${worstGap.toFixed(1)} poin) — prioritas tindak lanjut`});
  // 4. repeat offender teratas
  const ro={}; for(const r of A.dt){const k=r[0]+'|'+r[2]+'|'+r[3];if(!ro[k])ro[k]={n:0,pu:r[0],mi:r[2],ki:r[3]};ro[k].n++;}
  const top=Object.values(ro).sort((a,b)=>b.n-a.n)[0];
  if(top&&top.n>50) insights.push({type:'warn',icon:'🔁',
    txt:`Repeat offender teratas: <b>${DB.mesin[top.mi]} · ${DB.kat[top.ki]}</b> (${top.n}× di ${PU_NAME[top.pu]})`});

  if(!insights.length) return '';
  return `<div class="auto-insight">
    <div class="ai-ttl">⚡ Yang Perlu Perhatian</div>
    <div class="ai-items">${insights.slice(0,4).map(i=>`<div class="ai-item ${i.type}"><span class="ai-ic">${i.icon}</span><span>${i.txt}</span></div>`).join('')}</div>
  </div>`;
}

function openTolModal(){ STATE._tolDraft=JSON.parse(JSON.stringify(STATE.tolRules)); STATE._tolMsg=''; renderTolModal(); }

function tolConflict(draft, level, target){
  // returns conflict message or null. Rules:
  // fungsi<->sub parent-child block; kat is independent (priority handles overlap, no block)
  if(level==='fungsi'){
    // block if any SUB of this fungsi already has a rule
    const subs=(DB.sub_struct[target]||[]);
    const clash=draft.find(r=>r.level==='sub'&&subs.includes(r.target));
    if(clash) return `"${clash.target}" (sub dari ${target}) sudah punya toleransi. Hapus dulu aturan sub-nya, atau atur per-sub.`;
    if(draft.find(r=>r.level==='fungsi'&&r.target===target)) return `${target} sudah ada aturannya.`;
  }
  if(level==='sub'){
    // find parent fungsi of this sub
    let parent=null; for(const f in DB.sub_struct){ if(DB.sub_struct[f].includes(target)){parent=f;break;} }
    if(parent && draft.find(r=>r.level==='fungsi'&&r.target===parent)) return `${parent} (fungsi induk) sudah punya toleransi yang mencakup semua sub. Hapus dulu aturan fungsi-nya.`;
    if(draft.find(r=>r.level==='sub'&&r.target===target)) return `${target} sudah ada aturannya.`;
  }
  if(level==='kat'){
    if(draft.find(r=>r.level==='kat'&&r.target===target)) return `${target} sudah ada aturannya.`;
  }
  return null;
}
function addTolRule(){
  const level=document.getElementById('tolLevel').value;
  const target=document.getElementById('tolTarget').value;

  if(isNaN(factor)||factor<0||factor>1){ STATE._tolMsg='⚠ Toleransi harus 0–1.'; renderTolModal(); return; }
  const conflict=tolConflict(STATE._tolDraft, level, target);
  if(conflict){ STATE._tolMsg='⛔ '+conflict; renderTolModal(); return; }
  STATE._tolDraft.push({level,target,factor});
  STATE._tolMsg='✓ Aturan ditambahkan.';
  renderTolModal();
}

/* Aggregate sub-fungsi of a fungsi (respects period+PU+other xf, ignores own sub filter) */
function aggSub(fnName){
  const fi=DB.fungsi.indexOf(fnName);
  const out={};
  for(const r of DB.dt){
    if(r[4]!==fi) continue;
    if(!inPU(r[0])||!inPeriod(r[1])) continue;
    if(STATE.xf.mesin!=null&&r[2]!==STATE.xf.mesin)continue;
    if(STATE.xf.kat!=null&&r[3]!==STATE.xf.kat)continue;
    const sub=r[11];
    if(!out[sub])out[sub]={raw:0,net:0,n:0,byPu:{0:{raw:0,net:0},1:{raw:0,net:0},2:{raw:0,net:0}}};
    const raw=rawVal(r),net=netVal(r);
    out[sub].raw+=raw; out[sub].net+=net; out[sub].n++;
    out[sub].byPu[r[0]].raw+=raw; out[sub].byPu[r[0]].net+=net;
  }
  return out;
}
/* aggregate Production by PU (Process Eng components only — excludes RMP) for per-PU cards */
function aggProductionPU(){
  const fi=DB.fungsi.indexOf('Production');
  const peIdx=DB.sub.indexOf('Process Eng');
  const out={0:{raw:0,net:0,n:0},1:{raw:0,net:0,n:0},2:{raw:0,net:0,n:0}};
  for(const r of DB.dt){
    if(r[4]!==fi||r[11]!==peIdx) continue;
    if(!inPeriod(r[1])) continue;
    if(STATE.pu!=='ALL'&&PU_IDX[STATE.pu]!==r[0]) continue;
    out[r[0]].raw+=rawVal(r); out[r[0]].net+=netVal(r); out[r[0]].n++;
  }
  return out;
}

/* Tabel khusus Production: baris PUJ/PUC/PUG (Process Eng per PU) + RMP (ikut total) + Process Eng ringkasan (tidak ikut total) */
function renderProductionSubsTable(A,sd,totOp,meta){
  const pePU=aggProductionPU();
  const puNames=['Production Unit Jakarta','Production Unit Cilacap','Production Unit Gresik'];
  const puTgts=[DB.targets_pu.PUJ,DB.targets_pu.PUC,DB.targets_pu.PUG].map(x=>x*100);
  const peIdx=DB.sub.indexOf('Process Eng');

  const puRows=[0,1,2].map(i=>{
    const v=pePU[i]; const dtr=v.net/totOp*100; const tgt=puTgts[i];
    const st=statusBadge(dtr,tgt); const cut=v.raw-v.net;
    return `<tr onclick="togglePU('${PU_NAME[i]}')">
      <td>${puNames[i]} <span class="tag ${PU_TAG[i]}">${PU_NAME[i]}</span></td>
      <td class="r">${dtr.toFixed(2)}%</td>
      <td class="r">${fmt.n(v.net)}</td>
      <td class="r">${v.n}</td>
      <td class="r">${cut>0?'−'+fmt.n(cut):'–'}</td>
      <td>${st.html||'–'}</td>
    </tr>`;
  }).join('');

  // RMP (ikut total)
  const rmpIdx=DB.sub.indexOf('Production RMP');
  const rmpV=sd[rmpIdx]||{raw:0,net:0,n:0};
  const rmpDtr=rmpV.net/totOp*100;
  const rmpTgt=DB.targets_sub&&DB.targets_sub['Production RMP']!=null?DB.targets_sub['Production RMP']*100:null;
  const rmpSt=statusBadge(rmpDtr,rmpTgt);
  const rmpActive=STATE.xf.sub===rmpIdx;
  const rmpCut=rmpV.raw-rmpV.net;
  const rmpRow=`<tr class="${rmpActive?'xf-on':''}" onclick="toggleXF('sub',${rmpIdx})">
    <td>Production RMP</td>
    <td class="r">${rmpDtr.toFixed(2)}%</td>
    <td class="r">${fmt.n(rmpV.net)}</td>
    <td class="r">${rmpV.n}</td>
    <td class="r">${rmpCut>0?'−'+fmt.n(rmpCut):'–'}</td>
    <td>${rmpSt.html||'–'}</td>
  </tr>`;

  // Process Eng (ringkasan, TIDAK ikut total -- ditandai jelas beda baris/section)
  const peV=sd[peIdx]||{raw:0,net:0,n:0};
  const peDtr=peV.net/totOp*100;
  const peTgt=DB.targets_sub['Process Eng']*100;
  const peSt=statusBadge(peDtr,peTgt);
  const peActive=STATE.xf.sub===peIdx;
  const peCut=peV.raw-peV.net;
  const peRow=`<tr class="pe-row ${peActive?'xf-on':''}" onclick="toggleXF('sub',${peIdx})">
    <td>Process Eng <span class="pe-tag">RINGKASAN PU, TIDAK IKUT TOTAL</span></td>
    <td class="r">${peDtr.toFixed(2)}%</td>
    <td class="r">${fmt.n(peV.net)}</td>
    <td class="r">${peV.n}</td>
    <td class="r">${peCut>0?'−'+fmt.n(peCut):'–'}</td>
    <td>${peSt.html||'–'}</td>
  </tr>`;

  return `<div class="subtable-wrap">
    <div class="subcards-lbl" style="color:${meta.color}">▾ Sub-fungsi Production <span class="sc-hint">PU & RMP dijumlah ke total · Process Eng hanya ringkasan</span></div>
    <table class="subtable">
      <thead><tr><th>Sub-fungsi</th><th class="r">DT Ratio</th><th class="r">Net (jam)</th><th class="r">Event</th><th class="r">Toleransi</th><th>Status</th></tr></thead>
      <tbody>${puRows}${rmpRow}<tr class="subtable-sep"><td colspan="6">Ringkasan (tidak dijumlah ke total)</td></tr>${peRow}</tbody>
    </table>
  </div>`;
}

function renderKpiTable(A){
  const pri=['Production','Technical Services','Quality Assurance','Distribution'];
  const order=pri.filter(f=>A.byFungsi[f]).map(f=>[f,A.byFungsi[f]]);
  Object.keys(A.byFungsi).forEach(f=>{ if(!pri.includes(f)) order.push([f,A.byFungsi[f]]); });
  let html=order.map(([fn,v])=>{
    const dtr=A.totOp>0?v.net/A.totOp*100:0;
    const tgt=STATE.targets[fn]!=null?STATE.targets[fn]*100:null;
    const perf=tgt&&dtr>0?Math.min(tgt/dtr,1.1):null;
    const ok=tgt!=null&&dtr<=tgt;
    const isBlank=(fn==='-'||fn==='nan'||!fn.trim());
    return `<tr>
      <td style="color:var(--ink)">${isBlank?'Belum Terkategori':fn}</td>
      <td class="num" style="color:var(--ink3)">${fmt.n(v.raw)}</td>
      <td class="num" style="color:var(--amber)">${fmt.n(v.net)}</td>
      <td class="num">${dtr.toFixed(2)}%</td>
      <td class="num">${tgt!=null?`<input class="tgt-input" value="${tgt.toFixed(2)}" onchange="editTarget('${fn.replace(/'/g,"\\'")}',this.value)">%`:'—'}</td>
      <td class="num">${perf!=null?(perf*100).toFixed(0)+'%':'—'}</td>
      <td>${tgt!=null?`<span class="tag" style="${ok?'background:rgba(61,220,132,.15);color:var(--green)':'background:rgba(255,91,110,.15);color:var(--red)'}">${ok?'✓ on target':'di atas'}</span>`:''}</td>
    </tr>`;
  }).join('');
  const dtrTot=A.dtrNet, tgtTot=(DB.target_dirops||0.2738)*100, perfTot=dtrTot>0?Math.min(tgtTot/dtrTot,1.1):0, okTot=dtrTot<=tgtTot;
  html+=`<tr style="border-top:2px solid var(--line2)">
    <td style="color:var(--amber);font-family:var(--disp);font-weight:700">DIREKTORAT OPERASI</td>
    <td class="num">${fmt.n(A.totDtRaw)}</td><td class="num" style="color:var(--amber)">${fmt.n(A.totDtNet)}</td>
    <td class="num">${dtrTot.toFixed(2)}%</td><td class="num">${tgtTot.toFixed(2)}%</td>
    <td class="num">${(perfTot*100).toFixed(0)}%</td>
    <td><span class="tag" style="${okTot?'background:rgba(61,220,132,.15);color:var(--green)':'background:rgba(255,91,110,.15);color:var(--red)'}">${okTot?'✓ on target':'di atas'}</span></td></tr>`;
  document.querySelector('#kpiTable tbody').innerHTML=html;
  const hint=document.getElementById('kpiHint');
  if(hint){ hint.innerHTML = targetsChanged()
    ? `<button class="reset-tgt-btn" onclick="resetTargets()">↺ Reset target ke default</button>`
    : 'Raw | Net | Target | Performance'; }
}
function editTarget(fn,val){ const v=parseFloat(val); if(!isNaN(v)){ STATE.targets[fn]=v/100; renderModule(); } }
function targetsChanged(){
  const def=DB.targets_fungsi||{};
  return Object.keys(def).some(k=>Math.abs((STATE.targets[k]||0)-def[k])>1e-9);
}
function resetTargets(){ STATE.targets=Object.assign({}, DB.targets_fungsi||{}); renderModule(); }

/* ---- Repeat offender ---- */
function renderRepeatOffender(A){
  const map={};
  for(const r of A.dt){ const key=r[0]+'|'+r[2]+'|'+r[3]; if(!map[key])map[key]={pu:r[0],mi:r[2],ki:r[3],dt:0,n:0}; map[key].dt+=netVal(r);map[key].n++; }
  const arr=Object.values(map).sort((a,b)=>b.n-a.n).slice(0,12);
  const max=Math.max(...arr.map(r=>r.n),1);
  document.querySelector('#roTable tbody').innerHTML=arr.map((r)=>`
    <tr style="cursor:pointer" onclick="drillRO(${r.pu},${r.mi},${r.ki})">
      <td><span class="tag ${PU_TAG[r.pu]}">${PU_NAME[r.pu]}</span></td>
      <td style="color:var(--ink)">${DB.mesin[r.mi]||'-'}</td>
      <td>${DB.kat[r.ki]||'-'}</td>
      <td class="num">${r.n}</td><td class="num">${fmt.n(r.dt)}</td>
      <td><div class="barcell"><i style="width:${(r.n/max*100).toFixed(0)}%"></i></div></td></tr>`).join('');
}

/* badge showing tolerance source rule */
function tolBadge(r){
  const t=tolFor(r);
  if(!t.rule) return '';
  const lvlName={fungsi:'Fungsi',sub:'Sub',kat:'Kat'};
  return ` <span class="tol-badge" title="${lvlName[t.level]}: ${t.rule.target}">×${t.factor} ${lvlName[t.level]}</span>`;
}
/* Badge untuk baris downtime yang sudah dikoreksi lewat modul Rekonsiliasi.
   r[18] adalah index ke DB.koreksiInfo[] (-1 jika baris ini tidak pernah dikoreksi). */
function rekonInfoFor(r){
  const idx=r[18];
  if(idx==null || idx<0 || !DB.koreksiInfo || !DB.koreksiInfo[idx]) return null;
  return DB.koreksiInfo[idx];
}
function rekonBadge(r){
  const info=rekonInfoFor(r);
  if(!info) return '';
  const waktu = info.waktuCommit ? new Date(info.waktuCommit).toLocaleDateString('id-ID',{day:'numeric',month:'short',year:'numeric'}) : '-';
  const asli = [info.kategoriAsli, info.sebabAsli].filter(Boolean).join(' / ');
  const title = `Hasil rekonsiliasi — semula: ${asli||'-'} · diubah oleh ${info.diubahOleh||'-'} · ${waktu}`;
  return ` <span class="rekon-flag-badge" title="${title}">🔍 direkonsiliasi</span>`;
}
function renderEventTable(A){
  const rows=A.dt.slice().sort((a,b)=>b[5]-a[5]);
  const pageSize=100;
  const totalPage=Math.max(1, Math.ceil(rows.length/pageSize));
  if(!STATE.eventPage || STATE.eventPage>totalPage) STATE.eventPage=1;
  const start=(STATE.eventPage-1)*pageSize;
  const show=rows.slice(start, start+pageSize);
  const totRaw=rows.reduce((s,r)=>s+r[5],0), totNet=rows.reduce((s,r)=>s+netVal(r),0);
  document.getElementById('eventCount').textContent=`${rows.length.toLocaleString('id-ID')} event`;
  document.querySelector('#eventTable tbody').innerHTML=show.map(r=>{
    const raw=r[5], net=netVal(r), tb=tolFor(r), tol=tb.rule?1:0;
    return `<tr><td class="mono">${r[9]||'-'}</td><td><span class="tag ${PU_TAG[r[0]]}">${PU_NAME[r[0]]}</span></td><td class="mono">${r[10]||'-'}</td><td>${DB.mesin[r[2]]||'-'}</td><td>${DB.kat[r[3]]||'-'}${tolBadge(r)}${rekonBadge(r)}</td><td style="color:var(--ink2)">${r[8]||'<i style=opacity:.4>tanpa detail</i>'}</td><td class="num" style="color:var(--ink3)">${fmt.n(raw,2)}</td><td class="num" style="color:${tol?'var(--amber)':'var(--ink2)'}">${fmt.n(net,2)}</td></tr>`;
  }).join('');
  document.getElementById('eventFoot').innerHTML=`
    <span>Halaman ${STATE.eventPage}/${totalPage} · menampilkan ${show.length} dari ${rows.length.toLocaleString('id-ID')} event · Total: raw ${fmt.n(totRaw)} → net ${fmt.n(totNet)} jam</span>
    <span class="event-pager">
      <button class="mini-btn" ${STATE.eventPage<=1?'disabled':''} onclick="changeEventPage(-1)">← Sebelumnya</button>
      <button class="mini-btn" ${STATE.eventPage>=totalPage?'disabled':''} onclick="changeEventPage(1)">Berikutnya →</button>
    </span>`;
}
function changeEventPage(delta){
  STATE.eventPage=(STATE.eventPage||1)+delta;
  renderEventTable(aggregate());
}

/* ============================================================ DRILL-DOWN (inline expand) */
function drillTable(rows,title,subtitle,targetId){
  rows.sort((a,b)=>b[5]-a[5]);
  const show=rows.slice(0,50);
  const html=`<div class="drill" id="drillBox">
    <div class="drill-h"><div><span class="drill-t">${title}</span><span class="drill-sub">${subtitle}</span></div>
      <button class="drill-x" onclick="closeDrill('${targetId}')">✕ Tutup</button></div>
    <div class="drill-scroll"><table><thead><tr><th>Tgl</th><th>PU</th><th>Line</th><th>Mesin</th><th>Kategori</th><th>Keluhan Operator</th><th class="num">Raw</th><th class="num">Net</th></tr></thead>
      <tbody>${show.map(r=>{
        const raw=r[5], net=netVal(r), tb=tolFor(r), tol=tb.rule?1:0;
        return `<tr><td class="mono">${r[9]||'-'}</td><td><span class="tag ${PU_TAG[r[0]]}">${PU_NAME[r[0]]}</span></td><td class="mono">${r[10]||'-'}</td><td>${DB.mesin[r[2]]||'-'}</td><td>${DB.kat[r[3]]||'-'}${tolBadge(r)}${rekonBadge(r)}</td><td style="color:var(--ink2)">${r[8]||'<i style=opacity:.4>tanpa detail</i>'}</td><td class="num" style="color:var(--ink3)">${fmt.n(raw,2)}</td><td class="num" style="color:${tol?'var(--amber)':'var(--ink2)'}">${fmt.n(net,2)}</td></tr>`;
      }).join('')}</tbody></table></div>
    ${rows.length>50?`<div class="drill-more">Menampilkan 50 dari ${rows.length} event (urut durasi terbesar) · badge = aturan toleransi</div>`:`<div class="drill-more">badge = aturan toleransi yang berlaku per event</div>`}
  </div>`;
  const t=document.getElementById(targetId); t.innerHTML=html;
  t.scrollIntoView({behavior:'smooth',block:'nearest'});
}
function closeDrill(id){document.getElementById(id).innerHTML='';}

/* ---- Simulator ---- */
function buildSimulator(A,dtrNet){
  const top=Object.entries(A.byKat).map(([k,v])=>({kat:k,dt:v.net})).sort((a,b)=>b.dt-a.dt).slice(0,4);
  document.getElementById('simControl').innerHTML=top.map((k,i)=>`
    <div class="sim-row"><label>${k.kat.length>26?k.kat.slice(0,26)+'…':k.kat} <b id="simVal${i}">0%</b></label>
    <input type="range" min="0" max="100" value="0" data-dt="${k.dt}" id="simSld${i}" oninput="recalcSim()"></div>`).join('');
  window._simBase={totDt:A.totDtNet,totOp:A.totOp,dtr:dtrNet};
  recalcSim();
}
function recalcSim(){
  const b=window._simBase;if(!b)return;let reduced=0;
  document.querySelectorAll('[id^=simSld]').forEach((s,i)=>{const pct=+s.value;document.getElementById('simVal'+i).textContent=pct+'%';reduced+=(+s.dataset.dt)*(pct/100);});
  const newDt=b.totDt-reduced,newDtr=b.totOp>0?(newDt/b.totOp)*100:0,delta=b.dtr-newDtr;
  document.getElementById('simAvail').textContent=newDtr.toFixed(1)+'%';
  document.getElementById('simDelta').innerHTML=reduced>0?`Downtime turun <b>${fmt.n(reduced)} jam</b> → DT Ratio <b>−${delta.toFixed(1)} poin</b>`:'Geser slider untuk lihat dampak';
}

/* ============================================================ AI */
async function callClaude(prompt,maxTokens=2000){
  const res=await fetch("https://api.anthropic.com/v1/messages",{method:"POST",headers:{"Content-Type":"application/json"},
    body:JSON.stringify({model:"claude-sonnet-4-6",max_tokens:maxTokens,messages:[{role:"user",content:prompt}]})});
  const data=await res.json();
  return data.content.filter(b=>b.type==='text').map(b=>b.text).join('\n');
}
async function runCluster(){
  const btn=document.getElementById('clusterBtn'),out=document.getElementById('clusterOut');
  btn.disabled=true;btn.innerHTML='<span class="spinner"></span> Menganalisis…';out.classList.add('show');
  out.innerHTML='<div class="thinking"><span class="spinner"></span> AI membaca istilah operator & mengelompokkan…</div>';
  const items=DB.detail_freq.slice(0,80).map(x=>`"${x.detail}" (${x.n}x, kat:${x.kat})`).join('\n');
  const prompt=`Kamu analis process engineering di pabrik pelumas (Pertamina Lubricants). Berikut daftar istilah downtime yang ditulis operator dengan bahasa tidak seragam, beserta frekuensi & kategori saat ini:\n\n${items}\n\nTugas: kelompokkan istilah yang MAKSUDNYA SAMA tapi ditulis berbeda. Untuk tiap kelompok, usulkan SATU istilah baku yang singkat & jelas.\n\nBalas HANYA JSON valid (tanpa markdown/backtick), format:\n{"clusters":[{"baku":"istilah baku usulan","varian":["variasi1","variasi2"],"total_event":angka,"rekomendasi":"saran singkat 1 kalimat"}]}\n\nMaksimal 8 cluster paling impactful.`;
  try{let txt=await callClaude(prompt);txt=txt.replace(/```json|```/g,'').trim();const j=JSON.parse(txt);

/* helper: aggregate filtered dt by a given row-index dimension */
function aggByIndex(idx,nameArr){
  const dt=filteredDT();
  const out={};
  for(const r of dt){ const key=r[idx]; if(!out[key])out[key]={net:0,raw:0,n:0,rp:0}; out[key].net+=netVal(r);out[key].raw+=rawVal(r);out[key].n++;out[key].rp+=r[7]; }
  return out;
}

/* ---- 2. Chronic vs Sporadic (frekuensi vs durasi) ---- */
function renderChronic(el){
  const A=aggregate();
  // per kategori: total net, event count, avg duration per event
  const arr=Object.entries(A.byKat).map(([k,v])=>({kat:k,net:v.net,n:v.n,avg:v.n>0?v.net/v.n:0})).filter(x=>x.n>0);
  const totNet=arr.reduce((s,x)=>s+x.net,0)||1;
  const totN=arr.reduce((s,x)=>s+x.n,0)||1;
  const avgGlobal=totNet/totN;
  // classify: chronic = banyak event (>median n) & durasi pendek; sporadic = sedikit event & durasi panjang
  const ns=arr.map(x=>x.n).sort((a,b)=>a-b); const medN=ns[Math.floor(ns.length/2)]||1;
  arr.forEach(x=>{
    x.chronic = x.n>=medN && x.avg<avgGlobal;
    x.sporadic = x.n<medN && x.avg>=avgGlobal;
    x.type = x.chronic?'chronic':(x.sporadic?'sporadic':'mixed');
  });
  const top=arr.sort((a,b)=>b.net-a.net).slice(0,14);
  const maxN=Math.max(...top.map(x=>x.n)); const maxAvg=Math.max(...top.map(x=>x.avg));

  el.innerHTML=`
    <div class="an-intro">Memisahkan downtime <b style="color:var(--red)">chronic</b> (sering tapi pendek — masalah proses berulang) dari <b style="color:var(--amber)">sporadic</b> (jarang tapi panjang — kegagalan besar). Treatment-nya beda: chronic dikejar standardisasi, sporadic dikejar keandalan/maintenance.</div>
    <div class="grid g2">
      <div class="panel"><div class="panel-h"><h3>Peta Frekuensi × Durasi</h3><span class="hint">posisi tiap kategori</span></div>
        <div class="scatter" id="scatterBox"></div>
        <div class="scatter-legend"><span><i style="background:var(--red)"></i> Chronic (sering, pendek)</span><span><i style="background:var(--amber)"></i> Sporadic (jarang, panjang)</span><span><i style="background:var(--ink3)"></i> Mixed</span></div>
      </div>
      <div class="panel"><div class="panel-h"><h3>Klasifikasi Kategori</h3><span class="hint">net jam · event · rata-rata/event</span></div>
        <table class="md-table"><thead><tr><th>Kategori</th><th>Tipe</th><th class="num">Event</th><th class="num">Net Jam</th><th class="num">Rata²/event</th></tr></thead>
        <tbody>${top.map(x=>`<tr><td>${x.kat.length>26?x.kat.slice(0,26)+'…':x.kat}</td><td><span class="chr-tag ${x.type}">${x.type==='chronic'?'Chronic':x.type==='sporadic'?'Sporadic':'Mixed'}</span></td><td class="num">${x.n}</td><td class="num">${fmt.n(x.net)}</td><td class="num">${fmt.n(x.avg,1)} jam</td></tr>`).join('')}</tbody></table>
      </div>
    </div>`;
  // simple scatter (CSS positioned)
  const box=document.getElementById('scatterBox');
  box.innerHTML=`<div class="sc-yaxis">durasi rata²/event →</div><div class="sc-xaxis">frekuensi event →</div>`+
    top.map(x=>{
      const left=8+(x.n/maxN*82); const bottom=8+(x.avg/maxAvg*78);
      const col=x.type==='chronic'?'var(--red)':x.type==='sporadic'?'var(--amber)':'var(--ink3)';
      const sz=8+Math.sqrt(x.net)/2;
      return `<div class="sc-dot" style="left:${left}%;bottom:${bottom}%;width:${sz}px;height:${sz}px;background:${col}" title="${x.kat}: ${x.n} event, ${fmt.n(x.avg,1)} jam/event"></div>`;
    }).join('');
}

/* ---- 3. Perbandingan Periode (MoM) ---- */
function renderMoM(el){
  // build per-month aggregates regardless of period filter (full year), respect PU + xf
  const monthly={};
  for(const r of DB.dt){
    if(STATE.pu!=='ALL'&&PU_IDX[STATE.pu]!==r[0])continue;
    if(STATE.xf.fungsi!=null&&r[4]!==STATE.xf.fungsi)continue;
    if(STATE.xf.mesin!=null&&r[2]!==STATE.xf.mesin)continue;
    if(STATE.xf.kat!=null&&r[3]!==STATE.xf.kat)continue;
    if(STATE.xf.sub!=null&&r[11]!==STATE.xf.sub)continue;
    const m=r[1]; if(!monthly[m])monthly[m]={net:0,raw:0,byF:{}}; 
    monthly[m].net+=netVal(r); monthly[m].raw+=rawVal(r);
    const fn=DB.fungsi[r[4]]; monthly[m].byF[fn]=(monthly[m].byF[fn]||0)+netVal(r);
  }
  const opMonthly={};
  for(const r of DB.op){ if(STATE.pu!=='ALL'&&PU_IDX[STATE.pu]!==r[0])continue; opMonthly[r[1]]=(opMonthly[r[1]]||0)+r[3]; }
  const months=Object.keys(monthly).map(Number).sort((a,b)=>a-b);
  const rows=months.map((m,i)=>{
    const op=opMonthly[m]||1; const dtr=monthly[m].net/op*100;
    const prev=i>0?monthly[months[i-1]]:null;
    const prevOp=i>0?(opMonthly[months[i-1]]||1):null;
    const prevDtr=prev?prev.net/prevOp*100:null;
    const delta=prevDtr!=null?dtr-prevDtr:null;
    return {m,dtr,net:monthly[m].net,delta};
  });
  // fungsi MoM matrix
  const fungsiList=Object.keys(DB.fungsi_meta);
  const fmRows=fungsiList.map(fn=>{
    const cells=months.map(m=>{const op=opMonthly[m]||1; return (monthly[m].byF[fn]||0)/op*100;});
    return {fn,cells};
  });
  const maxAbsDelta=Math.max(...rows.map(r=>Math.abs(r.delta||0)),0.1);

  el.innerHTML=`
    <div class="an-intro">Perbandingan antar-bulan (Month-over-Month). Panah <b style="color:var(--green)">hijau ↓</b> = membaik (DT turun), <b style="color:var(--red)">merah ↑</b> = memburuk. Lonjakan ekstrem disorot.</div>
    <div class="panel"><div class="panel-h"><h3>Tren DT Ratio per Bulan${STATE.pu!=='ALL'?' · '+STATE.pu:''}</h3><span class="hint">+ perubahan vs bulan sebelumnya</span></div>
      <table class="md-table"><thead><tr><th>Bulan</th><th class="num">DT Ratio</th><th class="num">Net Jam</th><th class="num">Δ vs bln lalu</th><th>Status</th></tr></thead>
      <tbody>${rows.map(r=>{
        const extreme=Math.abs(r.delta||0)>maxAbsDelta*0.7;
        const cls=r.delta==null?'':r.delta<0?'mom-good':'mom-bad';
        return `<tr class="${extreme?'mom-extreme':''}"><td><b>${MN[r.m]}</b></td><td class="num">${r.dtr.toFixed(2)}%</td><td class="num">${fmt.n(r.net)}</td>
          <td class="num ${cls}">${r.delta==null?'—':(r.delta<0?'↓ ':'↑ +')+r.delta.toFixed(2)+'%'}</td>
          <td>${r.delta==null?'<span class="mom-base">baseline</span>':r.delta<0?'<span class="mom-good">membaik</span>':'<span class="mom-bad">memburuk</span>'}${extreme?' <span class="mom-flag">⚠ ekstrem</span>':''}</td></tr>`;
      }).join('')}</tbody></table>
    </div>
    <div class="panel" style="margin-top:13px"><div class="panel-h"><h3>Heatmap DT Ratio per Fungsi × Bulan</h3><span class="hint">makin merah = makin tinggi</span></div>
      <table class="heat-table"><thead><tr><th>Fungsi</th>${months.map(m=>`<th class="num">${MN[m]}</th>`).join('')}</tr></thead>
      <tbody>${fmRows.map(r=>{const mx=Math.max(...r.cells,0.1);return `<tr><td>${r.fn}</td>${r.cells.map(c=>{const intensity=c/mx;return `<td class="num heat-cell" style="background:rgba(255,91,110,${(intensity*0.5).toFixed(2)})">${c.toFixed(1)}%</td>`}).join('')}</tr>`}).join('')}</tbody></table>
    </div>`;
}

/* ---- E. Control Chart (SPC) ---- */
function renderSPC(el){
  // monthly DT ratio with mean ± control limits (respect PU + xf, full year)
  const monthly={},opM={};
  for(const r of DB.dt){
    if(STATE.pu!=='ALL'&&PU_IDX[STATE.pu]!==r[0])continue;
    if(STATE.xf.fungsi!=null&&r[4]!==STATE.xf.fungsi)continue;
    if(STATE.xf.kat!=null&&r[3]!==STATE.xf.kat)continue;
    if(STATE.xf.sub!=null&&r[11]!==STATE.xf.sub)continue;
    monthly[r[1]]=(monthly[r[1]]||0)+netVal(r);
  }
  for(const r of DB.op){ if(STATE.pu!=='ALL'&&PU_IDX[STATE.pu]!==r[0])continue; opM[r[1]]=(opM[r[1]]||0)+r[3]; }
  const months=Object.keys(monthly).map(Number).sort((a,b)=>a-b);
  const series=months.map(m=>({m,dtr:opM[m]>0?monthly[m]/opM[m]*100:0}));
  const vals=series.map(x=>x.dtr);
  const mean=vals.reduce((s,x)=>s+x,0)/(vals.length||1);
  const sd=Math.sqrt(vals.reduce((s,x)=>s+(x-mean)**2,0)/(vals.length||1));
  const ucl=mean+3*sd, lcl=Math.max(0,mean-3*sd);
  const ucl2=mean+2*sd, lcl2=Math.max(0,mean-2*sd);
  const W=640,H=300,pad=44;
  const maxV=Math.max(ucl,...vals)*1.1, minV=Math.min(lcl,...vals)*0.9;
  const xs=i=>pad+i*((W-pad*2)/Math.max(series.length-1,1));
  const ys=v=>H-pad-((v-minV)/(maxV-minV||1))*(H-pad*2);
  const pts=series.map((s,i)=>`${xs(i)},${ys(s.dtr)}`).join(' ');
  el.innerHTML=`
    <div class="an-intro">Control chart (SPC): garis tengah = rata-rata, batas ±2σ & ±3σ. Titik di luar <b style="color:var(--red)">UCL/LCL</b> = anomali statistik (di luar variasi normal), bukan sekadar naik-turun biasa. <span style="color:var(--ink3)">Dengan 5 bulan, batas masih kasar — makin banyak data makin presisi.</span></div>
    <div class="panel"><div class="panel-h"><h3>Control Chart DT Ratio Bulanan${STATE.pu!=='ALL'?' · '+STATE.pu:''}</h3><span class="hint">μ=${mean.toFixed(2)}% · σ=${sd.toFixed(2)}</span></div>
      <svg viewBox="0 0 ${W} ${H}" style="width:100%;height:auto">
        <line x1="${pad}" y1="${ys(ucl)}" x2="${W-pad}" y2="${ys(ucl)}" stroke="#ff5b6e" stroke-dasharray="5 4" stroke-width="1.5"/>
        <line x1="${pad}" y1="${ys(lcl)}" x2="${W-pad}" y2="${ys(lcl)}" stroke="#ff5b6e" stroke-dasharray="5 4" stroke-width="1.5"/>
        <line x1="${pad}" y1="${ys(ucl2)}" x2="${W-pad}" y2="${ys(ucl2)}" stroke="#ffb020" stroke-dasharray="3 3" stroke-width="1" opacity=".6"/>
        <line x1="${pad}" y1="${ys(lcl2)}" x2="${W-pad}" y2="${ys(lcl2)}" stroke="#ffb020" stroke-dasharray="3 3" stroke-width="1" opacity=".6"/>
        <line x1="${pad}" y1="${ys(mean)}" x2="${W-pad}" y2="${ys(mean)}" stroke="#3ad6c4" stroke-width="1.5"/>
        <polyline points="${pts}" fill="none" stroke="#5b9dff" stroke-width="2"/>
        ${series.map((s,i)=>{const out=s.dtr>ucl||s.dtr<lcl;return `<circle cx="${xs(i)}" cy="${ys(s.dtr)}" r="${out?6:4}" fill="${out?'#ff5b6e':'#5b9dff'}" stroke="#0d1117" stroke-width="2"/>`}).join('')}
        ${series.map((s,i)=>`<text x="${xs(i)}" y="${H-pad+18}" fill="#647890" font-size="11" text-anchor="middle" font-family="monospace">${MN[s.m]}</text>`).join('')}
        <text x="${W-pad}" y="${ys(ucl)-5}" fill="#ff5b6e" font-size="10" text-anchor="end" font-family="monospace">UCL ${ucl.toFixed(1)}%</text>
        <text x="${W-pad}" y="${ys(mean)-5}" fill="#3ad6c4" font-size="10" text-anchor="end" font-family="monospace">μ ${mean.toFixed(1)}%</text>
      </svg>
      <div class="spc-legend"><span><i style="background:#3ad6c4"></i> rata² (μ)</span><span><i style="background:#ffb020"></i> ±2σ warning</span><span><i style="background:#ff5b6e"></i> ±3σ kontrol (UCL/LCL)</span><span><i style="background:#ff5b6e;border-radius:50%"></i> anomali</span></div>
      ${series.some(s=>s.dtr>ucl||s.dtr<lcl)?`<div class="spc-alert">⚠ Ada bulan di luar batas kontrol — investigasi penyebab khusus (special cause), bukan variasi normal.</div>`:`<div class="spc-ok">✓ Semua bulan dalam batas kontrol — proses stabil (common cause variation).</div>`}
    </div>`;
}

/* ---- F. Forecast (garis tren sederhana — proyeksi kasar) ---- */
function renderForecast(el){
  const monthly={},opM={};
  for(const r of DB.dt){ if(STATE.pu!=='ALL'&&PU_IDX[STATE.pu]!==r[0])continue; monthly[r[1]]=(monthly[r[1]]||0)+netVal(r); }
  for(const r of DB.op){ if(STATE.pu!=='ALL'&&PU_IDX[STATE.pu]!==r[0])continue; opM[r[1]]=(opM[r[1]]||0)+r[3]; }
  const months=Object.keys(monthly).map(Number).sort((a,b)=>a-b);
  const series=months.map(m=>({m,dtr:opM[m]>0?monthly[m]/opM[m]*100:0}));
  // linear regression y=a+bx
  const n=series.length, xm=(n-1)/2;
  const ym=series.reduce((s,x)=>s+x.dtr,0)/n;
  let num=0,den=0; series.forEach((s,i)=>{num+=(i-xm)*(s.dtr-ym);den+=(i-xm)**2;});
  const b=den?num/den:0, a=ym-b*xm;
  const targetYr=(DB.target_dirops||0.2738)*100;
  // project to Dec (month 12)
  const lastM=months[months.length-1];
  const proj=[]; for(let m=lastM+1;m<=12;m++){const i=months.length+(m-lastM-1);proj.push({m,dtr:Math.max(0,a+b*i)});}
  const all=[...series,...proj];
  const W=640,H=300,pad=44;
  const vals=all.map(x=>x.dtr).concat([targetYr]);
  const maxV=Math.max(...vals)*1.15, minV=Math.min(...vals)*0.85;
  const xs=i=>pad+i*((W-pad*2)/Math.max(all.length-1,1));
  const ys=v=>H-pad-((v-minV)/(maxV-minV||1))*(H-pad*2);
  const histPts=series.map((s,i)=>`${xs(i)},${ys(s.dtr)}`).join(' ');
  const projPts=[series[series.length-1],...proj].map((s,i)=>`${xs(series.length-1+i)},${ys(s.dtr)}`).join(' ');
  const trend=b>0.05?'naik':b<-0.05?'turun':'stabil';
  const decVal=proj.length?proj[proj.length-1].dtr:series[series.length-1].dtr;
  el.innerHTML=`
    <div class="an-intro">⚠ <b>Proyeksi kasar</b> — garis tren linier dari ${n} bulan data, <b>bukan prediksi statistik</b> (butuh 12+ bulan). Pakai sebagai indikasi arah, bukan angka pasti. Tren saat ini: <b style="color:${b>0?'var(--red)':'var(--green)'}">${trend} ${Math.abs(b).toFixed(2)} poin/bulan</b>.</div>
    <div class="panel"><div class="panel-h"><h3>Proyeksi DT Ratio s/d Desember${STATE.pu!=='ALL'?' · '+STATE.pu:''}</h3><span class="hint">garis putus = proyeksi</span></div>
      <svg viewBox="0 0 ${W} ${H}" style="width:100%;height:auto">
        <line x1="${pad}" y1="${ys(targetYr)}" x2="${W-pad}" y2="${ys(targetYr)}" stroke="#3ad6c4" stroke-dasharray="5 4" stroke-width="1.5"/>
        <text x="${pad+4}" y="${ys(targetYr)-5}" fill="#3ad6c4" font-size="10" font-family="monospace">target ${targetYr.toFixed(1)}%</text>
        <polyline points="${histPts}" fill="none" stroke="#5b9dff" stroke-width="2.5"/>
        <polyline points="${projPts}" fill="none" stroke="#ffb020" stroke-width="2" stroke-dasharray="6 4"/>
        ${series.map((s,i)=>`<circle cx="${xs(i)}" cy="${ys(s.dtr)}" r="4" fill="#5b9dff" stroke="#0d1117" stroke-width="2"/>`).join('')}
        ${proj.map((s,i)=>`<circle cx="${xs(series.length+i)}" cy="${ys(s.dtr)}" r="3.5" fill="#ffb020" stroke="#0d1117" stroke-width="2"/>`).join('')}
        ${all.map((s,i)=>`<text x="${xs(i)}" y="${H-pad+18}" fill="#647890" font-size="10" text-anchor="middle" font-family="monospace">${MN[s.m]}</text>`).join('')}
      </svg>
      <div class="spc-legend"><span><i style="background:#5b9dff"></i> historis</span><span><i style="background:#ffb020"></i> proyeksi</span><span><i style="background:#3ad6c4"></i> target tahunan</span></div>
      <div class="fc-proj">Jika tren berlanjut, proyeksi DT Ratio Desember ≈ <b>${decVal.toFixed(1)}%</b> ${decVal<=targetYr?'<span class="ytd-ok">(masih di bawah target)</span>':'<span class="ytd-over">(berisiko lewat target)</span>'}</div>
    </div>`;
}

/* PIC inheritance: kategori -> sub -> fungsi */
function picEffective(level, name, parentFungsi, parentSub){
  if(level==='kat'){
    if(STATE.pic.kat&&STATE.pic.kat[name]) return {pic:STATE.pic.kat[name],from:'sendiri'};
    if(parentSub&&STATE.pic.sub&&STATE.pic.sub[parentSub]) return {pic:STATE.pic.sub[parentSub],from:'sub: '+parentSub};
    if(parentFungsi&&STATE.pic.fungsi&&STATE.pic.fungsi[parentFungsi]) return {pic:STATE.pic.fungsi[parentFungsi],from:'fungsi: '+parentFungsi};
    return {pic:'—',from:'belum diset'};
  }
  if(level==='sub'){
    if(STATE.pic.sub&&STATE.pic.sub[name]) return {pic:STATE.pic.sub[name],from:'sendiri'};
    if(parentFungsi&&STATE.pic.fungsi&&STATE.pic.fungsi[parentFungsi]) return {pic:STATE.pic.fungsi[parentFungsi],from:'fungsi: '+parentFungsi};
    return {pic:'—',from:'belum diset'};
  }
  if(STATE.pic.fungsi&&STATE.pic.fungsi[name]) return {pic:STATE.pic.fungsi[name],from:'sendiri'};
  return {pic:'—',from:'belum diset'};
}
function setPic(level,name,val){
  if(!STATE.pic[level])STATE.pic[level]={};
  if(val&&val.trim())STATE.pic[level][name]=val.trim(); else delete STATE.pic[level][name];
  renderModule();
}

let __syncRawTimerHandle=null;
async function runSyncRawBulanan(){
  const btn=document.getElementById('btnSyncRaw'); const out=document.getElementById('syncRawResult');
  const prog=document.getElementById('syncRawProgress'); const timerEl=document.getElementById('syncRawTimer');
  btn.disabled=true; btn.textContent='⏳ Sedang sync…'; out.innerHTML=''; prog.style.display='block';
  let detik=0;
  timerEl.textContent='Sedang sync… 0 detik berjalan';
  __syncRawTimerHandle=setInterval(()=>{ detik++; timerEl.textContent=`Sedang sync… ${detik} detik berjalan`; }, 1000);
  try{
    const res=await postSync_({action:'sync_raw_bulanan', uid:CONFIG.UID, pw:CONFIG.PW});
    if(res.ok){
      notify('success', `Sync selesai untuk ${res.n} kombinasi PU/Bulan.`);
      out.innerHTML=`<div style="color:var(--teal,#3ad6c4);font-weight:700;margin-bottom:6px">✓ Sync selesai untuk ${res.n} kombinasi PU/Bulan (${detik} detik):</div>` +

      // data SIAP_* berubah -> refresh payload dashboard
      STATE.mitigasi.loaded=false;
    }else{
      out.innerHTML=`<div style="color:var(--red,#ff5c5c);white-space:pre-line">⚠ ${res.error||'Sync gagal.'}</div>`;
    }
  }catch(err){
    out.innerHTML=`<div style="color:var(--red,#ff5c5c)">⚠ ${String(err.message||err)}</div>`;
  }
  clearInterval(__syncRawTimerHandle); prog.style.display='none';
  btn.disabled=false; btn.textContent='🔄 Jalankan Sync Sekarang';
}

function renderPicTable(){

  let rows='';
  fungsiList.forEach(fn=>{

    rows+=`<tr class="md-fungsi-row"><td><b>${fn}</b></td><td><span class="md-lvl f">fungsi</span></td>

function closeReportModal(){ const m=document.getElementById('reportModal'); if(m)m.remove(); }
function genCSV(){
  const A=aggregate();
  const lines=[['Level','Nama','Raw (jam)','Net (jam)','DT Ratio %','Target %','Status']];
  const scope=(STATE.pu!=='ALL'?STATE.pu+' ':'')+periodLabel();
  // per fungsi
  Object.entries(A.byFungsi).sort((a,b)=>b[1].net-a[1].net).forEach(([fn,v])=>{
    const dtr=A.totOp>0?v.net/A.totOp*100:0;
    const tgt=STATE.targets[fn]!=null?(STATE.targets[fn]*100):'';
    const st=tgt!==''?(dtr<=tgt?'on target':'di atas'):'';
    lines.push(['Fungsi',fn,v.raw.toFixed(2),v.net.toFixed(2),dtr.toFixed(2),tgt!==''?tgt.toFixed(2):'',st]);
  });
  // total
  lines.push(['TOTAL','Direktorat Operasi',A.totDtRaw.toFixed(2),A.totDtNet.toFixed(2),A.dtrNet.toFixed(2),(DB.target_dirops*100).toFixed(2),A.dtrNet<=DB.target_dirops*100?'on target':'di atas']);
  // per kategori
  lines.push([]); lines.push(['--- Per Kategori ---']);
  Object.entries(A.byKat).map(([k,v])=>({k,net:v.net,raw:v.raw,n:v.n})).sort((a,b)=>b.net-a.net).forEach(x=>{
    lines.push(['Kategori',x.k,x.raw.toFixed(2),x.net.toFixed(2),(A.totOp>0?x.net/A.totOp*100:0).toFixed(2),'','']);
  });
  const csv=lines.map(r=>r.map(c=>`"${String(c==null?'':c).replace(/"/g,'""')}"`).join(',')).join('\n');
  const blob=new Blob(['\ufeff'+csv],{type:'text/csv;charset=utf-8'});
  dl(blob,`PRODUCTION_DASHBOARD_Downtime_${scope.replace(/[^a-zA-Z0-9]/g,'_')}.csv`);
  closeReportModal();
}
function genExcel(){
  const A=aggregate();
  const scope=(STATE.pu!=='ALL'?STATE.pu+' ':'')+periodLabel();
  const wb=XLSX.utils.book_new();

  // Sheet 1: Ringkasan per Fungsi
  const fungsiRows=[['Fungsi','Raw (jam)','Net (jam)','DT Ratio %','Target %','Status']];
  Object.entries(A.byFungsi).sort((a,b)=>b[1].net-a[1].net).forEach(([fn,v])=>{
    const dtr=A.totOp>0?v.net/A.totOp*100:0;
    const tgt=STATE.targets[fn]!=null?(STATE.targets[fn]*100):null;
    fungsiRows.push([fn, +v.raw.toFixed(2), +v.net.toFixed(2), +dtr.toFixed(2), tgt!=null?+tgt.toFixed(2):'', tgt!=null?(dtr<=tgt?'On Target':'Di Atas Target'):'']);
  });
  fungsiRows.push(['DIREKTORAT OPERASI', +A.totDtRaw.toFixed(2), +A.totDtNet.toFixed(2), +A.dtrNet.toFixed(2), +(DB.target_dirops*100).toFixed(2), A.dtrNet<=DB.target_dirops*100?'On Target':'Di Atas Target']);
  const ws1=XLSX.utils.aoa_to_sheet(fungsiRows);
  XLSX.utils.book_append_sheet(wb, ws1, 'Per Fungsi');

  // Sheet 2: Per Kategori
  const katRows=[['Kategori','Raw (jam)','Net (jam)','DT Ratio %','Jumlah Event']];
  Object.entries(A.byKat).map(([k,v])=>({k,net:v.net,raw:v.raw,n:v.n})).sort((a,b)=>b.net-a.net).forEach(x=>{
    katRows.push([x.k, +x.raw.toFixed(2), +x.net.toFixed(2), +(A.totOp>0?x.net/A.totOp*100:0).toFixed(2), x.n]);
  });
  const ws2=XLSX.utils.aoa_to_sheet(katRows);
  XLSX.utils.book_append_sheet(wb, ws2, 'Per Kategori');

  // Sheet 3: Detail Event (maksimal 2000 baris terbesar, supaya file tidak terlalu berat)
  const eventRows=[['Tanggal','PU','Line','Mesin','Kategori','Sebab','Deskripsi','Raw (jam)','Net (jam)','Direkonsiliasi']];
  A.dt.slice().sort((a,b)=>b[5]-a[5]).slice(0,2000).forEach(r=>{
    const info=rekonInfoFor(r);
    eventRows.push([r[9]||'', PU_NAME[r[0]]||'', r[10]||'', DB.mesin[r[2]]||'', DB.kat[r[3]]||'',
      DB.sebabList&&r[16]>=0?DB.sebabList[r[16]]:'', r[8]||'', +r[5].toFixed(2), +netVal(r).toFixed(2), info?'Ya':'Tidak']);
  });
  const ws3=XLSX.utils.aoa_to_sheet(eventRows);
  XLSX.utils.book_append_sheet(wb, ws3, 'Detail Event');

  XLSX.writeFile(wb, `OPS_PERFORMANCE_HUB_Downtime_${scope.replace(/[^a-zA-Z0-9]/g,'_')}.xlsx`);
  notify('success', 'File Excel berhasil dibuat dan diunduh.');
  closeReportModal();
}
async function genPPT(){

  const A=aggregate();
  const scope=(STATE.pu!=='ALL'?STATE.pu+' · ':'')+periodLabel();
  const pptx=new PptxGenJS();
  pptx.defineLayout({name:'WIDE', width:13.33, height:7.5}); pptx.layout='WIDE';

  // Slide 1: Judul
  const s1=pptx.addSlide();

  s1.addText(scope, {x:0.6,y:4.0,w:12,h:0.4,fontSize:13,color:'9FB1C4',fontFace:'Arial'});

  // Slide 2: KPI Utama
  const s2=pptx.addSlide();

  s2.addText('Ringkasan KPI', {x:0.5,y:0.4,w:12,h:0.6,fontSize:24,bold:true,color:'FFFFFF',fontFace:'Arial'});
  const kpis=[
    {lbl:'DT RATIO (NET)', val:A.dtrNet.toFixed(1)+'%'},

    {lbl:'OPERATION TIME', val:fmt.n(A.totOp)+' jam'},
    {lbl:'JUMLAH EVENT', val:fmt.n(A.dt.length)},

  kpis.forEach((k,i)=>{
    const x=0.5+i*3.1;
    s2.addShape('roundRect', {x,y:1.3,w:2.8,h:1.7,fill:{color:'1A232E'},line:{color:'2A3848'},rectRadius:0.1});
    s2.addText(k.lbl, {x:x+0.15,y:1.4,w:2.5,h:0.35,fontSize:10,color:'647890',fontFace:'Arial'});

  });

  // Slide 3: Tabel per Fungsi
  const s3=pptx.addSlide();
  s3.background={color:'0D1117'};
  s3.addText('DT Ratio per Fungsi', {x:0.5,y:0.4,w:12,h:0.6,fontSize:24,bold:true,color:'FFFFFF',fontFace:'Arial'});

    {text:'DT Ratio %',options:{bold:true,color:'FFFFFF',fill:{color:'212D3A'}}},
    {text:'Status',options:{bold:true,color:'FFFFFF',fill:{color:'212D3A'}}}]];
  Object.entries(A.byFungsi).sort((a,b)=>b[1].net-a[1].net).forEach(([fn,v])=>{
    const dtr=A.totOp>0?v.net/A.totOp*100:0;
    const tgt=STATE.targets[fn]!=null?(STATE.targets[fn]*100):null;
    const st=tgt!=null?(dtr<=tgt?'On Target':'Di Atas Target'):'-';
    tblRows.push([{text:fn,options:{color:'E8EEF5'}}, {text:fmt.n(v.net),options:{color:'E8EEF5'}},
      {text:dtr.toFixed(2)+'%',options:{color:'E8EEF5'}}, {text:st,options:{color:st==='On Target'?'3DDC84':'FF5B6E'}}]);
  });
  s3.addTable(tblRows, {x:0.5,y:1.2,w:11,fontSize:12,fontFace:'Arial',fill:{color:'1A232E'},border:{type:'solid',color:'2A3848',pt:1}});

  await pptx.writeFile({fileName:`OPS_PERFORMANCE_HUB_Downtime_${scope.replace(/[^a-zA-Z0-9]/g,'_')}.pptx`});
  notify('success', 'File PowerPoint berhasil dibuat dan diunduh.');

}

/* ============================================================ MODUL OEE */
/* Recalc OEE per mesin berdasar override kapasitas (ratio scaling).
   target_baru = target_lama × (kap_baru/kap_lama); P=(prod+reject)/target; OEE=A×P×Q.
   Konsisten dgn engine PUJ — cuma scale proporsional, formula tak diubah. */
function oeeMachinesLive(){
  if(!OEE) return [];
  const kapBase={}, kapNew={};
  (OEE.kapasitas||[]).forEach(k=>{
    const mk=k.pu+'|'+k.mesin;
    kapBase[mk]=(kapBase[mk]||0)+(k.kapasitas||0);
    const ok=k.pu+'|'+k.mesin+'|'+k.ukuran;
    const ov=STATE.kapOverride[ok];
    kapNew[mk]=(kapNew[mk]||0)+(ov!=null?ov:(k.kapasitas||0));
  });
  const base=OEE.machines.map(m=>{
    const mk=m.pu+'|'+m.mesin;
    const det=OEE.detail[mk];
    const ratio=(kapBase[mk]&&kapNew[mk])?kapBase[mk]/kapNew[mk]:1;
    let out;
    if(!det||det.target==null||det.prod==null||ratio===1||m.P==null){
      out={...m, _edited:false};
    }else{
      const targetNew=det.target/ratio;
      const Pnew=targetNew>0?(det.prod+(det.reject||0))/targetNew:m.P;
      const OEEnew=(m.A!=null&&m.Q!=null)?m.A*Pnew*m.Q:m.OEE;
      out={...m, P:Pnew, OEE:OEEnew, _edited:true};
    }
    out.inc = !STATE.mesinExclude[mk];   // exclude flag
    return out;
  });
  // gabung mesin tambahan manual
  const added=(STATE.mesinAdd||[]).map(m=>({...m, _added:true, inc:!STATE.mesinExclude[m.pu+'|'+m.mesin]}));
  return [...base,...added];
}
/* agregat HANYA mesin included */
function oeeAggInc(machines){ return oeeAgg(machines.filter(m=>m.inc!==false)); }

function getTipeList(){ return [...(OEE&&OEE.tipeList||[]), ...(STATE.tipeCustom||[])]; }
function toggleMesinInc(pu,mesin){
  const k=pu+'|'+mesin;
  if(STATE.mesinExclude[k]) delete STATE.mesinExclude[k]; else STATE.mesinExclude[k]=true;
  renderModule();
}
function addMesin(){
  const pu=document.getElementById('addMesinPU').value;
  const tipe=document.getElementById('addMesinTipe').value;
  const mesin=document.getElementById('addMesinNama').value.trim().toUpperCase();
  if(!mesin){ alert('Isi nama mesin'); return; }
  if(OEE.machines.concat(STATE.mesinAdd).some(m=>m.pu===pu&&m.mesin===mesin)){ alert('Mesin '+mesin+' sudah ada di '+pu); return; }
  STATE.mesinAdd.push({pu,tipe,mesin,A:null,P:null,Q:null,OEE:null,lossA:null,lossP:null,lossQ:null});
  renderModule();
}
function removeMesin(pu,mesin){
  if(!confirm('Hapus mesin '+mesin+' ('+pu+')? Hanya untuk mesin tambahan manual.')) return;
  STATE.mesinAdd=STATE.mesinAdd.filter(m=>!(m.pu===pu&&m.mesin===mesin));
  renderModule();
}
function addTipe(){
  const t=document.getElementById('addTipeNama').value.trim();
  if(!t){ return; }
  if(getTipeList().includes(t)){ alert('Tipe sudah ada'); return; }
  STATE.tipeCustom.push(t); renderModule();
}
function setKapOverride(pu,mesin,ukuran,val){
  const key=pu+'|'+mesin+'|'+ukuran;
  const orig=(OEE.kapasitas||[]).find(k=>k.pu===pu&&k.mesin===mesin&&k.ukuran===ukuran);
  const num=parseFloat(val);
  if(orig&&num>0&&num!==orig.kapasitas) STATE.kapOverride[key]=num;
  else delete STATE.kapOverride[key];
  renderModule();
}
function resetKapOverride(){ STATE.kapOverride={}; renderModule(); }

function setOeeView(v){ STATE.oeeView=v; renderModule(); }
function setOeePU(pu){ STATE.oeePU=pu; renderModule(); }
function setOeeTipe(t){ STATE.oeeTipe=t; renderModule(); }
function oeeFilteredMachines(){
  if(!OEE) return [];
  return oeeMachinesLive().filter(m=>(STATE.oeePU==='ALL'||m.pu===STATE.oeePU)&&(STATE.oeeTipe==='ALL'||m.tipe===STATE.oeeTipe));
}
function oeeAgg(machines){
  // aggregate A/P/Q weighted by available data; OEE = A*P*Q at aggregate
  let sA=0,nA=0,sP=0,nP=0,sQ=0,nQ=0;
  machines.forEach(m=>{ if(m.A!=null){sA+=m.A;nA++;} if(m.P!=null){sP+=m.P;nP++;} if(m.Q!=null){sQ+=m.Q;nQ++;} });
  const A=nA?sA/nA:null,P=nP?sP/nP:null,Q=nQ?sQ/nQ:null;
  return {A,P,Q,OEE:(A!=null&&P!=null&&Q!=null)?A*P*Q:null,nA,nP,nQ};
}

function renderOEE(el){
  if(!OEE){ el.innerHTML='<div class="md-warn">Data OEE belum tersedia.</div>'; return; }
  const views=[['overview','Ringkasan OEE'],['tren','Tren & YTD'],['mesin','Per Mesin'],['losses','Six Big Losses (Availability)'],['perf','Analisis Performance'],['quality','Analisis Quality'],['bridge','Jembatan ke Downtime']];
  const pus=['ALL','PUJ','PUG','PUC'], tipes=['ALL','Lithos','Drum','Curah'];
  el.innerHTML=`
    <div class="oee-filterbar">
      <div class="oee-fg"><span class="oee-fl">Production Unit</span><div class="seg sm">${pus.map(p=>`<button class="${STATE.oeePU===p?'on':''}" onclick="setOeePU('${p}')">${p==='ALL'?'Semua':p}</button>`).join('')}</div></div>
      <div class="oee-fg"><span class="oee-fl">Tipe Line</span><div class="seg sm">${tipes.map(t=>`<button class="${STATE.oeeTipe===t?'on':''}" onclick="setOeeTipe('${t}')">${t==='ALL'?'Semua':t}</button>`).join('')}</div></div>
    </div>
    <div class="an-tabs">${views.map(([k,l])=>`<button class="an-tab ${STATE.oeeView===k?'on':''}" onclick="setOeeView('${k}')">${l}</button>`).join('')}</div>
    <div id="oeeBody"></div>`;
  const c=document.getElementById('oeeBody');
  if(STATE.oeeView==='overview') renderOeeOverview(c);
  else if(STATE.oeeView==='tren') renderOeeTren(c);
  else if(STATE.oeeView==='mesin') renderOeeMesin(c);
  else if(STATE.oeeView==='losses') renderOeeLosses(c);
  else if(STATE.oeeView==='perf') renderOeePerf(c);
  else if(STATE.oeeView==='quality') renderOeeQuality(c);
  else renderOeeBridge(c);
}

function oeeGauge(label,val,tgt,color){
  if(val==null) return `<div class="oee-gauge"><div class="og-label">${label}</div><div class="og-val" style="color:var(--ink3)">—</div><div class="og-sub">data belum lengkap</div></div>`;
  const pct=(val*100).toFixed(1), ok=val>=tgt;
  const circ=2*Math.PI*42, off=circ*(1-val);
  return `<div class="oee-gauge">
    <svg viewBox="0 0 100 100" class="og-svg"><circle cx="50" cy="50" r="42" class="og-track"/><circle cx="50" cy="50" r="42" class="og-fill" style="stroke:${color};stroke-dasharray:${circ};stroke-dashoffset:${off}"/></svg>
    <div class="og-center"><div class="og-val" style="color:${color}">${pct}<small>%</small></div></div>
    <div class="og-label">${label}</div>
    <div class="og-sub ${ok?'ok':'over'}">${ok?'✓':'▲'} target ${(tgt*100).toFixed(0)}%</div>
  </div>`;
}

function renderOeeOverview(el){
  const machines=oeeFilteredMachines();
  const agg=oeeAggInc(machines);
  const t=OEE.targets;
  // PU benchmark — dihitung live dari machines (ikut recalc kapasitas)
  const allLive=oeeMachinesLive();
  const benchLive=['PUJ','PUG','PUC'].map(pu=>{
    const ms=allLive.filter(m=>m.pu===pu);
    const a=oeeAggInc(ms);
    const orig=OEE.pu_bench.find(b=>b.pu===pu)||{};
    const status=a.OEE==null?(orig.status||''):a.OEE>=0.7?'Baik':a.OEE>=0.6?'Sedang':'Perlu Perbaikan';
    const edited=ms.some(m=>m._edited);
    return {pu,...a,status,edited};
  });
  const anyEdit=allLive.some(m=>m._edited);
  el.innerHTML=`
    <div class="an-intro">OEE = <b>Availability × Performance × Quality</b>. Availability pakai basis OEE (ΣDurOp/ΣNetOp) dari engine PDM eksisting — <b>selaras</b> dengan downtime, tapi basis waktunya beda dari DT Ratio (lihat tab "Jembatan ke Downtime").${anyEdit?' <b style="color:var(--amber)">⚙ Kapasitas diedit — Performance & OEE sudah disesuaikan.</b>':''}</div>
    <div class="sec-label">OEE ${STATE.oeePU==='ALL'?'Semua PU':STATE.oeePU}${STATE.oeeTipe!=='ALL'?' · '+STATE.oeeTipe:''} <span class="click-hint">${machines.length} mesin</span></div>
    <div class="oee-gauges">
      ${oeeGauge('Availability',agg.A,t.A,'#5b9dff')}
      ${oeeGauge('Performance',agg.P,t.P,'#ffb020')}
      ${oeeGauge('Quality',agg.Q,t.Q,'#3ad6c4')}
      ${oeeGauge('OEE',agg.OEE,t.OEE,'#a989ff')}
    </div>
    ${oeeYtdStrip(agg)}
    <div class="sec-label">Benchmark antar-PU</div>
    <div class="panel"><div class="panel-h"><h3>OEE per Production Unit</h3><span class="hint">A × P × Q ${anyEdit?'· live':''}</span></div>
      <table class="md-table"><thead><tr><th>PU</th><th class="num">Availability</th><th class="num">Performance</th><th class="num">Quality</th><th class="num">OEE</th><th>Status</th></tr></thead>
      <tbody>${benchLive.map(b=>{
        const stClr=b.status==='Baik'?'var(--green)':b.status==='Sedang'?'var(--amber)':'var(--red)';
        return `<tr><td><b>${b.pu}</b>${b.edited?' <span class="kap-dot" title="kapasitas diedit">●</span>':''}</td><td class="num">${b.A!=null?(b.A*100).toFixed(1):'—'}%</td><td class="num">${b.P!=null?(b.P*100).toFixed(1):'—'}%</td><td class="num">${b.Q!=null?(b.Q*100).toFixed(1):'—'}%</td><td class="num" style="color:var(--amber);font-weight:600">${b.OEE!=null?(b.OEE*100).toFixed(1):'—'}%</td><td><span class="chr-tag" style="background:${stClr}22;color:${stClr}">${b.status}</span></td></tr>`;
      }).join('')}</tbody></table>
    </div>
    <div class="oee-note">💡 <b>Catatan world-class:</b> OEE ≥85% = world class, 60–85% = wajar, &lt;60% = perlu perbaikan. Availability paling kecil = pengungkit utama (sejalan dgn temuan Waiting dominan di modul Downtime).</div>`;
}

function oeeYtdStrip(agg){
  if(agg.OEE==null) return '';
  const tgt=OEE.targets.OEE*100, val=agg.OEE*100;
  const onPace=val>=tgt;  // OEE makin tinggi makin bagus (kebalikan DT ratio)
  const pct=Math.min(val/tgt*100,100);
  return `<div class="ytd-strip" style="margin-top:14px">
    <div class="ytd-lbl"><span class="ytd-k">YTD PACING OEE</span><span class="ytd-sub">data: Jan 2026 · 1 bln</span></div>
    <div class="ytd-bar-wrap">
      <div class="ytd-bar"><div class="ytd-fill ${onPace?'ok':'over'}" style="width:${pct}%"></div><div class="ytd-target" style="left:100%"></div></div>
      <div class="ytd-vals"><span>OEE YTD <b class="${onPace?'ok':'over'}">${val.toFixed(1)}%</b></span><span>Target tahunan <b>${tgt.toFixed(0)}%</b></span><span class="${onPace?'ytd-ok':'ytd-over'}">${onPace?'✓ capai target':'▲ di bawah target'}</span></div>
    </div>
  </div>`;
}

        <div class="spc-legend"><span><i style="background:#a989ff;border-radius:50%"></i> OEE aktual</span><span><i style="background:#3ad6c4"></i> target</span><span style="color:var(--ink3)">bulan abu = menunggu data SIAP</span></div>

        <table class="md-table"><thead><tr><th>Komponen</th><th class="num">Nilai</th><th class="num">Target</th><th>Status</th></tr></thead>

function renderOeeLosses(el){
  // aggregate loss_pu by group across filtered PU
  const groups={};
  Object.entries(OEE.loss_pu).forEach(([pu,gs])=>{
    if(STATE.oeePU!=='ALL'&&pu!==STATE.oeePU)return;
    Object.entries(gs).forEach(([g,j])=>groups[g]=(groups[g]||0)+j);
  });
  const order=OEE.loss_groups.map(g=>({g,j:groups[g]||0})).sort((a,b)=>b.j-a.j);
  const tot=order.reduce((s,x)=>s+x.j,0)||1;
  let cum=0;
  const colors={'Idle/Menunggu':'#ffb020','Setup/Changeover':'#5b9dff','Breakdown':'#ff5b6e','Minor Stop':'#a989ff','Quality':'#3ad6c4','Lain-lain':'#647890'};
  // code drilldown
  const codes=OEE.code_map.slice().sort((a,b)=>b.jam-a.jam).slice(0,15);
  el.innerHTML=`
    <div class="an-intro">Six Big Losses versi OEE engine — sumber sama dengan klasifikasi downtime, beda penamaan grup. <b>Idle/Menunggu</b> = Waiting di modul Downtime. Dominasi Idle/Menunggu mengonfirmasi temuan yang sama dari dua sistem.</div>
    <div class="panel"><div class="panel-h"><h3>Pareto Six Big Losses${STATE.oeePU!=='ALL'?' · '+STATE.oeePU:''}</h3><span class="hint">jam loss</span></div>
      <div class="big6-list">${order.map(x=>{cum+=x.j;return `<div class="big6-item">
        <div class="big6-head"><span class="big6-name">${x.g}</span><span class="big6-pct">${(x.j/tot*100).toFixed(1)}% · ${fmt.n(x.j)}j</span></div>
        <div class="big6-bar"><div class="big6-fill" style="width:${(x.j/tot*100).toFixed(1)}%;background:${colors[x.g]||'#647890'}"></div></div>
        <div class="big6-foot">kumulatif ${(cum/tot*100).toFixed(0)}%</div>
      </div>`}).join('')}</div>
    </div>
    <div class="panel" style="margin-top:13px"><div class="panel-h"><h3>Drilldown per Kode Kendala</h3><span class="hint">top 15 · dari REF_Mapping</span></div>
      <table class="md-table"><thead><tr><th>Kode</th><th>Grup Loss</th><th class="num">Jam</th><th>Contoh Detail</th></tr></thead>
      <tbody>${codes.map(c=>`<tr><td><b>${c.kode}</b></td><td><span class="chr-tag" style="background:${(colors[c.grup]||'#647890')}22;color:${colors[c.grup]||'#647890'}">${c.grup}</span></td><td class="num">${fmt.n(c.jam)}</td><td style="color:var(--ink3)">${c.contoh}</td></tr>`).join('')}</tbody></table>
    </div>`;
}

/* ---- Analisis Performance ---- */
function renderOeePerf(el){
  const pm=(OEE.performance&&OEE.performance.byMesin||[]).filter(m=>STATE.oeePU==='ALL'||m.pu===STATE.oeePU);
  if(!pm.length){ el.innerHTML='<div class="md-warn">Data performance belum tersedia.</div>'; return; }
  const avg=pm.reduce((s,x)=>s+x.perf,0)/pm.length;
  const worst=pm.slice(0,8);
  const tgt=OEE.targets.P;
  const maxBar=Math.max(...pm.map(x=>x.perf),1);
  el.innerHTML=`
    <div class="an-intro"><b>Performance</b> = output aktual ÷ output ideal (target kapasitas). Mengukur seberapa cepat line berjalan vs kecepatan idealnya. Performance rendah = <b>speed loss</b> (mesin jalan pelan/sering berhenti minor), beda dari Availability (mesin berhenti total).</div>
    <div class="hero hero-kpi" style="margin-bottom:14px">
      <div class="hcard feat"><div class="k">Performance Rata²</div><div class="v">${(avg*100).toFixed(1)}<small>%</small></div><div class="sub ${avg>=tgt?'':'over'}">${avg>=tgt?'✓':'▲'} target ${(tgt*100).toFixed(0)}%</div></div>
      <div class="hcard"><div class="k">Mesin di Bawah Target</div><div class="v">${pm.filter(x=>x.perf<tgt).length}<small>/${pm.length}</small></div><div class="sub">perlu perhatian speed</div></div>
      <div class="hcard"><div class="k">Speed Loss Terbesar</div><div class="v" style="font-size:18px">${worst[0]?worst[0].pu+' '+worst[0].mesin:'—'}</div><div class="sub">${worst[0]?(worst[0].perf*100).toFixed(0)+'% performance':''}</div></div>
    </div>
    <div class="panel"><div class="panel-h"><h3>Performance per Mesin</h3><span class="hint">urut terendah · actual vs target output</span></div>
      <table class="md-table"><thead><tr><th>PU</th><th>Mesin</th><th class="num">Output Aktual</th><th class="num">Target</th><th class="num">Performance</th><th>Speed Loss</th></tr></thead>
      <tbody>${pm.slice(0,16).map(m=>{
        const loss=(1-m.perf)*100;
        const clr=m.perf>=tgt?'var(--green)':m.perf>=0.7?'var(--amber)':'var(--red)';
        return `<tr><td><span class="tag ${m.pu==='PUJ'?'puj':m.pu==='PUG'?'pug':'puc'}">${m.pu}</span></td><td><b>${m.mesin}</b></td><td class="num">${fmt.n(m.prod)}</td><td class="num">${fmt.n(m.target)}</td><td class="num" style="color:${clr};font-weight:600">${(m.perf*100).toFixed(1)}%</td><td><div class="perf-bar"><div class="perf-fill" style="width:${Math.min(loss,100)}%"></div></div></td></tr>`;
      }).join('')}</tbody></table>
    </div>`;
}

/* Reject per jenis material pembungkus (dari BOM filling / sheet Pemakaian) */

  const df=OEE.defect;
  if(!df) return '';
  const colors={'Label':'#ffb020','Botol (PBK)':'#5b9dff','Cap/Tutup':'#ff5b6e','Segel/Seal':'#a989ff','Karton':'#3ad6c4','Jerigen/Pouch':'#ff8c42','Shrink/Plastik':'#647890','Inner/Pallet':'#88a','Tag/Sticker':'#aaa'};
  const tot=df.totPembungkus||1;
  let cum=0;

/* Parser RAW SIAP asli (bukan format SIAP_DOWNTIME backend). Kolom sumber:
   Tgl post, Line, Detail, Sebab (OP/TR), Kategori (kode pendek TL/TS/FL...), Durasi.
   Baris ini TIDAK langsung dikirim sebagai downtime siap pakai -- dikirim ke backend
   (action:'save_raw_import' lalu 'convert_raw_siap') supaya konversi kode->kategori
   resmi dan perhitungan OpTime konsisten satu sumber (lihat modul konversi di .gs). */
function parseDowntimeSheet(sh){
  const rows=XLSX.utils.sheet_to_json(sh,{header:1,defval:''});
  let hr=-1;
  for(let i=0;i<Math.min(rows.length,8);i++){ if(rows[i].some(c=>String(c).toLowerCase().includes('kategori')||String(c).toLowerCase().includes('durasi'))){hr=i;break;} }
  if(hr<0) return [];
  const H=rows[hr].map(x=>String(x).trim());
  const col=(names)=>H.findIndex(h=>names.some(n=>h.toLowerCase().includes(n)));
  const ci={kat:col(['kategori']),dur:col(['durasi']),line:col(['line']),tgl:col(['tgl post','tgl','tanggal']),detail:col(['detail']),sebab:col(['sebab'])};
  const out=[];
  for(let r=hr+1;r<rows.length;r++){
    const row=rows[r]; if(!row||!row.length) continue;
    const dur=parseFloat(row[ci.dur]); if(isNaN(dur)) continue;
    out.push({kategori:row[ci.kat]||'', durasi:dur, line:row[ci.line]||'', tglPost:row[ci.tgl]||'', detail:row[ci.detail]||'', sebab:row[ci.sebab]||''});
  }
  return out;
}
function parseGeneric(sh){
  const rows=XLSX.utils.sheet_to_json(sh,{header:1,defval:''});
  let hr=-1;
  for(let i=0;i<Math.min(rows.length,8);i++){ if(rows[i].filter(c=>c!=='').length>=3){hr=i;break;} }
  if(hr<0) return [];
  const H=rows[hr].map(x=>String(x).trim());
  const out=[];
  for(let r=hr+1;r<rows.length;r++){
    const row=rows[r]; if(!row||row.filter(c=>c!=='').length<2) continue;
    const o={}; H.forEach((h,i)=>{if(h)o[h]=row[i];}); out.push(o);
  }
  return out;
}
/* Alur baru: (1) kirim baris downtime RAW (kode kategori pendek, apa adanya) ke
   RAW_SIAP_IMPORT via action save_raw_import, (2) panggil convert_raw_siap supaya

/* Helper POST kecil, dipakai submitSIAPRawThenConvert. Asumsikan sudah ada fungsi
   sejenis di sync patch (postSync_/fetch ke CONFIG.SYNC_URL) -- kalau nama beda,
   sesuaikan pemanggilan di atas dengan fungsi POST yang sudah ada di file sync. */
async function postSync_(body){
  const res = await fetch(CONFIG.SYNC_URL, {method:'POST', body:JSON.stringify(body)});
  const j = await res.json();
  if(!j.ok) throw new Error(j.message||j.error||'Gagal memproses permintaan');
  return j;
}

/* Menerapkan payload dari backend (dt/oee/master) ke DB/OEE/STATE. Dipisah dari syncLoad()
   supaya bisa dipakai ulang oleh doLogin() tanpa perlu fetch payload dua kali. */
function applyPayload_(d){
  if(d.dt!=null){ Object.assign(DB, {dt:d.dt,op:d.op||[],mesin:d.mesin||[],kat:d.kat||[],fungsi:d.fungsi||[],sub:d.sub||[],cls:d.cls||[],big6:d.big6||[],
    sebabList:d.sebabList||['OP','TR'], koreksiInfo:d.koreksiInfo||[], produk:d.produk||[]}); }
  if(d.oee){
    if(d.oee.kapasitas && d.oee.kapasitas.length) OEE.kapasitas=d.oee.kapasitas;
    if(d.oee.tipeList) OEE.tipeList=d.oee.tipeList;
  }
  const m=d.master||{};
  if(m.pic) STATE.pic=m.pic;
  if(m.tolRules) STATE.tolRules=m.tolRules;
  if(m.actions) STATE.actions=m.actions;
  if(m.costParam) STATE.costParam=m.costParam;
  if(m.mesin && m.mesin.length){
    STATE.mesinExclude={};
    m.mesin.forEach(r=>{ if(String(r.Include)==='false'||r.Include===false) STATE.mesinExclude[r.PU+'|'+r.Mesin]=true; });
  }
  DB.months=[...new Set(DB.dt.map(r=>r[1]).filter(x=>x>=1&&x<=12))].sort((a,b)=>a-b);
}

async function syncLoad(){
  if(!CONFIG.USE_LIVE || !CONFIG.SYNC_URL || CONFIG.SYNC_URL.includes('PASTE_URL')){ showSyncStatus('demo'); return false; }
  const nid=notify('pending', 'Menarik data terbaru dari Google Sheets…');
  try{
    showSyncStatus('loading');
    const res=await fetch(`${CONFIG.SYNC_URL}?uid=${encodeURIComponent(CONFIG.UID)}&pw=${encodeURIComponent(CONFIG.PW)}`);
    const j=await res.json();
    if(!j.ok){
      showSyncStatus('error',j.error);
      updateNotify(nid,'error', `Gagal menarik data dari Google Sheets: ${j.error||'tidak diketahui'}.`,
        'Periksa apakah UID/password di CONFIG cocok dengan CFG di Apps Script, dan Apps Script sudah di-deploy dengan "Who has access: Anyone".');
      return false;
    }
    applyPayload_(j.data);
    if(j.me) CURRENT_USER = j.me;
    showSyncStatus('synced');
    updateNotify(nid,'success', 'Data terbaru dari Google Sheets berhasil dimuat.');
    return true;
  }catch(err){
    showSyncStatus('error',String(err));
    updateNotify(nid,'error', `Gagal menarik data: ${err}.`,
      'Periksa koneksi internet, atau apakah CONFIG.SYNC_URL sudah diisi URL Web App yang benar (diakhiri /exec).');
    return false;
  }
}

/* Simpan SEMUA editan master sekaligus (dipanggil tombol "Simpan ke Sheets") */
async function syncSaveAll(){
  if(!CONFIG.USE_LIVE || CONFIG.SYNC_URL.includes('PASTE_URL')){
    notify('error', 'Belum terhubung ke Google Sheets.', {hint:'Isi CONFIG.SYNC_URL dan CONFIG.PW dengan benar terlebih dahulu (lihat Langkah 7 pada Panduan Deploy).'});
    return false;
  }
  const sections={};
  // kapasitas (gabung base + override)
  sections.kapasitas=(OEE.kapasitas||[]).map(k=>{
    const ov=STATE.kapOverride[k.pu+'|'+k.mesin+'|'+k.ukuran];
    return {PU:k.pu,Mesin:k.mesin,Ukuran:k.ukuran,Kapasitas:ov!=null?ov:k.kapasitas,SatuanPerKemasan:k.satuanPerKemasan};
  });
  // pic
  const picRows=[]; ['fungsi','sub','kat'].forEach(l=>Object.keys(STATE.pic[l]||{}).forEach(t=>picRows.push({Level:l,Target:t,PIC:STATE.pic[l][t]})));
  sections.pic=picRows;
  // toleransi
  sections.toleransi=STATE.tolRules.map(r=>({Level:r.level,Target:r.target,Factor:r.factor}));
  // mesin (master + include + tambahan)
  const mesinRows=[];
  oeeMachinesLive().forEach(m=>mesinRows.push({PU:m.pu,Mesin:m.mesin,Tipe:m.tipe,Include:m.inc!==false}));
  sections.mesin=mesinRows;
  // action
  sections.action=Object.keys(STATE.actions).map(k=>({Key:k,Status:STATE.actions[k].status,Note:STATE.actions[k].note,PIC:STATE.actions[k].pic}));
  // target
  const tgtRows=[]; Object.keys(STATE.targets||{}).forEach(f=>tgtRows.push({Level:'fungsi',Target:f,Value:STATE.targets[f]}));
  sections.target=tgtRows;
  // cost parameter per PU
  sections.costParam=PU_NAME.map(p=>({PU:p, CostPerJam:(STATE.costParam[p]||{}).costPerJam||0, CostPerKL:(STATE.costParam[p]||{}).costPerKL||0}));

  const nid=notify('pending', 'Menyimpan perubahan Master Data ke Google Sheets…');
  try{
    showSyncStatus('loading');
    const res=await fetch(CONFIG.SYNC_URL,{method:'POST',headers:{'Content-Type':'text/plain;charset=utf-8'},
      body:JSON.stringify({uid:CONFIG.UID,pw:CONFIG.PW,action:'save_master',sections})});
    const j=await res.json();
    showSyncStatus(j.ok?'synced':'error',j.error);
    if(j.ok){
      const b=document.getElementById('syncBanner'); if(b)b.remove();
      updateNotify(nid,'success', `Tersimpan: ${(j.saved||[]).join(', ')||'perubahan Master Data'}.`);
      // Penting: setelah berhasil simpan, tarik ulang data dari server dan kosongkan
      // draft lokal (kapOverride dkk), supaya "nilai asli" yang diingat browser selalu
      // sinkron dengan kenyataan di Google Sheets. Tanpa ini, tombol "Reset" akan
      // mengembalikan tampilan ke nilai LAMA (sebelum simpan pertama kali di sesi ini),
      // bukan ke nilai yang sungguh-sungguh tersimpan sekarang -- padahal Reset sendiri
      // tidak pernah mengirim apa pun ke backend, sehingga Sheets tetap pada nilai
      // terakhir yang tersimpan dan tidak ikut "ter-reset".
      STATE.kapOverride={};
      await syncLoad();
      renderModule();
    }else{
      updateNotify(nid,'error', `Gagal menyimpan ke Google Sheets: ${j.error||'tidak diketahui'}.`,
        'Periksa apakah Apps Script sudah di-deploy versi terbaru, dan UID/password di CONFIG cocok dengan CFG di Apps Script. Coba klik "Simpan ke Sheets" sekali lagi.');
    }
    return j.ok;
  }catch(err){ showSyncStatus('error',String(err)); updateNotify(nid,'error', `Gagal menyimpan: ${err}.`,
      'Periksa koneksi internet, atau apakah CONFIG.SYNC_URL sudah diisi URL Web App yang benar (diakhiri /exec).'); return false; }
}

/* Upload data SIAP per-PU. dataObj = {pu,bulan,tahun,downtime:[],hasilProd:[],netOp:[],pemakaian:[]} */
async function uploadSIAP(dataObj, force){
  if(!CONFIG.USE_LIVE || CONFIG.SYNC_URL.includes('PASTE_URL')){
    notify('error', 'Belum terhubung ke Google Sheets.', {hint:'Isi CONFIG.SYNC_URL dan CONFIG.PW dengan benar terlebih dahulu (lihat Langkah 7 pada Panduan Deploy).'});
    return;
  }
  const nid=notify('pending', `Memeriksa data ${dataObj.pu} bulan ${dataObj.bulan}/${dataObj.tahun}…`);
  try{
    // 1) cek dobel dulu
    if(!force){
      const chk=await fetch(CONFIG.SYNC_URL,{method:'POST',headers:{'Content-Type':'text/plain;charset=utf-8'},
        body:JSON.stringify({uid:CONFIG.UID,pw:CONFIG.PW,action:'check_dupe',pu:dataObj.pu,bulan:dataObj.bulan,tahun:dataObj.tahun})});
      const cj=await chk.json();
      if(cj.dupe){
        if(!confirm(`⚠ ${dataObj.pu} bulan ${dataObj.bulan}/${dataObj.tahun} SUDAH pernah di-upload.\n\nReplace data lama dengan yang baru?`)){
          dismissNotify(nid); return;
        }
        force=true;
      }
    }
    // 2) upload
    updateNotify(nid,'pending', `Mengunggah data ${dataObj.pu} bulan ${dataObj.bulan}/${dataObj.tahun}…`);
    showSyncStatus('loading');
    const res=await fetch(CONFIG.SYNC_URL,{method:'POST',headers:{'Content-Type':'text/plain;charset=utf-8'},
      body:JSON.stringify(Object.assign({uid:CONFIG.UID,pw:CONFIG.PW,action:'upload_siap',force:!!force},dataObj))});
    const j=await res.json();
    if(j.ok){
      showSyncStatus('synced');
      const detail=`Downtime: ${j.rows.downtime} baris · Hasil Produksi: ${j.rows.hasilProd} · Net Op: ${j.rows.netOp} · Pemakaian: ${j.rows.pemakaian}`
        +(j.dupRowsRemoved?` · ${j.dupRowsRemoved} baris dobel dibuang otomatis`:'')+(j.replaced?' · data lama telah di-replace':'');
      updateNotify(nid,'success', `Upload ${j.pu} ${j.bulan}/${j.tahun} berhasil. ${detail}.`);
      await syncLoad(); renderModule();
    }else{
      showSyncStatus('error',j.error);
      updateNotify(nid,'error', `Upload gagal: ${j.error||'tidak diketahui'}.`,
        'Periksa apakah bulan ini sudah ditandai Final (harus dibatalkan dulu di modul Rekonsiliasi), atau apakah format data yang diupload sudah sesuai.');
    }
  }catch(err){
    showSyncStatus('error',String(err));
    updateNotify(nid,'error', `Upload gagal: ${err}.`,
      'Periksa koneksi internet, atau apakah CONFIG.SYNC_URL sudah diisi URL Web App yang benar (diakhiri /exec).');
  }
}

function showSyncStatus(state,msg){
  const el=document.querySelector('.sync-dot'); if(!el) return;
  const map={loading:['#ffb020','SYNCING…'],synced:['#3ddc84','SYNCED'],error:['#ff5b6e','OFFLINE'],demo:['#647890','BELUM TERHUBUNG']};
  const [c,l]=map[state]||map.demo;
  el.innerHTML=`<i style="background:${c};box-shadow:0 0 8px ${c}"></i> ${l}`;
  if(state==='error'&&msg) el.title=msg;
}

/* ==================== NOTIFIKASI TERPUSAT UNTUK SEMUA OPERASI BACKEND ====================
   Dipakai di SETIAP titik yang mengirim/menarik data ke Google Sheets, supaya pengguna
   selalu tahu persis apakah suatu aksi berhasil, gagal, atau masih berjalan -- tidak ada
   lagi aksi yang "diam-diam tidak terjadi apa-apa" tanpa pemberitahuan.
   SEMUA notifikasi (sukses/gagal/pending) tetap tampil sampai pengguna menutupnya sendiri
   -- tidak ada auto-hilang, supaya tidak terlewat kalau pengguna sedang tidak melihat layar. */
let __notifySeq=0;
function notify(kind, text, opts){
  opts=opts||{};
  const id='notify-'+(++__notifySeq);
  const wrap=document.getElementById('notifyStack')||(()=>{
    const d=document.createElement('div'); d.id='notifyStack'; d.className='notify-stack';
    document.body.appendChild(d); return d;
  })();
  const el=document.createElement('div');
  el.className='notify-toast notify-'+kind;
  el.id=id;
  el.innerHTML=notifyInnerHtml_(id,kind,text,opts.hint);
  wrap.appendChild(el);
  return id;
}
function updateNotify(id, kind, text, hint){
  const el=document.getElementById(id); if(!el) return notify(kind,text,{hint});
  el.className='notify-toast notify-'+kind;
  el.innerHTML=notifyInnerHtml_(id,kind,text,hint);
  return id;
}
function notifyInnerHtml_(id,kind,text,hint){
  const icons={pending:'⏳',success:'✓',error:'✕'};
  const closeBtn=`<button class="notify-close" onclick="dismissNotify('${id}')" title="Tutup">✕</button>`;
  const hintHtml=(kind==='error'&&hint)?`<div class="notify-hint">💡 ${hint}</div>`:'';
  return `<span class="notify-ic">${icons[kind]||'•'}</span><div class="notify-body"><span class="notify-txt">${text}</span>${hintHtml}</div>${closeBtn}`;
}
function dismissNotify(id){
  const el=document.getElementById(id); if(!el) return;
  el.classList.add('notify-out');
  setTimeout(()=>el.remove(), 200);
}

  });
  try{

}
