function isRowFlagged_(r, scr){
  const desk = String(r.Detail||'').toLowerCase();
  const flagKat = (scr.kategori||[]).some(g=>g.kategoriSekarang===r.Kategori && desk.indexOf(g.kataKunci)>=0);
  const flagSebab = (scr.sebab||[]).some(g=>g.sebabSekarang===r.Sebab && desk.indexOf(g.kataKunci)>=0);
  return {flagKat, flagSebab};
}

function renderRekonRow(r, kategoriList, sebabList, scr){
  const draft = STATE.rekonDraft[r.RowKey];
  const {flagKat, flagSebab} = isRowFlagged_(r, scr);
  const isFlagged = flagKat || flagSebab || r._koreksiStatus;
  const sebabNow = draft ? draft.sebabBaru : r.Sebab;
  const katNow = draft ? draft.kategoriBaru : r.Kategori;
  const sebabChanged = draft && draft.sebabBaru !== (r.SebabAsli||r.Sebab);
  const katChanged = draft && draft.kategoriBaru !== (r.KategoriAsli||r.Kategori);

  return `
    <tr class="${isFlagged?'flagged':''}" data-rowkey="${r.RowKey}">
      <td>${r.Tgl}</td><td>${r.PU}</td><td>${r.Line}</td>
      <td class="desc-cell">${isFlagged?'<span class="flag-ic">⚑</span>':''}${escapeHtml_(r.Detail)}</td>
      <td>${renderRekonEditableCell(r.RowKey, 'sebab', sebabNow, sebabList, sebabChanged, r.SebabAsli||r.Sebab)}</td>
      <td>${renderRekonEditableCell(r.RowKey, 'kategori', katNow, kategoriList, katChanged, r.KategoriAsli||r.Kategori)}</td>
      <td>${Number(r.Downtime).toFixed(2)}</td>
      <td class="row-actions">${draft ? `<button class="mini-btn" onclick="rekonBatalDraft('${r.RowKey}')">↺ Batal</button>` : ''}</td>
    </tr>
  `;
}

function renderRekonEditableCell(rowKey, field, currentVal, options, changed, originalVal){
  const id = `rekon-edit-${field}-${rowKey}`;
  return `
    <span class="editable ${changed?'changed':''}" id="${id}" onclick="rekonOpenEditPopover('${rowKey}','${field}', this)">
      ${changed ? `<span class="was-value">${originalVal}</span>` : ''}${currentVal}
    </span>
  `;
}

/* Popover sederhana: klik cell -> tampil daftar opsi -> klik opsi -> simpan ke STATE.rekonDraft (belum ke server) */
function rekonOpenEditPopover(rowKey, field, anchorEl){
  document.querySelectorAll('.edit-popover').forEach(p=>p.remove());
  const row = (STATE.rekonCache.rows||[]).find(r=>r.RowKey===rowKey);
  if(!row) return;
  const options = field==='sebab' ? ['OP','TR'] : [...new Set((STATE.rekonCache.rows||[]).map(r=>r.Kategori))].sort();
  const suggestion = field==='sebab'
    ? (STATE.rekonScreeningCache.sebab||[]).find(g=>g.sebabSekarang===row.Sebab && String(row.Detail||'').toLowerCase().indexOf(g.kataKunci)>=0)
    : (STATE.rekonScreeningCache.kategori||[]).find(g=>g.kategoriSekarang===row.Kategori && String(row.Detail||'').toLowerCase().indexOf(g.kataKunci)>=0);
  const suggestedVal = suggestion ? (field==='sebab'?suggestion.sebabDisarankan:suggestion.kategoriDisarankan) : null;

  const pop = document.createElement('div');
  pop.className = 'edit-popover';
  const rect = anchorEl.getBoundingClientRect();
  pop.style.position='fixed'; pop.style.left=rect.left+'px'; pop.style.top=(rect.bottom+4)+'px'; pop.style.zIndex=1000;
  pop.innerHTML = options.map(o=>`<div class="opt ${o===suggestedVal?'suggested':''}" onclick="rekonPickValue('${rowKey}','${field}','${o.replace(/'/g,"\\'")}')">${o}</div>`).join('');
  document.body.appendChild(pop);
  setTimeout(()=>document.addEventListener('click', function closePopover(e){
    if(!pop.contains(e.target) && e.target!==anchorEl){ pop.remove(); document.removeEventListener('click', closePopover); }
  }), 0);
}

function rekonPickValue(rowKey, field, value){
  document.querySelectorAll('.edit-popover').forEach(p=>p.remove());
  const row = (STATE.rekonCache.rows||[]).find(r=>r.RowKey===rowKey);
  if(!row) return;
  const existing = STATE.rekonDraft[rowKey] || {
    rowKey, tgl:row.Tgl, line:row.Line, detail:row.Detail,
    kategoriAsli: row.KategoriAsli||row.Kategori, sebabAsli: row.SebabAsli||row.Sebab,
    kategoriBaru: row.Kategori, sebabBaru: row.Sebab
  };
  if(field==='sebab') existing.sebabBaru = value; else existing.kategoriBaru = value;
  // Kalau balik ke nilai asli persis, hapus draft (tidak ada perubahan lagi)
  if(existing.kategoriBaru===existing.kategoriAsli && existing.sebabBaru===existing.sebabAsli){
    delete STATE.rekonDraft[rowKey];
  }else{
    STATE.rekonDraft[rowKey] = existing;
  }
  renderModule();
}

function rekonBatalDraft(rowKey){
  delete STATE.rekonDraft[rowKey];
  renderModule();
}

async function rekonReloadSemua(){

function rekonChangePage(delta){
  STATE.rekonPage = Math.max(1, (STATE.rekonPage||1)+delta);

}

function escapeHtml_(s){
  return String(s==null?'':s).replace(/[&<>"']/g, m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));
}

/* Terapkan saran ke semua baris dalam grup sekaligus -> masuk STATE.rekonDraft */
function rekonTerapkanGrup(jenis, nilaiBaru, rowKeys){

  rowKeys.forEach(rk=>{
    const row = rows.find(r=>r.RowKey===rk);
    const existing = STATE.rekonDraft[rk] || {
      rowKey: rk,
      tgl: row?row.Tgl:'', line: row?row.Line:'', detail: row?row.Detail:'',
      kategoriAsli: row?(row.KategoriAsli||row.Kategori):'', sebabAsli: row?(row.SebabAsli||row.Sebab):'',
      kategoriBaru: row?row.Kategori:'', sebabBaru: row?row.Sebab:''

    if(jenis==='kategori') existing.kategoriBaru = nilaiBaru; else existing.sebabBaru = nilaiBaru;
    STATE.rekonDraft[rk] = existing;
  });
  renderModule();
}

      </div>
      <div class="rekon-draft-actions">
        <button class="rekon-btn commit" onclick="rekonCommitDraft()">✓ Simpan ${nDraft} Perubahan ke Google Sheets</button>
        <button class="rekon-btn discard" onclick="rekonDiscardAllDraft()">✕ Buang Semua Draft</button>
      </div>

async function rekonCommitDraft(){
  const perubahan = Object.values(STATE.rekonDraft);
  if(!perubahan.length) return;
  if(!confirm(`Simpan ${perubahan.length} perubahan ke Google Sheets?\n\nData asli SIAP_DOWNTIME tidak akan diubah — koreksi disimpan terpisah dan akan ikut memengaruhi perhitungan OEE/Downtime di dashboard.`)) return;

  const nid=notify('pending', `Menyimpan ${perubahan.length} perubahan (langkah 1/2: draft)…`);
  try{
    const saveRes = await fetch(CONFIG.SYNC_URL, {method:'POST', headers:{'Content-Type':'text/plain;charset=utf-8'},
      body: JSON.stringify({uid:CONFIG.UID, pw:CONFIG.PW, action:'save_draft',
        pu:STATE.rekonPU, bulan:STATE.rekonBulan, tahun:STATE.rekonTahun,
        oleh:getAuth().name||'Tim', perubahan})});
    const saveJson = await saveRes.json();
    if(!saveJson.ok){
      updateNotify(nid,'error', `Gagal menyimpan draft: ${saveJson.error||'tidak diketahui'}.`,
        'Periksa koneksi ke Google Sheets, lalu coba klik "Simpan Perubahan ke Google Sheets" lagi.');
      return;
    }

    updateNotify(nid,'pending', `${perubahan.length} perubahan tersimpan sebagai draft. Menyelesaikan (langkah 2/2: commit)…`);
    const commitRes = await fetch(CONFIG.SYNC_URL, {method:'POST', headers:{'Content-Type':'text/plain;charset=utf-8'},
      body: JSON.stringify({uid:CONFIG.UID, pw:CONFIG.PW, action:'commit_koreksi',
        pu:STATE.rekonPU, bulan:STATE.rekonBulan, tahun:STATE.rekonTahun, oleh:getAuth().name||'Tim'})});
    const commitJson = await commitRes.json();
    if(commitJson.ok){
      updateNotify(nid,'success', `${commitJson.committed} perubahan berhasil disimpan permanen ke Google Sheets. KPI dashboard akan mencerminkan koreksi ini.`);
      STATE.rekonDraft = {};
      await syncLoad();
      renderModule();
    }else{
      updateNotify(nid,'error', `Draft tersimpan, tetapi commit gagal: ${commitJson.error||'tidak diketahui'}.`,
        'Perubahan masih tersimpan sebagai draft (belum permanen). Coba klik "Simpan Perubahan ke Google Sheets" lagi.');
    }
  }catch(err){
    updateNotify(nid,'error', `Gagal menyimpan perubahan: ${err}.`,
      'Periksa koneksi internet, atau apakah CONFIG.SYNC_URL sudah benar. Draft yang belum tersimpan tidak hilang -- coba lagi setelah koneksi pulih.');
  }
}

function rekonDiscardAllDraft(){
  if(!confirm('Buang semua draft perubahan? Ini tidak bisa dibatalkan.')) return;
  STATE.rekonDraft = {};
  renderModule();
}

/* ==================== SESI AKTIF LINTAS-USER ====================
   Setiap ~20 detik, kirim heartbeat (UID + modul yang sedang dibuka) ke backend,
   dan tarik daftar user lain yang sedang aktif. Jika ada yang membuka modul
   Rekonsiliasi dengan PU/Bulan yang sama, tampilkan notifikasi ringan supaya
   tim tidak bekerja bentrok tanpa sadar. */
let __heartbeatTimer=null;
function startSessionHeartbeat(){
  if(__heartbeatTimer) clearInterval(__heartbeatTimer);
  sendHeartbeat_();
  __heartbeatTimer=setInterval(sendHeartbeat_, 20000);
}
async function sendHeartbeat_(){
  if(!CONFIG.USE_LIVE || !CONFIG.SYNC_URL || CONFIG.SYNC_URL.includes('PASTE_URL')) return;
  const modulLabel = STATE.module==='rekonsiliasi'
    ? `Rekonsiliasi (${STATE.rekonPU||''} ${STATE.rekonBulan||''}/${STATE.rekonTahun||''})`
    : (MODULES[STATE.module]?MODULES[STATE.module].label:STATE.module);
  try{
    await fetch(CONFIG.SYNC_URL, {method:'POST', headers:{'Content-Type':'text/plain;charset=utf-8'},
      body: JSON.stringify({uid:CONFIG.UID, pw:CONFIG.PW, action:'heartbeat_session', modul:modulLabel})});
    checkActiveSessions_();
  }catch(err){ /* diamkan -- heartbeat tidak kritikal, tidak perlu mengganggu pengguna */ }
}
let __lastNotifiedSessions='';
async function checkActiveSessions_(){
  try{
    const p=new URLSearchParams({uid:CONFIG.UID, pw:CONFIG.PW, action:'get_active_sessions'});
    const res=await fetch(`${CONFIG.SYNC_URL}?${p.toString()}`);
    const j=await res.json();
    if(!j.ok || !j.sessions) return;
    const relevantSessions = j.sessions.filter(s=>s.modul && s.modul.includes('Rekonsiliasi'));
    const key = relevantSessions.map(s=>s.uid+s.modul).sort().join('|');
    if(relevantSessions.length && key!==__lastNotifiedSessions){
      __lastNotifiedSessions = key;
      const names = relevantSessions.map(s=>`${s.nama} (${s.modul})`).join(', ');
      notify('pending', `👀 Sedang aktif bersamaan: ${names}.`, {hint:'Koordinasikan dengan rekan agar tidak melakukan rekonsiliasi pada PU/Bulan yang sama secara bersamaan.'});
    } else if(!relevantSessions.length){
      __lastNotifiedSessions='';
    }
  }catch(err){ /* diamkan */ }
}

/* ==================== SHARE LINK ====================
   Menyimpan state penting (PU, modul, bulan) sebagai query string di URL, supaya
   pengguna bisa membagikan link yang langsung membuka dashboard pada tampilan
   yang sama, tanpa perlu menjelaskan langkah klik secara manual. */
function shareCurrentView(){
  const params=new URLSearchParams();
  params.set('pu', STATE.pu);
  params.set('module', STATE.module);
  params.set('mFrom', STATE.mFrom);
  params.set('mTo', STATE.mTo);
  if(STATE.module==='rekonsiliasi'){
    params.set('rekonPU', STATE.rekonPU||''); params.set('rekonBulan', STATE.rekonBulan||''); params.set('rekonTahun', STATE.rekonTahun||'');
  }
  const url = `${location.origin}${location.pathname}?${params.toString()}`;
  if(navigator.clipboard && navigator.clipboard.writeText){
    navigator.clipboard.writeText(url).then(()=>notify('success','Link tampilan saat ini berhasil disalin ke clipboard.'))
      .catch(()=>promptShareUrl_(url));
  }else{
    promptShareUrl_(url);
  }
}
function promptShareUrl_(url){
  notify('pending', `Salin link ini secara manual: ${url}`);
}
/* Membaca query string URL saat dashboard dibuka, dan menerapkannya ke STATE
   SEBELUM render pertama, supaya link yang dibagikan langsung membuka tampilan
   yang tepat. */
function applyUrlState_(){
  const params=new URLSearchParams(location.search);
  if(!params.toString()) return;
  if(params.has('pu')) STATE.pu=params.get('pu');
  if(params.has('module') && MODULES[params.get('module')]) STATE.module=params.get('module');
  if(params.has('mFrom')) STATE.mFrom=Number(params.get('mFrom'));
  if(params.has('mTo')) STATE.mTo=Number(params.get('mTo'));
  if(params.has('rekonPU')) STATE.rekonPU=params.get('rekonPU');
  if(params.has('rekonBulan')) STATE.rekonBulan=Number(params.get('rekonBulan'));
  if(params.has('rekonTahun')) STATE.rekonTahun=Number(params.get('rekonTahun'));
}

/* ==================== MODE GELAP/TERANG ====================
   Diterapkan lebih dulu (sebelum boot lain) supaya tidak ada kedipan warna
   saat halaman dimuat. Preferensi disimpan di localStorage. */
function applyStoredTheme_(){
  const saved = localStorage.getItem('ophub_theme');
  if(saved==='light'){ document.documentElement.setAttribute('data-theme','light'); }
}
function toggleTheme(){
  const isLight = document.documentElement.getAttribute('data-theme')==='light';
  if(isLight){ document.documentElement.removeAttribute('data-theme'); localStorage.setItem('ophub_theme','dark'); }
  else{ document.documentElement.setAttribute('data-theme','light'); localStorage.setItem('ophub_theme','light'); }
  updateThemeToggleIcon_();
}
function updateThemeToggleIcon_(){
  const btn=document.getElementById('themeToggleBtn');
  if(!btn) return;
  const isLight = document.documentElement.getAttribute('data-theme')==='light';
  btn.textContent = isLight ? '☀️' : '🌙';
}
applyStoredTheme_();

/* ==================== PENCARIAN GLOBAL ====================
   Mencari lintas Mesin, Kategori, Fungsi, Sub. Memilih hasil akan menerapkan
   filter drill-down yang sesuai di modul Downtime, supaya pengguna tidak perlu
   mencari manual lewat banyak klik. */
function onGlobalSearch(q){
  const box=document.getElementById('globalSearchResults');
  q=q.trim().toLowerCase();
  if(q.length<2){ box.classList.remove('show'); box.innerHTML=''; return; }
  const results=[];
  (DB.mesin||[]).forEach(m=>{ if(m.toLowerCase().includes(q)) results.push({type:'Mesin', label:m, action:`drillMesin('${m.replace(/'/g,"\\'")}')`}); });
  (DB.kat||[]).forEach(k=>{ if(k.toLowerCase().includes(q)) results.push({type:'Kategori', label:k, action:`drillKat('${k.replace(/'/g,"\\'")}')`}); });
  (DB.fungsi||[]).forEach(f=>{ if(f.toLowerCase().includes(q)) results.push({type:'Fungsi', label:f, action:`drillFungsi('${f.replace(/'/g,"\\'")}')`}); });
  const limited=results.slice(0,10);
  box.innerHTML = limited.length
    ? limited.map(r=>`<div class="gs-item" onclick="runGlobalSearchAction(\`${r.action}\`)"><span class="gs-type">${r.type}</span>${r.label}</div>`).join('')
    : `<div class="gs-empty">Tidak ada hasil untuk "${q}"</div>`;
  box.classList.add('show');
}
function runGlobalSearchAction(action){
  document.getElementById('globalSearchResults').classList.remove('show');
  document.getElementById('globalSearchInput').value='';
  STATE.module='downtime'; STATE.drill=null;
  renderModule();
  setTimeout(()=>{ try{ eval(action); }catch(e){} }, 60);
}
function onGlobalSearchKey(ev){
  if(ev.key==='Escape'){ ev.target.blur(); document.getElementById('globalSearchResults').classList.remove('show'); }
}

function toggleUserMenu(ev){ if(ev) ev.stopPropagation(); document.getElementById('userMenu').classList.toggle('show'); }
document.addEventListener('click', (e)=>{

function updateUserChip(){

/* ==================== KEYBOARD SHORTCUT GLOBAL ====================
   "/" -> fokus ke pencarian global (kecuali sedang mengetik di field lain)
   "Esc" -> tutup modal/drawer/dropdown yang sedang terbuka */
document.addEventListener('keydown', (e)=>{
  const tag=(e.target.tagName||'').toLowerCase();
  const typing = tag==='input' || tag==='textarea' || tag==='select' || e.target.isContentEditable;
  if(e.key==='/' && !typing){
    e.preventDefault();
    const inp=document.getElementById('globalSearchInput'); if(inp) inp.focus();
  }
  if(e.key==='Escape'){
    document.querySelectorAll('.modal-overlay').forEach(m=>m.remove());
    const menu=document.getElementById('userMenu'); if(menu) menu.classList.remove('show');
    const gs=document.getElementById('globalSearchResults'); if(gs) gs.classList.remove('show');
  }
});

async function startDashboard(){
  document.getElementById('loginScreen').classList.add('hidden');
  updateUserChip();
  updateThemeToggleIcon_();
  // Render dulu pakai data seed (bawaan), supaya tampilan tidak kosong menunggu jaringan.
  DB.months=[...new Set(DB.dt.map(r=>r[1]).filter(m=>m>=1&&m<=12))].sort((a,b)=>a-b);
  STATE.mFrom=Math.min(...DB.months); STATE.mTo=Math.max(...DB.months);
  applyUrlState_();
  buildTabs(); bindFilters(); renderModule();

  // Baru sinkronkan ke Google Sheets di belakang layar. Kalau berhasil, render ulang
  // dengan data live; kalau gagal/lambat, dashboard tetap terlihat dan terpakai
  // dengan data seed, bukan menampilkan layar kosong.
  const ok = await syncLoad();
  if(ok){
    DB.months=[...new Set(DB.dt.map(r=>r[1]).filter(m=>m>=1&&m<=12))].sort((a,b)=>a-b);
    STATE.mFrom=Math.min(...DB.months); STATE.mTo=Math.max(...DB.months);
    applyUrlState_();
    buildTabs(); bindFilters(); renderModule();
  }
  startSessionHeartbeat();
}

async function doLogin(){
  const uid=document.getElementById('loginUid').value.trim();
  const pw=document.getElementById('loginPw').value;
  const errEl=document.getElementById('loginError');
  errEl.textContent='';
  if(!uid || !pw){ errEl.textContent='UID dan password wajib diisi.'; return; }
  if(!CONFIG.SYNC_URL || CONFIG.SYNC_URL.includes('PASTE_URL')){
    errEl.textContent='Dashboard belum terhubung ke Google Sheets (SYNC_URL belum diisi). Hubungi admin teknis.';
    return;
  }
  const btn=document.querySelector('.login-btn'); btn.textContent='Memeriksa…'; btn.disabled=true;
  try{
    const res=await fetch(`${CONFIG.SYNC_URL}?uid=${encodeURIComponent(uid)}&pw=${encodeURIComponent(pw)}`);
    const j=await res.json();
    if(!j.ok){
      errEl.textContent = j.error==='AUTH_FAILED' ? 'UID atau password salah.' : `Gagal masuk: ${j.error||'tidak diketahui'}.`;
      btn.textContent='Masuk'; btn.disabled=false;
      return;
    }
    sessionStorage.setItem('ophub_uid', uid);
    sessionStorage.setItem('ophub_pw', pw);
    CONFIG.UID=uid; CONFIG.PW=pw;
    CURRENT_USER = j.me || {uid, nama:uid, role:'user'};
    // terapkan payload yang sudah didapat dari pengecekan login ini, supaya tidak fetch dua kali
    applyPayload_(j.data);
    startDashboard();
  }catch(err){
    errEl.textContent='Gagal terhubung ke server. Periksa koneksi internet.';
    btn.textContent='Masuk'; btn.disabled=false;
  }
}

async function loadMitigasiIfNeeded_(){
  if(STATE.mitigasi.loaded || STATE.mitigasi.loading) return;
  STATE.mitigasi.loading=true;
  try{
    const p=new URLSearchParams({uid:CONFIG.UID, pw:CONFIG.PW, action:'get_actions_mitigasi'});
    const res=await fetch(`${CONFIG.SYNC_URL}?${p.toString()}`);
    const j=await res.json();
    if(j.ok){ STATE.mitigasi.actions=j.actions||[]; STATE.mitigasi.log=j.log||[]; STATE.mitigasi.loaded=true; }
  }catch(err){ /* biarin, tombol refresh manual tersedia */ }
  STATE.mitigasi.loading=false;
  renderModule();
}
function refreshMitigasi(){ STATE.mitigasi.loaded=false; loadMitigasiIfNeeded_(); }

function isActionOverdue_(a){
  if(a.Status==='Selesai' || !a.TargetSelesai) return false;
  const t=new Date(a.TargetSelesai);
  if(isNaN(t)) return false;
  const today=new Date(); today.setHours(0,0,0,0);
  return t < today;
}
function daysOverdue_(a){
  const t=new Date(a.TargetSelesai); const today=new Date(); today.setHours(0,0,0,0); t.setHours(0,0,0,0);
  return Math.round((today-t)/86400000);
}

/* Cari 1 Fungsi yang paling representatif buat sebuah nama Kategori (dari data downtime yang ada). */
function fungsiForKategori_(katName){
  for(const r of DB.dt){ if((DB.kat[r[3]]||'')===katName) return DB.fungsi[r[4]]||''; }
  return '';
}

/* "⚡ Butuh Action" — kategori penyumbang downtime terbesar (sesuai filter periode+PU aktif)
   yang BELUM punya action item sama sekali. Diurutkan dari dampak terbesar. */
function renderMitigasiButuhAction(el){
  const A=aggregate();
  const existingKat=new Set(STATE.mitigasi.actions.map(a=>(a.Kategori||'').trim().toLowerCase()).filter(Boolean));
  const katArr=Object.entries(A.byKat).map(([kat,v])=>({kat,net:v.net,raw:v.raw,n:v.n}))
    .filter(x=>x.kat && x.kat!=='-').sort((a,b)=>b.net-a.net);
  const totNet=katArr.reduce((s,x)=>s+x.net,0)||1;
  const needAction=katArr.filter(x=>!existingKat.has(x.kat.trim().toLowerCase()));
  el.innerHTML=`
    <div class="sec-label">Kategori Downtime Belum Punya Action · ${periodLabel()}${STATE.pu!=='ALL'?' · '+STATE.pu:''}</div>
    <div class="panel" style="margin-bottom:10px;font-size:11.5px;color:var(--ink2)">
      Diurutkan dari kontribusi jam net terbesar yang <b>sama sekali belum ada action item-nya</b> — ini kandidat prioritas buat PE todong ke Fungsi terkait.
    </div>
    ${needAction.length ? needAction.map((x,i)=>{
      const fn=fungsiForKategori_(x.kat);
      const pct=(x.net/totNet*100).toFixed(1);
      return `<div class="panel" style="margin-bottom:10px;display:flex;justify-content:space-between;align-items:center;gap:10px;flex-wrap:wrap">
        <div>
          <div style="font-weight:700;font-size:13px">#${i+1} ${x.kat}</div>
          <div style="font-size:11.5px;color:var(--ink2);margin-top:2px">${fn||'Fungsi belum di-mapping'} · ${x.n} event · ${fmt.n(x.net,2)} jam net (${pct}% dari total)</div>
        </div>
        <button class="login-btn" style="width:auto;padding:8px 16px" onclick="openCreateActionModal('${x.kat.replace(/'/g,"\\'")}','${fn.replace(/'/g,"\\'")}')">+ Buat Action</button>
      </div>`;
    }).join('') : `<div class="panel" style="text-align:center;color:var(--ink3);padding:24px">✅ Semua kategori penyumbang downtime di periode ini sudah punya action item.</div>`}`;
}

/* "🏆 Scorecard Fungsi" — per Fungsi: total downtime jam & cost Rupiah (sesuai filter periode+PU aktif),
   plus progress action (berapa closed dari total) & rata² lama penyelesaian. Ini yang paling kena
   buat dipresentasikan ke manajemen: bukan cuma "siapa penyumbang terbesar" tapi "siapa yang paling
   responsif nutup action-nya". */
function renderMitigasiScorecard(el){
  const A=aggregate();
  const byFungsi={};
  for(const r of A.dt){
    const fn=DB.fungsi[r[4]]||'(belum di-mapping)';
    if(!byFungsi[fn]) byFungsi[fn]={net:0,raw:0,n:0,costJam:0,costKL:0};
    const c=costOfRow_(r);
    byFungsi[fn].net+=netVal(r); byFungsi[fn].raw+=rawVal(r); byFungsi[fn].n++;
    byFungsi[fn].costJam+=c.byJam; byFungsi[fn].costKL+=c.byKL;
  }
  const totNet=Object.values(byFungsi).reduce((s,v)=>s+v.net,0)||1;
  const hasCost = Object.values(byFungsi).some(v=>v.costJam>0||v.costKL>0);

  // progress action per fungsi (semua action, tidak dibatasi periode dashboard — action sifatnya berjalan)
  const actByFungsi={};
  STATE.mitigasi.actions.forEach(a=>{
    const fn=a.Fungsi||'(belum di-mapping)';
    if(!actByFungsi[fn]) actByFungsi[fn]={total:0,selesai:0,totalHariSelesai:0,nSelesai:0};
    actByFungsi[fn].total++;
    if(a.Status==='Selesai'){
      actByFungsi[fn].selesai++;
      if(a.TanggalDibuat && a.TerakhirUpdate){
        const d=(new Date(a.TerakhirUpdate)-new Date(a.TanggalDibuat))/86400000;
        if(d>=0){ actByFungsi[fn].totalHariSelesai+=d; actByFungsi[fn].nSelesai++; }
      }
    }
  });

  const rows=Object.entries(byFungsi).map(([fn,v])=>{
    const act=actByFungsi[fn]||{total:0,selesai:0,totalHariSelesai:0,nSelesai:0};
    const progress = act.total>0 ? Math.round(act.selesai/act.total*100) : null;
    const avgHari = act.nSelesai>0 ? (act.totalHariSelesai/act.nSelesai) : null;
    return {fn, ...v, pct:(v.net/totNet*100), act, progress, avgHari};
  }).sort((a,b)=>b.net-a.net);

  el.innerHTML=`
    <div class="sec-label">Scorecard per Fungsi · ${periodLabel()}${STATE.pu!=='ALL'?' · '+STATE.pu:''}</div>
    <div class="panel" style="margin-bottom:10px;font-size:11.5px;color:var(--ink2)">
      Kontribusi downtime tiap Fungsi (sesuai filter aktif) dipadukan sama progress action mitigasi-nya — biar kelihatan bukan cuma "siapa penyumbang terbesar" tapi "siapa yang paling gerak nutup action-nya".
      ${hasCost?'':' <span style="color:var(--ink3)">(Isi Cost Parameter di Master Data biar kolom Rupiah kehitung.)</span>'}
    </div>
    <div class="panel" style="overflow-x:auto">
      <table class="md-table">
        <thead><tr><th>Fungsi</th><th class="num">Net Jam</th><th class="num">% Kontribusi</th>${hasCost?'<th class="num">Cost (Jam)</th><th class="num">Cost (KL)</th>':''}<th class="num">Action Selesai</th><th class="num">Rata² Hari Selesai</th></tr></thead>
        <tbody>${rows.map(x=>`<tr>
          <td><b>${x.fn}</b></td>
          <td class="num">${fmt.n(x.net,2)}</td>
          <td class="num">${x.pct.toFixed(1)}%</td>
          ${hasCost?`<td class="num">${fmt.rp(x.costJam)}</td><td class="num">${fmt.rp(x.costKL)}</td>`:''}
          <td class="num">${x.progress!=null?`${x.act.selesai}/${x.act.total} (${x.progress}%)`:'<span style="color:var(--ink3)">belum ada action</span>'}</td>
          <td class="num">${x.avgHari!=null?fmt.n(x.avgHari,1)+' hari':'-'}</td>
        </tr>`).join('')}</tbody>
      </table>
    </div>`;
}

  }catch(err){ errEl.textContent=String(err.message||err); }
}

/* Validasi dampak: bandingkan jam net kategori itu di bulan action dibuat vs bulan terbaru yang ada
   datanya (PU sama kalau action itu spesifik 1 PU). Dipakai buat action yang statusnya Selesai. */
function katNetInMonth_(katName, pu, bulan){
  let net=0;
  DB.dt.forEach(r=>{
    if(DB.kat[r[3]]!==katName) return;
    if(pu && PU_NAME[r[0]]!==pu) return;
    if(r[1]!==Number(bulan)) return;
    net+=netVal(r);
  });
  return net;
}
/* Blok "Validasi Dampak" di modal detail action — cuma muncul kalau action Selesai dan punya Kategori.
   Bandingkan jam net kategori itu di bulan action dibuat vs bulan terbaru yang ada datanya. */
function dampakBlockHtml_(a){
  if(a.Status!=='Selesai' || !a.Kategori || !a.Bulan) return '';
  const bulanMulai=Number(a.Bulan);
  const bulanTerbaru=Math.max(...DB.dt.map(r=>r[1]).filter(m=>m>0), bulanMulai);
  if(bulanTerbaru<=bulanMulai) return '';
  const netMulai=katNetInMonth_(a.Kategori, a.PU||null, bulanMulai);
  const netTerbaru=katNetInMonth_(a.Kategori, a.PU||null, bulanTerbaru);
  const delta=netTerbaru-netMulai;
  const pct=netMulai>0 ? (delta/netMulai*100) : null;
  const membaik = delta<0;
  return `<div class="login-field"><label>📉 Validasi Dampak (otomatis)</label>
    <div style="font-size:12px;color:var(--ink2)">${a.Kategori} · ${MN[bulanMulai]} (saat action dibuat): <b>${fmt.n(netMulai,2)} jam</b> → ${MN[bulanTerbaru]} (terbaru): <b>${fmt.n(netTerbaru,2)} jam</b></div>
    <div style="margin-top:4px">
      ${membaik
        ? `<span class="chip dn">✅ Turun ${fmt.n(Math.abs(delta),2)} jam${pct!=null?' ('+Math.abs(pct).toFixed(0)+'%)':''} — dampaknya kelihatan</span>`
        : `<span class="chip up">⚠ ${delta>0?'Naik':'Belum turun'} ${fmt.n(Math.abs(delta),2)} jam${pct!=null?' ('+Math.abs(pct).toFixed(0)+'%)':''} — mungkin perlu action lanjutan</span>`}
    </div>
  </div>`;
}
function openActionDetail(actionId){
  const a=STATE.mitigasi.actions.find(x=>x.ActionID===actionId); if(!a) return;
  let mo=document.getElementById('actionModal'); if(!mo){ mo=document.createElement('div'); mo.id='actionModal'; mo.className='modal-overlay'; document.body.appendChild(mo); }
  let ev=[]; try{ ev=JSON.parse(a.EvidenceLinks||'[]'); }catch(e){ ev=[]; }
  const canEdit=!!a.canEdit;
  const logRows=STATE.mitigasi.log.filter(l=>l.ActionID===actionId).sort((x,y)=>new Date(y.Waktu)-new Date(x.Waktu));
  mo.innerHTML=`<div class="modal-box" onclick="event.stopPropagation()" style="max-width:460px">
    <div class="modal-head"><h3>${a.Judul}</h3><button class="modal-x" onclick="closeActionModal()">✕</button></div>
    <div class="modal-body">
      <div style="color:var(--ink2);font-size:12px;margin-bottom:8px">${a.Fungsi||'-'}${a.Kategori?' · '+a.Kategori:''} ${a.PU?'· '+a.PU:''} · PIC: <b>${a.PIC}</b></div>
      ${a.Deskripsi?`<div style="font-size:12.5px;color:var(--ink2);margin-bottom:10px">${a.Deskripsi}</div>`:''}
      <div class="login-field"><label>Status</label>
        <div style="display:flex;gap:6px;flex-wrap:wrap">
          ${['Belum Mulai','Sedang Berjalan','Selesai'].map(s=>`<button class="pchip ${a.Status===s?'on':''}" ${canEdit?`onclick="updateActionStatus('${actionId}','${s}')"`:'disabled style="opacity:.5"'}>${s}</button>`).join('')}
        </div>
      </div>
      ${dampakBlockHtml_(a)}
      <div class="login-field"><label>Dukungan Dibutuhkan</label>
        <input id="actSupportEdit" value="${(a.Support||'').replace(/"/g,'&quot;')}" ${canEdit?'':'disabled'} style="width:100%;background:var(--bg2);border:1px solid var(--line2);border-radius:8px;padding:9px;color:var(--ink)">
        ${canEdit?`<button class="pchip" style="margin-top:6px" onclick="saveActionSupport('${actionId}')">Simpan Dukungan</button>`:''}
      </div>
      <div class="login-field"><label>Evidence (${ev.length})</label>
        ${ev.map(x=>`<div style="font-size:12px;margin-bottom:4px"><a href="${x.url}" target="_blank" style="color:var(--amber)">📎 ${x.label||'file'}</a> <span style="color:var(--ink3)">— ${x.oleh}, ${new Date(x.waktu).toLocaleDateString('id-ID')}</span></div>`).join('') || '<div style="color:var(--ink3);font-size:12px">Belum ada evidence</div>'}
        ${canEdit?`
        <div style="margin-top:8px;display:flex;flex-direction:column;gap:6px">
          <input id="actEvUrl" placeholder="Tempel link evidence (Drive/WA/email)…" style="background:var(--bg2);border:1px solid var(--line2);border-radius:8px;padding:8px;color:var(--ink);font-size:12px">
          <button class="pchip" onclick="addEvidenceLink('${actionId}')">+ Tambah Link</button>
          <input id="actEvFile" type="file" style="font-size:11px">
          <button class="pchip" onclick="addEvidenceFile('${actionId}')">📤 Upload File</button>
        </div>`:''}
      </div>
      ${logRows.length?`<div class="modal-divider"></div><div class="login-field"><label>Histori</label>
        ${logRows.map(l=>`<div style="font-size:11px;color:var(--ink3);margin-bottom:3px">${new Date(l.Waktu).toLocaleString('id-ID')} · ${l.Oleh}: ${l.StatusLama} → ${l.StatusBaru}${l.Catatan?' ('+l.Catatan+')':''}</div>`).join('')}
      </div>`:''}
      <div class="login-error" id="actionModalError"></div>
    </div>
  </div>`;
}
async function updateActionStatus(actionId, status){
  try{
    await postSync_({action:'update_action_mitigasi', uid:CONFIG.UID, pw:CONFIG.PW, actionId, status});
    notify('success','Status diperbarui.'); STATE.mitigasi.loaded=false; await loadMitigasiIfNeeded_(); openActionDetail(actionId);
  }catch(err){ const e=document.getElementById('actionModalError'); if(e) e.textContent=String(err.message||err); }
}
async function saveActionSupport(actionId){
  const val=document.getElementById('actSupportEdit').value;
  try{
    await postSync_({action:'update_action_mitigasi', uid:CONFIG.UID, pw:CONFIG.PW, actionId, support:val});
    notify('success','Dukungan disimpan.'); STATE.mitigasi.loaded=false; await loadMitigasiIfNeeded_(); openActionDetail(actionId);
  }catch(err){ const e=document.getElementById('actionModalError'); if(e) e.textContent=String(err.message||err); }
}
async function addEvidenceLink(actionId){
  const url=document.getElementById('actEvUrl').value.trim();
  if(!url) return;
  try{
    await postSync_({action:'add_evidence_mitigasi', uid:CONFIG.UID, pw:CONFIG.PW, actionId, url, label:url.slice(0,40)});
    notify('success','Evidence link ditambahkan.'); STATE.mitigasi.loaded=false; await loadMitigasiIfNeeded_(); openActionDetail(actionId);
  }catch(err){ const e=document.getElementById('actionModalError'); if(e) e.textContent=String(err.message||err); }
}
async function addEvidenceFile(actionId){
  const inp=document.getElementById('actEvFile');
  const file=inp.files && inp.files[0];
  if(!file){ const e=document.getElementById('actionModalError'); if(e) e.textContent='Pilih file dulu.'; return; }
  if(file.size > 8*1024*1024){ const e=document.getElementById('actionModalError'); if(e) e.textContent='File maksimal 8MB.'; return; }
  const reader=new FileReader();
  reader.onload=async()=>{
    const base64Data=reader.result.split(',')[1];
    try{
      await postSync_({action:'add_evidence_mitigasi', uid:CONFIG.UID, pw:CONFIG.PW, actionId,
        base64Data, fileName:file.name, mimeType:file.type, label:file.name});
      notify('success','Evidence berhasil diupload.'); STATE.mitigasi.loaded=false; await loadMitigasiIfNeeded_(); openActionDetail(actionId);
    }catch(err){ const e=document.getElementById('actionModalError'); if(e) e.textContent=String(err.message||err); }
  };
  reader.readAsDataURL(file);
}

function doLogout(){
  sessionStorage.removeItem('ophub_uid'); sessionStorage.removeItem('ophub_pw');
  location.reload();
}

/* Jika kredensial sudah ada di sessionStorage (dari login sebelumnya di tab ini),
   langsung mulai tanpa menampilkan layar login lagi. */
(function initAuth(){
  if(CONFIG.UID && CONFIG.PW){
    startDashboard();
  }
  // jika belum ada, layar login (sudah tampil secara default) menunggu doLogin()
})();
</script>
